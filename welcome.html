<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYER PROFILE | Shaghel Mokh Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: #fff; overflow: hidden; }
        .rank-card { 
            background: linear-gradient(160deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.9) 100%);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .xp-bar-bg { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-gold { filter: drop-shadow(0 0 15px rgba(251, 191, 36, 0.4)); }
        .rank-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @keyframes shine {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        .text-shine {
            background: linear-gradient(90deg, #f59e0b, #fff, #f59e0b);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <div id="loader" class="fixed inset-0 bg-black flex items-center justify-center z-50">
        <div class="flex flex-col items-center gap-4">
            <div class="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-amber-500 font-black tracking-widest text-xs uppercase">جاري استدعاء البيانات...</span>
        </div>
    </div>

    <div class="w-full max-w-md">
        <!-- Main Card -->
        <div class="rank-card rounded-[50px] p-10 relative overflow-hidden text-center">
            
            <!-- Rank Visual -->
            <div class="relative mb-8">
                <div id="rank-icon-bg" class="w-32 h-32 mx-auto rounded-[40px] flex items-center justify-center transition-all duration-700 glow-gold">
                    <i id="rank-icon" class="fas fa-medal text-5xl"></i>
                </div>
                <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/10 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-400">
                    رتبة اللاعب
                </div>
            </div>

            <!-- Player Info -->
            <div class="mb-10">
                <h2 id="player-name" class="text-slate-500 font-bold text-sm mb-1">لاعب شاغل مخك</h2>
                <h1 id="rank-title" class="text-4xl font-black text-shine italic">...</h1>
            </div>

            <!-- Real-World XP Progress -->
            <div class="space-y-4 mb-10">
                <div class="flex justify-between items-end px-1">
                    <div class="text-right">
                        <span class="block text-[10px] text-slate-500 font-black uppercase">الخبرة الحالية</span>
                        <span id="xp-current" class="text-xl font-black text-white mono">0</span>
                    </div>
                    <div class="text-left">
                        <span class="block text-[10px] text-slate-500 font-black uppercase">الهدف القادم</span>
                        <span id="xp-next" class="text-xl font-black text-amber-500 mono">0</span>
                    </div>
                </div>
                
                <div class="xp-bar-bg h-4 w-full rounded-2xl p-1">
                    <div id="xp-progress" class="h-full bg-gradient-to-r from-amber-600 to-yellow-400 rounded-xl transition-all duration-1000 w-0 relative overflow-hidden">
                        <div class="absolute inset-0 bg-white/20 animate-pulse"></div>
                    </div>
                </div>
                
                <p id="rank-desc" class="text-[11px] text-slate-400 italic font-medium leading-relaxed"></p>
            </div>

            <!-- Stats Bar -->
            <div class="flex gap-4">
                <div class="flex-1 bg-white/5 py-4 rounded-3xl border border-white/5">
                    <i class="fas fa-heart text-red-500 mb-1"></i>
                    <span class="block text-[9px] text-slate-500 font-black">القلوب</span>
                    <span id="stat-hearts" class="text-lg font-black tracking-tighter">--</span>
                </div>
                <div class="flex-1 bg-white/5 py-4 rounded-3xl border border-white/5">
                    <i class="fas fa-star text-amber-500 mb-1"></i>
                    <span class="block text-[9px] text-slate-500 font-black">أعلى نتيجة</span>
                    <span id="stat-score" class="text-lg font-black tracking-tighter">--</span>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <button onclick="playNow()" class="w-full mt-8 py-6 bg-white text-slate-950 rounded-[35px] font-black text-xl hover:bg-amber-500 transition-all active:scale-95 shadow-2xl shadow-white/5 flex items-center justify-center gap-4">
            <span>انطلاق للتحدي</span>
            <i class="fas fa-chevron-left"></i>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "", authDomain: "shaghel-mokh-ultra.firebaseapp.com", projectId: "shaghel-mokh-ultra", storageBucket: "shaghel-mokh-ultra.firebasestorage.app", messagingSenderId: "167435076773", appId: "1:167435076773:web:ce058e3d064707bb7cf94c" };
        const APP_ID = "shaghel-mokh-ultra-v2";

        const RANKS = [
            { name: "هاوٍ (Amateur)", min: 0, max: 100, icon: "fa-seedling", color: "bg-slate-700", desc: "بدأت للتو رحلتك في عالم المعرفة." },
            { name: "مطلع (Explorer)", min: 101, max: 300, icon: "fa-compass", color: "bg-blue-600", desc: "أصبحت تمتلك فضولاً يحركك لاكتشاف المزيد." },
            { name: "مثقف (Cultured)", min: 301, max: 700, icon: "fa-book", color: "bg-emerald-600", desc: "عقلك بدأ يتشكل بمخزون ثقافي جيد." },
            { name: "باحث (Researcher)", min: 701, max: 1500, icon: "fa-microscope", color: "bg-indigo-600", desc: "أنت لا تكتفي بالمعلومات السطحية، بل تبحث في التفاصيل." },
            { name: "مفكر (Thinker)", min: 1501, max: 3000, icon: "fa-brain", color: "bg-purple-600", desc: "القدرة على الربط بين المعلومات هي ميزتك الكبرى." },
            { name: "عالم (Scholar)", min: 3001, max: 6000, icon: "fa-user-tie", color: "bg-amber-600", desc: "وصلت لمرحلة الخبرة العميقة في أغلب المجالات." },
            { name: "أسطورة (Legend)", min: 6001, max: 99999, icon: "fa-crown", color: "bg-gradient-to-tr from-amber-500 to-yellow-300", desc: "أنت المرجع المطلق لشاغل مخك، لا شيء يصعب عليك." }
        ];

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        signInAnonymously(auth);
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                const uRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', u.uid);
                const d = await getDoc(uRef);
                if (!d.exists()) await setDoc(uRef, { name: "لاعب جديد", score: 0, hearts: 5 });
                
                onSnapshot(uRef, snap => {
                    const data = snap.data();
                    updateRankUI(data);
                    document.getElementById('loader').classList.add('hidden');
                });
            }
        });

        function updateRankUI(data) {
            const score = data.score || 0;
            let current = RANKS[0];
            let next = RANKS[1];

            for (let i = 0; i < RANKS.length; i++) {
                if (score >= RANKS[i].min) {
                    current = RANKS[i];
                    next = RANKS[i+1] || null;
                }
            }

            document.getElementById('player-name').innerText = data.name || "مستخدم مجهول";
            document.getElementById('rank-title').innerText = current.name;
            document.getElementById('rank-icon').className = `fas ${current.icon} text-slate-900 text-5xl`;
            document.getElementById('rank-icon-bg').className = `w-32 h-32 mx-auto rounded-[40px] flex items-center justify-center transition-all duration-700 glow-gold ${current.color}`;
            document.getElementById('rank-desc').innerText = current.desc;
            document.getElementById('xp-current').innerText = score;
            document.getElementById('stat-hearts').innerText = data.hearts || 0;
            document.getElementById('stat-score').innerText = score;

            if (next) {
                document.getElementById('xp-next').innerText = next.min;
                const progress = ((score - current.min) / (next.min - current.min)) * 100;
                document.getElementById('xp-progress').style.width = `${Math.min(progress, 100)}%`;
            } else {
                document.getElementById('xp-next').innerText = "MAX";
                document.getElementById('xp-progress').style.width = `100%`;
            }
        }

        window.playNow = () => window.location.href = 'index.html';
    </script>
</body>
</html>
