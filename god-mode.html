<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شغل مخك | THE GOD MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, updateDoc, collection, getDocs, deleteDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك من الصور
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-v2';
        
        // المفتاح الذي أرسلته (GOD MODE ACTIVE)
        const GEMINI_API_KEY = "AIzaSyAOELEuu8EVlY6bRs9yTyrbTwOjuLskiW8";

        // دالة توليد الأسئلة بالذكاء الاصطناعي
        window.generateQuestions = async () => {
            const catId = document.getElementById('ai-cat').value;
            const btn = document.getElementById('gen-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-brain animate-pulse"></i> جاري استخراج الأسئلة...';

            const prompt = `أعطني 5 أسئلة مسابقات صعبة جداً في قسم ${catId} باللغة العربية. التنسيق JSON فقط: [{"text":"..","options":["..","..","..",".."],"correctIndex":0,"explanation":".."}]`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "");
                const questions = JSON.parse(cleanJson);

                for (let q of questions) {
                    await setDoc(doc(collection(db, 'artifacts', appId, 'public', 'data', 'questions')), {
                        ...q, category: catId, createdAt: new Date().toISOString()
                    });
                }
                alert("تم حقن الأسئلة بنجاح في قاعدة البيانات!");
            } catch (e) {
                alert("حدث خطأ في الاتصال بـ Gemini");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'توليد بالذكاء الاصطناعي';
            }
        };

        // إدارة المستخدمين (تعديل العملات والقلوب)
        window.updatePlayer = async (id, field, value) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', id), { [field]: parseInt(value) });
        };

        // جلب اللاعبين حياً
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'rankings'), (snap) => {
            const list = document.getElementById('player-list');
            list.innerHTML = snap.docs.map(d => {
                const u = d.data();
                return `
                <div class="bg-white/5 p-4 rounded-2xl flex items-center justify-between border border-white/5">
                    <div>
                        <p class="font-bold text-amber-500">${u.name || 'لاعب'}</p>
                        <p class="text-[10px] text-gray-500">${d.id}</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="text-center">
                            <p class="text-[10px] text-gray-400">Coins</p>
                            <input type="number" onchange="window.updatePlayer('${d.id}', 'coins', this.value)" value="${u.coins || 0}" class="bg-black w-16 text-center rounded border border-white/10 text-yellow-500">
                        </div>
                        <div class="text-center">
                            <p class="text-[10px] text-gray-400">Hearts</p>
                            <input type="number" onchange="window.updatePlayer('${d.id}', 'hearts', this.value)" value="${u.hearts || 0}" class="bg-black w-12 text-center rounded border border-white/10 text-red-500">
                        </div>
                    </div>
                </div>`;
            }).join('');
        });

        signInAnonymously(auth);
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #000; color: #fff; }
        .god-gradient { background: linear-gradient(135deg, #f59e0b 0%, #78350f 100%); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-4xl mx-auto">
        <div class="god-gradient p-8 rounded-[40px] shadow-2xl shadow-amber-500/20 mb-10 text-center">
            <h1 class="text-4xl font-black text-black uppercase tracking-tighter">The God Mode</h1>
            <p class="text-black/70 font-bold">لوحة التحكم المطلقة في "شغل مخك"</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-[#111] p-6 rounded-3xl border border-white/10">
                <h2 class="text-xl font-bold mb-4 text-amber-500"><i class="fas fa-magic"></i> حاقن الأسئلة الذكي</h2>
                <select id="ai-cat" class="w-full bg-black p-3 rounded-xl border border-white/10 mb-4 outline-none">
                    <option value="isl_prophets">قصص الأنبياء</option>
                    <option value="his_world">تاريخ العالم</option>
                    <option value="sci_physics">الفيزياء</option>
                </select>
                <button id="gen-btn" onclick="window.generateQuestions()" class="w-full py-4 god-gradient text-black font-black rounded-xl hover:scale-95 transition">توليد بالذكاء الاصطناعي</button>
            </div>

            <div class="bg-[#111] p-6 rounded-3xl border border-white/10">
                <h2 class="text-xl font-bold mb-4 text-blue-500"><i class="fas fa-user-shield"></i> التحكم في اللاعبين</h2>
                <div id="player-list" class="space-y-3 max-h-[400px] overflow-y-auto">
                    </div>
            </div>
        </div>
    </div>

</body>
</html>
