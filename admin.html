<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Shaghel Mokh Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.2); }
        .neon-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .log-box::-webkit-scrollbar { width: 4px; }
        .log-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full glass p-8 rounded-[32px] neon-glow">
        <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-6">
            <div>
                <h1 class="text-2xl font-black text-white">Shaghel Mokh <span class="text-blue-500 italic text-sm">ULTRA</span></h1>
                <p class="text-[10px] text-blue-400 font-mono tracking-widest uppercase mt-1">Status: Neural Link Ready</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-500 block">إجمالي الأسئلة في السحابة</span>
                <span id="db-count" class="text-3xl font-black text-white italic">--</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <button id="main-btn" onclick="startGeneration()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-lg transition-all active:scale-95 disabled:opacity-50 disabled:pointer-events-none flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                توليد وحقن 50 سؤال
            </button>
            <div class="bg-black/40 p-5 rounded-2xl flex flex-col justify-center border border-white/5">
                <div class="flex justify-between items-center">
                    <span class="text-xs text-slate-400">حالة الاتصال بـ Firebase:</span>
                    <span id="conn-status" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
                </div>
                <div id="user-info" class="text-[10px] text-slate-600 mt-2 font-mono">Connecting...</div>
            </div>
        </div>

        <!-- Progress Area -->
        <div id="progress-container" class="hidden mb-6">
            <div class="flex justify-between text-[10px] mb-2 font-bold text-blue-400 uppercase">
                <span id="prog-label">Processing...</span>
                <span id="prog-pct">0%</span>
            </div>
            <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                <div id="prog-bar" class="h-full bg-blue-500 w-0 transition-all duration-300"></div>
            </div>
        </div>

        <!-- Terminal Logs -->
        <div class="space-y-2">
            <div class="flex justify-between items-center text-[10px] text-slate-500 uppercase font-bold px-2">
                <span>وحدة التحكم المركزية</span>
                <button onclick="document.getElementById('logs').innerHTML=''" class="hover:text-white">Clear</button>
            </div>
            <div id="logs" class="log-box h-48 bg-black/60 rounded-xl p-4 overflow-y-auto font-mono text-[11px] space-y-1 text-slate-400 border border-white/5">
                <div class="text-blue-500/50">>> System boot successful.</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // الـ Config الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const GEMINI_KEY = "AIzaSyAOELEuu8EVlY6bRs9yTyrbTwOjuLskiW8";
        const APP_ID = "shaghel-mokh-ultra"; // المجلد الأساسي في Firestore

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const logs = document.getElementById('logs');
        const dbCount = document.getElementById('db-count');
        const mainBtn = document.getElementById('main-btn');
        const connStatus = document.getElementById('conn-status');
        const userInfo = document.getElementById('user-info');
        const progContainer = document.getElementById('progress-container');
        const progBar = document.getElementById('prog-bar');
        const progPct = document.getElementById('prog-pct');
        const progLabel = document.getElementById('prog-label');

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            const colors = { info: 'text-slate-500', success: 'text-emerald-400', err: 'text-red-500 font-bold', sys: 'text-blue-400 font-bold' };
            div.className = colors[type];
            div.innerHTML = `<span class="opacity-30 mr-2">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        function setProgress(pct, label) {
            progContainer.classList.remove('hidden');
            progBar.style.width = pct + "%";
            progPct.innerText = pct + "%";
            progLabel.innerText = label;
        }

        // Auth Logic
        signInAnonymously(auth).catch(e => addLog("خطأ في الاتصال بالأمان: " + e.message, "err"));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                addLog("تم الاتصال بـ Firebase بنجاح.", "success");
                connStatus.classList.replace('bg-red-500', 'bg-emerald-500');
                userInfo.innerText = "UID: " + user.uid;
                
                // مراقبة عدد الأسئلة اللحظي
                const colRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                onSnapshot(colRef, (snap) => {
                    dbCount.innerText = snap.size;
                });
            }
        });

        window.startGeneration = async () => {
            if (!auth.currentUser) return addLog("يرجى الانتظار لحين اكتمال الاتصال!", "err");
            
            mainBtn.disabled = true;
            setProgress(10, "Reading existing data...");
            addLog("بدء عملية التوليد الذكي...", "sys");

            try {
                // 1. استخراج عينة لمنع التكرار
                const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'));
                const existingTitles = snap.docs.slice(-30).map(d => d.data().t);

                setProgress(30, "Consulting Gemini AI...");
                
                // 2. طلب البيانات من Gemini
                const prompt = `أعطني 50 سؤالاً ثقافياً عربياً متنوعاً (تاريخ، علوم، دين، رياضة). 
                يجب ألا تشبه هذه الأسئلة: [${existingTitles.join(', ')}].
                النتيجة يجب أن تكون JSON Array فقط بصيغة: [{category, t, a, c, x}]. 
                t=السؤال، a=الإجابة الصحيحة، c=مصفوفة 3 إجابات خطأ، x=شرح بسيط.`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Generate questions" }] }],
                        systemInstruction: { parts: [{ text: prompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!res.ok) throw new Error("فشل الاتصال بـ Gemini API");
                const data = await res.json();
                const questions = JSON.parse(data.candidates[0].content.parts[0].text);
                
                addLog(`تم استلام ${questions.length} سؤال جديد بنجاح.`, "success");
                setProgress(70, "Injecting into Firestore...");

                // 3. الحقن في Firestore
                const batch = writeBatch(db);
                const colRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                
                questions.forEach(q => {
                    const newDoc = doc(colRef);
                    batch.set(newDoc, q);
                });

                await batch.commit();
                
                setProgress(100, "Done!");
                addLog(`تم حفظ الـ ${questions.length} سؤال في قاعدة بياناتك.`, "success");

            } catch (err) {
                addLog("خطأ: " + err.message, "err");
            } finally {
                setTimeout(() => {
                    progContainer.classList.add('hidden');
                    mainBtn.disabled = false;
                }, 3000);
            }
        };

    </script>
</body>
</html>
