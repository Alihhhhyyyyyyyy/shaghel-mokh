<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم ألترا ⚙️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0b0e14; color: white; }
        .input-style { background: #151921; border: 1px solid #2d3748; padding: 12px; border-radius: 12px; width: 100%; color: white; outline: none; }
        .input-style:focus { border-color: #f59e0b; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-yellow-500 underline decoration-wavy">لوحة الإدارة</h1>
            <span class="bg-yellow-500/10 text-yellow-500 px-4 py-1 rounded-full text-xs">متصل بـ Firebase</span>
        </div>

        <div class="bg-[#151921] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm mb-2 opacity-50">اختر القسم</label>
                    <select id="q-category" class="input-style">
                        <option value="general">ثقافة عامة 🧠</option>
                        <option value="science">علوم 🧪</option>
                        <option value="sports">رياضة ⚽</option>
                        <option value="history">تاريخ 📜</option>
                        <option value="geo">جغرافيا 🌍</option>
                        <option value="islamic">إسلاميات 🕌</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm mb-2 opacity-50">نص السؤال</label>
                    <input type="text" id="q-text" class="input-style" placeholder="مثلاً: ما هي عاصمة مصر؟">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm mb-2 text-green-500">الإجابة الصحيحة</label>
                        <input type="text" id="opt-0" class="input-style border-green-500/30" placeholder="الإجابة الصح">
                    </div>
                    <div>
                        <label class="block text-sm mb-2 opacity-50">خيار خطأ 1</label>
                        <input type="text" id="opt-1" class="input-style" placeholder="إجابة غلط">
                    </div>
                    <div>
                        <label class="block text-sm mb-2 opacity-50">خيار خطأ 2</label>
                        <input type="text" id="opt-2" class="input-style" placeholder="إجابة غلط">
                    </div>
                    <div>
                        <label class="block text-sm mb-2 opacity-50">خيار خطأ 3</label>
                        <input type="text" id="opt-3" class="input-style" placeholder="إجابة غلط">
                    </div>
                </div>

                <button onclick="quickAdd()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-yellow-500/20">
                    إضافة السؤال فوراً 🚀
                </button>
            </div>
        </div>
        
        <div class="mt-8 text-center">
            <a href="index.html" class="text-gray-500 hover:text-white text-sm">← العودة لتجربة اللعبة</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // الكونفيج بتاعك جاهز
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.quickAdd = async function() {
            const cat = document.getElementById('q-category').value;
            const text = document.getElementById('q-text').value;
            const options = [
                document.getElementById('opt-0').value,
                document.getElementById('opt-1').value,
                document.getElementById('opt-2').value,
                document.getElementById('opt-3').value
            ];

            if(!text || options.some(o => o === "")) {
                Swal.fire({ icon: 'error', title: 'بيانات ناقصة!', background: '#151921', color: '#fff' });
                return;
            }

            // علامة التحميل لسرعة الاستجابة
            const btn = event.target;
            btn.innerText = "جاري الرفع...";
            btn.disabled = true;

            try {
                const docRef = doc(db, "questions", cat);
                const questionData = {
                    t: text,
                    a: options, // أول إجابة هي الصح في الإدخال
                    c: 0
                };

                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    await updateDoc(docRef, { list: arrayUnion(questionData) });
                } else {
                    await setDoc(docRef, { list: [questionData] });
                }

                Swal.fire({
                    icon: 'success',
                    title: 'تمت الإضافة!',
                    text: 'السؤال الآن متاح في اللعبة',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#151921',
                    color: '#fff'
                });

                // تصفير الخانات فوراً للإضافة التالية
                document.getElementById('q-text').value = "";
                document.getElementById('opt-0').value = "";
                document.getElementById('opt-1').value = "";
                document.getElementById('opt-2').value = "";
                document.getElementById('opt-3').value = "";

            } catch (e) {
                Swal.fire({ icon: 'error', title: 'خطأ في الشبكة', text: e.message });
            } finally {
                btn.innerText = "إضافة السؤال فوراً 🚀";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
