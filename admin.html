<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Shaghel Mokh Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
        }

        .glass-card {
            background: rgba(23, 32, 53, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.25rem;
        }

        .sidebar-item {
            transition: 0.3s;
            cursor: pointer;
            border-radius: 0.75rem;
        }

        .sidebar-item.active {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .category-pill {
            transition: 0.2s;
            cursor: pointer;
        }

        .category-pill:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .input-field {
            background: #1a2333;
            border: 1px solid #2d3748;
            color: white;
            padding: 0.75rem;
            border-radius: 0.75rem;
            width: 100%;
        }

        .input-field:focus { outline: none; border-color: #3b82f6; }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="loader" class="fixed inset-0 bg-[#0b0f19] z-[200] flex items-center justify-center hidden">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="flex min-h-screen p-4 gap-6">
        <!-- Sidebar -->
        <aside class="w-64 fixed h-[calc(100vh-2rem)] glass-card p-6 hidden lg:flex flex-col">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-brain text-white text-sm"></i>
                </div>
                <h1 class="font-bold text-lg tracking-tight">شغل مخك <span class="text-blue-500">Ultra</span></h1>
            </div>

            <nav class="space-y-2 flex-1">
                <div onclick="switchSection('dashboard')" class="sidebar-item active p-3 flex items-center gap-3"><i class="fas fa-th-large w-5"></i>الرئيسية</div>
                <div onclick="switchSection('users')" class="sidebar-item p-3 flex items-center gap-3 text-slate-400"><i class="fas fa-users w-5"></i>المستخدمين</div>
                <div onclick="switchSection('questions')" class="sidebar-item p-3 flex items-center gap-3 text-slate-400"><i class="fas fa-book w-5"></i>بنك الأسئلة (24 فرع)</div>
            </nav>

            <div class="mt-auto pt-4 border-t border-slate-800">
                <button id="logoutBtn" class="text-red-400 flex items-center gap-3 p-3 w-full hover:bg-red-500/10 rounded-lg"><i class="fas fa-power-off"></i>خروج</button>
            </div>
        </aside>

        <!-- Content -->
        <main class="flex-1 lg:mr-72">
            <!-- Header -->
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="mainTitle" class="text-2xl font-bold">الإحصائيات العامة</h2>
                    <p class="text-slate-500 text-sm">أهلاً بك في نظام الإدارة المتقدم</p>
                </div>
                <button onclick="openModal('qModal')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold transition shadow-lg shadow-blue-900/20">
                    <i class="fas fa-plus ml-2"></i>إضافة سؤال
                </button>
            </header>

            <!-- Sections -->
            <div id="dashboardSection" class="section-content">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                    <div class="glass-card p-5 border-b-2 border-blue-500">
                        <p class="text-slate-400 text-xs uppercase mb-1">إجمالي الأسئلة</p>
                        <h4 id="statQ" class="text-2xl font-bold">0</h4>
                    </div>
                    <div class="glass-card p-5 border-b-2 border-purple-500">
                        <p class="text-slate-400 text-xs uppercase mb-1">المواضيع</p>
                        <h4 class="text-2xl font-bold">8</h4>
                    </div>
                    <div class="glass-card p-5 border-b-2 border-emerald-500">
                        <p class="text-slate-400 text-xs uppercase mb-1">الفروع</p>
                        <h4 class="text-2xl font-bold">24</h4>
                    </div>
                    <div class="glass-card p-5 border-b-2 border-orange-500">
                        <p class="text-slate-400 text-xs uppercase mb-1">المستخدمين</p>
                        <h4 id="statU" class="text-2xl font-bold">0</h4>
                    </div>
                </div>
            </div>

            <!-- Questions Section -->
            <div id="questionsSection" class="section-content hidden">
                <div class="flex flex-col gap-6">
                    <!-- Topics Filter -->
                    <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide" id="topicsFilter">
                        <!-- Filled by JS -->
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <!-- Branches Side List -->
                        <div class="lg:col-span-1 space-y-2" id="branchesSideList">
                            <p class="text-slate-500 text-xs px-2 mb-3">اختر الفرع لعرض الأسئلة</p>
                            <!-- Filled by JS -->
                        </div>

                        <!-- Questions Feed -->
                        <div class="lg:col-span-3 space-y-4" id="questionsFeed">
                            <div class="glass-card p-10 text-center text-slate-500 italic">اختر فرعاً من القائمة الجانبية لمشاهدة الأسئلة</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Users Section -->
            <div id="usersSection" class="section-content hidden">
                <div class="glass-card overflow-hidden">
                    <table class="w-full text-right">
                        <thead class="bg-slate-800/50">
                            <tr>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">المستخدم</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">الرصيد</th>
                                <th class="p-4 text-xs font-semibold text-slate-400 uppercase">الإجراء</th>
                            </tr>
                        </thead>
                        <tbody id="userList" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Question Modal -->
    <div id="qModal" class="fixed inset-0 modal-overlay z-[150] hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-2xl p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">إضافة سؤال جديد</h3>
                <button onclick="closeModal('qModal')" class="text-slate-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-2">الموضوع الرئيسي</label>
                    <select id="qMainTopic" onchange="updateBranchOptions()" class="input-field"></select>
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-2">الفرع الدراسي</label>
                    <select id="qSubBranch" class="input-field"></select>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-xs text-slate-400 mb-2">نص السؤال</label>
                <textarea id="qText" class="input-field h-24" placeholder="اكتب السؤال هنا..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <input type="text" id="opt1" class="input-field" placeholder="الخيار الأول">
                <input type="text" id="opt2" class="input-field" placeholder="الخيار الثاني">
                <input type="text" id="opt3" class="input-field" placeholder="الخيار الثالث">
                <input type="text" id="opt4" class="input-field" placeholder="الخيار الرابع">
            </div>

            <div class="flex items-center gap-4 mb-8">
                <label class="text-sm">رقم الإجابة الصحيحة:</label>
                <div class="flex gap-2">
                    <button onclick="setCorrect(1)" class="opt-btn w-10 h-10 rounded-lg border border-slate-700 flex items-center justify-center" id="btn1">1</button>
                    <button onclick="setCorrect(2)" class="opt-btn w-10 h-10 rounded-lg border border-slate-700 flex items-center justify-center" id="btn2">2</button>
                    <button onclick="setCorrect(3)" class="opt-btn w-10 h-10 rounded-lg border border-slate-700 flex items-center justify-center" id="btn3">3</button>
                    <button onclick="setCorrect(4)" class="opt-btn w-10 h-10 rounded-lg border border-slate-700 flex items-center justify-center" id="btn4">4</button>
                </div>
            </div>

            <button onclick="submitQuestion()" class="w-full btn-primary bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/40">حفظ ونشر السؤال</button>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "shaghel-mokh-ultra";

        // Structure definition for 8 Topics x 3 Branches
        const STRUCTURE = {
            "اللغة العربية": ["نحو", "بلاغة", "أدب"],
            "اللغات الأجنبية": ["إنجليزية", "فرنسية", "ألمانية"],
            "الرياضيات": ["جبر", "تفاضل وتكامل", "هندسة فراغية"],
            "العلوم الطبيعية": ["فيزياء", "كيمياء", "أحياء"],
            "الدراسات الاجتماعية": ["تاريخ", "جغرافيا", "فلسفة"],
            "تكنولوجيا المعلومات": ["برمجة", "ذكاء اصطناعي", "أمن سيبراني"],
            "الثقافة العامة": ["دين", "رياضة", "فن"],
            "تطوير الذات": ["منطق", "علم نفس", "إدارة وقت"]
        };

        let currentCorrect = 1;
        let selectedTopic = "اللغة العربية";
        let selectedBranch = "نحو";

        // Navigation
        window.switchSection = (id) => {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + 'Section').classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active', 'text-white'));
            event.currentTarget.classList.add('active', 'text-white');
            document.getElementById('mainTitle').innerText = event.currentTarget.innerText;
        };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        // Logic
        onAuthStateChanged(auth, async (user) => {
            if (!user) await signInAnonymously(auth);
            initUI();
            listenToData();
        });

        function initUI() {
            // Fill Filter Topics
            const filterDiv = document.getElementById('topicsFilter');
            const mainTopicSelect = document.getElementById('qMainTopic');
            filterDiv.innerHTML = '';
            mainTopicSelect.innerHTML = '';

            Object.keys(STRUCTURE).forEach(topic => {
                const pill = document.createElement('div');
                pill.className = `category-pill px-6 py-2 rounded-full whitespace-nowrap border border-slate-700 text-sm ${topic === selectedTopic ? 'bg-blue-600 border-blue-500' : 'bg-slate-800'}`;
                pill.innerText = topic;
                pill.onclick = () => {
                    selectedTopic = topic;
                    selectedBranch = STRUCTURE[topic][0];
                    initUI();
                    loadQuestionsForBranch();
                };
                filterDiv.appendChild(pill);

                const opt = document.createElement('option');
                opt.value = topic; opt.innerText = topic;
                mainTopicSelect.appendChild(opt);
            });

            // Fill Branch Side List
            const branchList = document.getElementById('branchesSideList');
            branchList.innerHTML = '';
            STRUCTURE[selectedTopic].forEach(branch => {
                const item = document.createElement('div');
                item.className = `p-3 rounded-lg text-sm cursor-pointer border ${branch === selectedBranch ? 'bg-blue-500/10 border-blue-500/30 text-blue-400' : 'bg-slate-800/40 border-transparent text-slate-400'}`;
                item.innerHTML = `<i class="fas fa-chevron-left ml-2"></i> ${branch}`;
                item.onclick = () => {
                    selectedBranch = branch;
                    initUI();
                    loadQuestionsForBranch();
                };
                branchList.appendChild(item);
            });

            updateBranchOptions();
            setCorrect(1);
        }

        window.updateBranchOptions = () => {
            const topic = document.getElementById('qMainTopic').value;
            const sub = document.getElementById('qSubBranch');
            sub.innerHTML = '';
            STRUCTURE[topic].forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.innerText = b;
                sub.appendChild(opt);
            });
        };

        window.setCorrect = (n) => {
            currentCorrect = n;
            document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('bg-blue-600', 'border-blue-500'));
            document.getElementById('btn' + n).classList.add('bg-blue-600', 'border-blue-500');
        };

        function listenToData() {
            // Stats & Global listeners
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), snap => {
                document.getElementById('statU').innerText = snap.size;
                const userList = document.getElementById('userList');
                userList.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    userList.innerHTML += `<tr>
                        <td class="p-4"><p class="font-bold">${u.name || 'مجهول'}</p><p class="text-[10px] text-slate-500">${u.email}</p></td>
                        <td class="p-4 text-blue-400 font-bold">${u.balance || 0}</td>
                        <td class="p-4"><button class="text-xs underline text-slate-500">تعديل</button></td>
                    </tr>`;
                });
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), snap => {
                document.getElementById('statQ').innerText = snap.size;
                loadQuestionsForBranch();
            });
        }

        window.loadQuestionsForBranch = () => {
            const feed = document.getElementById('questionsFeed');
            feed.innerHTML = `<div class="p-10 text-center animate-pulse">جاري التحميل...</div>`;
            
            // Simple query logic in memory as per Rule 2
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), (snap) => {
                const items = [];
                snap.forEach(d => {
                    const q = d.data();
                    if(q.topic === selectedTopic && q.branch === selectedBranch) {
                        items.push({id: d.id, ...q});
                    }
                });

                if(items.length === 0) {
                    feed.innerHTML = `<div class="glass-card p-10 text-center text-slate-500">لا توجد أسئلة حالياً في فرع "${selectedBranch}"</div>`;
                    return;
                }

                feed.innerHTML = '';
                items.forEach(q => {
                    feed.innerHTML += `
                        <div class="glass-card p-5 border-r-4 border-blue-600 group relative">
                            <button onclick="deleteQ('${q.id}')" class="absolute left-4 top-4 text-red-500 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash"></i></button>
                            <p class="font-bold text-slate-200 mb-3">${q.text}</p>
                            <div class="grid grid-cols-2 gap-2">
                                ${q.options.map((o, idx) => `
                                    <div class="p-2 rounded text-xs ${idx+1 === q.correct ? 'bg-green-500/10 text-green-400 border border-green-500/20' : 'bg-slate-800 text-slate-500'}">
                                        ${idx+1}. ${o}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            });
        };

        window.submitQuestion = async () => {
            const text = document.getElementById('qText').value;
            const topic = document.getElementById('qMainTopic').value;
            const branch = document.getElementById('qSubBranch').value;
            const options = [
                document.getElementById('opt1').value,
                document.getElementById('opt2').value,
                document.getElementById('opt3').value,
                document.getElementById('opt4').value
            ];

            if(!text || options.includes("")) return alert("يرجى ملء جميع البيانات");

            document.getElementById('loader').classList.remove('hidden');
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                    text, topic, branch, options, correct: currentCorrect, createdAt: Date.now()
                });
                closeModal('qModal');
                document.getElementById('qText').value = '';
            } catch(e) { console.error(e); }
            finally { document.getElementById('loader').classList.add('hidden'); }
        };

        window.deleteQ = async (id) => {
            if(confirm('حذف السؤال نهائياً؟')) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
        };

    </script>
</body>
</html>
