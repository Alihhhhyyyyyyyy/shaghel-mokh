<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المسابقات - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; margin: 0; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
        .card-anim { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .btn-glow:hover { box-shadow: 0 0 25px rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="glass p-8 rounded-[3rem] mb-10 flex flex-col md:flex-row justify-between items-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-amber-500/5 blur-3xl rounded-full"></div>
            <div class="flex items-center gap-5 relative z-10">
                <div class="w-16 h-16 bg-gradient-to-br from-amber-400 to-orange-600 rounded-2xl flex items-center justify-center text-black shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tight">إدارة محتوى "شغّل مخك"</h1>
                    <div id="conn-badge" class="mt-1 flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-yellow-500">
                        <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                        جاري الربط مع خادم البيانات...
                    </div>
                </div>
            </div>
            <div class="mt-6 md:mt-0 text-left bg-white/5 px-6 py-3 rounded-2xl border border-white/5">
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">بيئة التشغيل</p>
                <p class="text-xs font-mono text-amber-500">GitHub Pages / Live</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-8 rounded-[3.5rem] shadow-xl">
                    <h3 class="text-lg font-black mb-8 flex items-center gap-3">
                        <span class="bg-amber-500/20 p-2 rounded-xl"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg></span>
                        توليد ذكاء اصطناعي
                    </h3>
                    
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 mr-2 uppercase tracking-widest">المجال الرئيسي</label>
                            <select id="main-select" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none focus:border-amber-500 transition-all font-bold cursor-pointer appearance-none"></select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-500 mr-2 uppercase tracking-widest">التخصص الفرعي</label>
                            <select id="sub-select" class="w-full bg-black border border-white/10 p-5 rounded-2xl outline-none focus:border-amber-500 transition-all font-bold cursor-pointer appearance-none"></select>
                        </div>

                        <button id="btn-generate" class="w-full btn-glow bg-amber-500 hover:bg-amber-400 text-black py-6 rounded-[2rem] font-black text-xl transition-all active:scale-95 shadow-xl shadow-amber-500/20 flex items-center justify-center gap-3 mt-4">
                            توليد 10 أسئلة
                        </button>

                        <div id="msg-box" class="hidden p-5 rounded-3xl text-xs font-bold border leading-relaxed animate-card"></div>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2.5rem] flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mb-1">إجمالي الأسئلة</p>
                        <p id="count-display" class="text-4xl font-black">0</p>
                    </div>
                    <div class="w-14 h-14 bg-amber-500/5 rounded-2xl flex items-center justify-center text-amber-500 border border-amber-500/10">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                    </div>
                </div>
            </div>

            <!-- List Area -->
            <div class="lg:col-span-8 flex flex-col min-h-[700px]">
                <div class="glass rounded-[3.5rem] flex-1 overflow-hidden flex flex-col shadow-2xl relative">
                    <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/2">
                        <h2 class="font-black text-xl flex items-center gap-4">
                            <span class="w-2 h-8 bg-amber-500 rounded-full"></span>
                            قاعدة الأسئلة الحية
                        </h2>
                    </div>
                    <div id="list-container" class="p-8 space-y-5 overflow-y-auto max-h-[800px] custom-scroll">
                        <div class="flex flex-col items-center justify-center py-40 opacity-20 animate-pulse">
                            <svg class="animate-spin h-10 w-10 text-amber-500 mb-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            <p class="font-black">جاري مزامنة السحابة...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Configuration
        const config = JSON.parse(__firebase_config);
        const app = initializeApp(config);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-ultra-full';
        
        // المفتاح الخاص بك تم إضافته بنجاح
        const apiKey = "AIzaSyAOELEuu8EVlY6bRs9yTyrbTwOjuLskiW8"; 

        const categories = {
            islamic: { name: "إسلاميات", icon: "🕌", subs: ["قصص الأنبياء", "القرآن الكريم", "السيرة النبوية", "الفقه الميسر"] },
            egypt: { name: "تاريخ مصر", icon: "🏺", subs: ["الفراعنة", "مصر الحديثة", "آثار النوبة", "ثورات مصر"] },
            tech: { name: "تقنية", icon: "💻", subs: ["برمجة", "ذكاء اصطناعي", "أمن سيبراني", "تاريخ الحواسيب"] },
            science: { name: "علوم وفضاء", icon: "🚀", subs: ["الفضاء", "جسم الإنسان", "الكيمياء", "الفيزياء الكمية"] },
            geo: { name: "جغرافيا", icon: "🌍", subs: ["عواصم", "أعلام", "عجائب الدنيا", "تضاريس الأرض"] },
            sports: { name: "رياضة", icon: "⚽", subs: ["كرة قدم", "أساطير", "الأولمبياد", "كأس العالم"] },
            puzzles: { name: "ألغاز", icon: "🧩", subs: ["منطق", "أحجيات", "رياضيات", "ذكاء بصري"] },
            food: { name: "طعام", icon: "🍱", subs: ["أطباق عالمية", "حلويات", "توابل", "فواكه نادرة"] }
        };

        let dbData = [];

        // DOM Elements
        const mainSelect = document.getElementById('main-select');
        const subSelect = document.getElementById('sub-select');
        const btnGen = document.getElementById('btn-generate');
        const listContainer = document.getElementById('list-container');
        const countText = document.getElementById('count-display');
        const msgBox = document.getElementById('msg-box');

        // Setup Selects
        Object.keys(categories).forEach(k => {
            const op = document.createElement('option');
            op.value = k;
            op.innerText = categories[k].icon + " " + categories[k].name;
            mainSelect.appendChild(op);
        });

        const syncSubs = () => {
            subSelect.innerHTML = '';
            categories[mainSelect.value].subs.forEach(s => {
                const op = document.createElement('option');
                op.value = s; op.innerText = s;
                subSelect.appendChild(op);
            });
        };
        mainSelect.onchange = syncSubs;
        syncSubs();

        // Firebase Integration
        const connect = async () => {
            try {
                await signInAnonymously(auth);
                document.getElementById('conn-badge').innerText = "متصل وقابل للتعديل الفوري";
                document.getElementById('conn-badge').className = "mt-1 flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-green-500";
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
                onSnapshot(q, (snap) => {
                    dbData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    dbData.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
                    render();
                }, (err) => {
                    console.error("Snapshot Error:", err);
                });
            } catch (err) {
                console.error("Auth Error:", err);
                alert("تعذر الاتصال بقاعدة البيانات.");
            }
        };

        const render = () => {
            countText.innerText = dbData.length;
            if(dbData.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-32 opacity-20 font-black text-xl">لا توجد بيانات حالياً</div>`;
                return;
            }
            listContainer.innerHTML = dbData.map(q => `
                <div class="bg-[#111] border border-white/5 p-7 rounded-[2.5rem] relative group hover:border-amber-500/20 transition-all card-anim">
                    <button onclick="window.delItem('${q.id}')" class="absolute top-8 left-8 p-3 bg-red-500/5 text-red-500/40 hover:text-red-500 hover:bg-red-500/10 rounded-2xl transition-all opacity-0 group-hover:opacity-100">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                    <div class="flex gap-2 mb-4">
                        <span class="text-[9px] bg-amber-500/10 text-amber-500 px-3 py-1.5 rounded-full font-black border border-amber-500/10 uppercase tracking-tighter">${q.category}</span>
                        <span class="text-[9px] bg-white/5 text-gray-500 px-3 py-1.5 rounded-full font-black border border-white/5 uppercase tracking-tighter">${q.subCategory}</span>
                    </div>
                    <h4 class="font-bold text-xl mb-6 pr-2 leading-relaxed text-white/90">${q.t}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${q.a.map((ans, i) => `
                            <div class="p-4 text-xs rounded-2xl border ${i === q.c ? 'border-green-500/30 bg-green-500/5 text-green-400 font-bold' : 'border-white/5 bg-white/2 text-gray-500'}">
                                <span class="opacity-30 ml-2 font-mono">${i+1}.</span> ${ans}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        };

        window.delItem = async (id) => {
            if(confirm('هل تريد حذف هذا السؤال نهائياً؟')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
            }
        };

        // Generation Engine
        btnGen.onclick = async () => {
            btnGen.disabled = true;
            btnGen.innerHTML = `<svg class="animate-spin h-5 w-5 text-black" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> جاري الابتكار...`;
            
            msgBox.className = "p-5 rounded-3xl text-[10px] font-black border bg-blue-500/10 text-blue-400 border-blue-500/20";
            msgBox.innerText = "جاري الآن استخدام الذكاء الاصطناعي لتوليد محتوى جديد وحصري غير مكرر...";
            msgBox.classList.remove('hidden');

            const cName = categories[mainSelect.value].name;
            const sName = subSelect.value;
            // جمع الأسئلة الحالية لهذا القسم لمنع التكرار
            const skip = dbData.filter(q => q.subCategory === sName).map(q => q.t).slice(0, 20);

            try {
                const prompt = `Task: Create 10 professional Arabic MCQ for ${cName} - ${sName}. 
                Rule 1: ABSOLUTELY NO DUPLICATES OF: [${skip.join(',')}]. 
                Rule 2: Accurate info. 
                Rule 3: JSON Array format. 
                Schema: [{"t":"Q", "a":["1","2","3","4"], "c":0, "x":"Explanation"}]`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Strict JSON Output" }] }
                    })
                });

                const data = await res.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const list = JSON.parse(jsonText);

                for(const q of list) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q, category: cName, subCategory: sName, createdAt: Date.now()
                    });
                }

                msgBox.innerText = "تمت عملية التوليد بنجاح! الأسئلة تظهر الآن في القائمة.";
                msgBox.className = "p-5 rounded-3xl text-[10px] font-black border bg-green-500/10 text-green-400 border-green-500/20";
            } catch (err) {
                console.error(err);
                msgBox.innerText = "حدث خطأ في الاتصال بمحرك الذكاء الاصطناعي. تأكد من استهلاك المفتاح.";
                msgBox.className = "p-5 rounded-3xl text-[10px] font-black border bg-red-500/10 text-red-400 border-red-500/20";
            } finally {
                btnGen.disabled = false;
                btnGen.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg> توليد 10 أسئلة`;
            }
        };

        connect();
    </script>
</body>
</html>
