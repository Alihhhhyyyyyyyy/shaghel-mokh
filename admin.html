<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرفع التلقائي من الملف ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="questions.js"></script>

    <style>body { font-family: 'Tajawal', sans-serif; background: #0b0e14; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-[#151921] p-10 rounded-[3rem] border border-white/5 text-center shadow-2xl">
        <h1 class="text-3xl font-black text-yellow-500 mb-4">الرفع الذكي 🤖</h1>
        <p class="text-gray-400 text-sm mb-8">سيتم قراءة الأسئلة من ملف <code class="text-yellow-500">questions.js</code> ورفعها بالكامل لـ Firebase.</p>

        <div class="space-y-4">
            <button onclick="uploadAllData()" id="sync-btn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-6 rounded-3xl text-xl shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">
                مزامنة كل الأقسام الآن 🔥
            </button>
            
            <p id="status-text" class="text-xs text-gray-500">لم يتم البدء بعد</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.uploadAllData = async function() {
            // التحقق من وجود المصفوفة في ملف questions.js
            if (typeof questionsBank === 'undefined') {
                return Swal.fire('خطأ!', 'لم يتم العثور على مصفوفة questionsBank في ملفك. تأكد من ربط الملف صح.', 'error');
            }

            const btn = document.getElementById('sync-btn');
            const status = document.getElementById('status-text');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            
            try {
                // هيلف على كل الأقسام الموجودة في ملفك (general, sports, الخ) ويرفعها
                const categories = Object.keys(questionsBank);
                
                for (const cat of categories) {
                    status.innerText = `جاري رفع قسم: ${cat}...`;
                    await setDoc(doc(db, "questions", cat), {
                        list: questionsBank[cat]
                    });
                }

                Swal.fire({
                    icon: 'success',
                    title: 'تمت المزامنة!',
                    text: `تم رفع جميع الأقسام والأسئلة من ملفك إلى Firebase بنجاح.`,
                    background: '#151921',
                    color: '#fff'
                });
                status.innerText = "اكتمل الرفع بنجاح ✅";
            } catch (e) {
                Swal.fire('فشل الرفع', e.message, 'error');
                status.innerText = "حدث خطأ أثناء الرفع ❌";
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        };
    </script>
</body>
</html>
