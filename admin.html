<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';

        onAuthStateChanged(auth, (user) => {
            if (user) loadQuestions();
            else signInAnonymously(auth);
        });

        // دالة لجلب الأسئلة وعرضها
        async function loadQuestions() {
            const list = document.getElementById('list');
            list.innerHTML = '<div class="text-center p-10 opacity-50"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>جاري مزامنة البيانات...</div>';
            
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                const snap = await getDocs(qRef);
                list.innerHTML = "";
                
                if(snap.empty) {
                    list.innerHTML = '<div class="text-center p-10 opacity-30">لا توجد أسئلة حالياً.</div>';
                    return;
                }

                snap.forEach(d => {
                    const q = d.data();
                    const card = document.createElement('div');
                    card.className = "bg-slate-800/50 border border-slate-700 p-4 rounded-2xl mb-3 flex justify-between items-center group hover:border-amber-500/50 transition-all";
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex gap-2 mb-1">
                                <span class="text-[9px] bg-amber-500 text-black px-2 py-0.5 rounded-full font-bold">${q.category}</span>
                                <span class="text-[9px] bg-blue-500 text-white px-2 py-0.5 rounded-full font-bold">${q.subCategory}</span>
                            </div>
                            <div class="text-sm font-bold text-white">${q.t}</div>
                            <div class="text-[10px] text-emerald-400 mt-1">الإجابة: ${q.a[q.c]}</div>
                        </div>
                        <button onclick="deleteQ('${d.id}')" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                list.innerHTML = '<div class="text-red-400 p-5 text-center">خطأ في الاتصال بقاعدة البيانات</div>';
            }
        }

        window.deleteQ = async (id) => {
            if(!confirm("حذف السؤال نهائياً؟")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
            loadQuestions();
        };

        window.loadQuestions = loadQuestions;

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .ultra-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto min-h-screen flex flex-col">

    <header class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-black text-amber-500">لوحة التحكم <span class="text-white">ULTRA</span></h1>
            <p class="text-[10px] text-slate-400 font-bold tracking-[0.2em] uppercase">إدارة بنك الأسئلة السحابي</p>
        </div>
        <button onclick="loadQuestions()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-amber-500 hover:text-black transition-all">
            <i class="fas fa-sync-alt"></i>
        </button>
    </header>

    <div class="ultra-card p-6 rounded-[2.5rem] shadow-2xl flex-1 flex flex-col overflow-hidden">
        <div class="flex items-center justify-between mb-6">
            <h2 class="font-black text-lg flex items-center gap-2">
                <i class="fas fa-database text-amber-500"></i>
                بنك الأسئلة
            </h2>
            <div id="count" class="text-xs font-bold bg-white/5 px-3 py-1 rounded-full border border-white/10 text-slate-400">
                مزامنة...
            </div>
        </div>

        <div id="list" class="flex-1 overflow-y-auto space-y-1 pr-2">
            <!-- القائمة تظهر هنا -->
        </div>
    </div>

    <footer class="mt-6 text-center">
        <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">تحديث البيانات يتم تلقائياً من السحابة</p>
    </footer>

</body>
</html>
