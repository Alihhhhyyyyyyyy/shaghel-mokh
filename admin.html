<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity - المحرك المفعل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Arabic:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --glow: #00fff2; --bg: #020b1a; }
        body { font-family: 'Noto Sans Arabic', sans-serif; background: var(--bg); color: #cbd5e1; }
        .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(0, 255, 242, 0.15); box-shadow: 0 0 30px rgba(0, 255, 242, 0.05); }
        .neon-btn { transition: 0.3s; background: var(--glow); color: black; font-weight: 900; }
        .neon-btn:hover { box-shadow: 0 0 20px var(--glow); transform: translateY(-2px); }
        .neon-btn:disabled { background: #1e293b; color: #475569; box-shadow: none; cursor: not-allowed; }
        .log-box { font-family: 'Courier New', monospace; font-size: 0.75rem; border-right: 2px solid var(--glow); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="max-w-4xl w-full glass-card p-8 rounded-[40px] relative">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <div>
                <h1 class="text-2xl font-black text-white flex items-center gap-3">
                    <span class="w-3 h-3 bg-cyan-400 rounded-full pulse"></span>
                    محرك التوليد النشط
                </h1>
                <p class="text-[10px] text-cyan-400/60 mt-1 font-mono uppercase tracking-[2px]">Status: Ready for Deployment</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-500 block uppercase font-bold">Total Content</span>
                <span id="db-count" class="text-3xl font-black text-white italic">0</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <button id="inject-btn" onclick="masterInject(50)" class="neon-btn py-5 rounded-2xl flex items-center justify-center gap-3 text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                حقن 50 سؤال جديد
            </button>
            <div class="bg-black/40 p-5 rounded-2xl border border-white/5 flex flex-col justify-center">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-slate-400 uppercase">وضع التشغيل التلقائي</span>
                    <label class="inline-flex relative items-center cursor-pointer">
                        <input type="checkbox" id="auto-toggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-cyan-500 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                    </label>
                </div>
                <p id="mode-desc" class="text-[10px] text-slate-500 italic">يتم الآن التحكم في البيانات يدوياً فقط.</p>
            </div>
        </div>

        <!-- Progress and Logs -->
        <div class="space-y-4">
            <div id="progress-area" class="hidden">
                <div class="flex justify-between text-[10px] mb-2 font-bold text-cyan-400">
                    <span id="progress-label">جاري استدعاء الذكاء الاصطناعي...</span>
                    <span id="progress-val">0%</span>
                </div>
                <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-cyan-400 w-0 transition-all duration-500"></div>
                </div>
            </div>

            <div id="logs" class="h-48 overflow-y-auto bg-black/60 rounded-2xl p-4 log-box text-slate-400 space-y-1 scrollbar-hide">
                <div class="text-cyan-500/50">>> System check: ALL GREEN</div>
                <div class="text-cyan-500/50">>> Waiting for command...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Variable handling
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-pro';
        const apiKey = ""; // Environment provided

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const logs = document.getElementById('logs');
        const dbCount = document.getElementById('db-count');
        const injectBtn = document.getElementById('inject-btn');
        const progArea = document.getElementById('progress-area');
        const progBar = document.getElementById('progress-bar');
        const progVal = document.getElementById('progress-val');
        const progLabel = document.getElementById('progress-label');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type === 'err' ? 'text-red-400 font-bold' : (type === 'success' ? 'text-cyan-400' : 'text-slate-500');
            div.innerHTML = `<span class="opacity-20 mr-2">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        // Initialize Auth FIRST (Rule 3)
        const initAuth = async () => {
            log("جاري محاولة الاتصال بالخادم...");
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                log("فشل الاتصال بالأمان: " + e.message, "err");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                log("متصل بنجاح كمسؤول للنظام.", "success");
                setupSync(user.uid);
            }
        });

        // Sync DB Count
        function setupSync(uid) {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
            onSnapshot(colRef, (snap) => {
                dbCount.innerText = snap.size;
                log(`تم تحديث إجمالي الأسئلة: ${snap.size}`);
            }, (err) => {
                log("خطأ في المزامنة: " + err.message, "err");
            });
        }

        async function fetchWithRetry(url, payload, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay * Math.pow(2, i)));
                }
            }
        }

        window.masterInject = async (amt) => {
            if (!auth.currentUser) {
                log("يجب الانتظار حتى اكتمال الاتصال!", "err");
                return;
            }

            injectBtn.disabled = true;
            progArea.classList.remove('hidden');
            progBar.style.width = "10%";
            progVal.innerText = "10%";
            progLabel.innerText = "جاري قراءة البيانات القديمة...";

            try {
                // Get existing questions to prevent duplicates (Rule 2: simple fetch)
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
                const existing = snap.docs.slice(-50).map(d => d.data().t);

                progBar.style.width = "30%";
                progVal.innerText = "30%";
                progLabel.innerText = "جاري استدعاء Gemini AI لإنشاء الأسئلة...";

                const prompt = `Generate exactly ${amt} unique Arabic trivia questions for a quiz game. 
                Categories: (History, Science, Geography, Tech, Sports, Islam).
                Format: JSON Array of objects {category, t, a, c, x}. 
                t: Question, a: Correct answer, c: [3 wrong answers], x: Explanation.
                Rule: DO NOT duplicate any of these: [${existing.join(', ')}].`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const result = await fetchWithRetry(url, {
                    contents: [{ parts: [{ text: "Start" }] }],
                    systemInstruction: { parts: [{ text: prompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                });

                const jsonText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!jsonText) throw new Error("لم يتم تلقي بيانات من الذكاء الاصطناعي.");
                
                const questions = JSON.parse(jsonText);
                progBar.style.width = "70%";
                progVal.innerText = "70%";
                progLabel.innerText = `تم توليد ${questions.length} سؤال. جاري الحفظ في السحابة...`;

                const batch = writeBatch(db);
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                
                questions.forEach(q => {
                    const newDoc = doc(colRef);
                    batch.set(newDoc, q);
                });

                await batch.commit();

                progBar.style.width = "100%";
                progVal.innerText = "100%";
                progLabel.innerText = "اكتملت العملية بنجاح!";
                log(`تم حقن ${questions.length} سؤال جديد بنجاح!`, "success");

            } catch (e) {
                log("فشل النظام: " + e.message, "err");
            } finally {
                setTimeout(() => {
                    progArea.classList.add('hidden');
                    injectBtn.disabled = false;
                    progBar.style.width = "0%";
                }, 3000);
            }
        };

        // Initialize
        initAuth();

    </script>
</body>
</html>
