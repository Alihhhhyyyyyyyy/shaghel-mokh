<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الرفع المباشر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-ultra';

        // الدالة السحرية: تقرأ الملف وترفعه فوراً
        window.syncQuestionsDirectly = async () => {
            const btn = document.getElementById('btn-sync');
            const status = document.getElementById('sync-status');
            const cat = document.getElementById('main-cat').value;
            const sub = document.getElementById('sub-cat').value;

            if(!sub) return alert("يرجى كتابة اسم الفرع أولاً");

            btn.disabled = true;
            btn.innerHTML = `<span>جاري المزامنة...</span> <div class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></div>`;
            status.innerText = "جاري قراءة الملف المحلى questions.json...";

            try {
                // 1. جلب الملف المرتبط كودياً
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error("لم يتم العثور على ملف questions.json في المجلد");
                
                const data = await response.json();

                // 2. الرفع إلى Firebase
                const docData = {
                    category: cat,
                    subCategory: sub,
                    questions: data,
                    uploadDate: new Date().toLocaleString('ar-EG')
                };

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), docData);

                status.innerHTML = `<span class="text-emerald-400 font-bold">✅ تمت المزامنة بنجاح! تم رفع ${data.length} سؤال.</span>`;
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span class="text-red-400 font-bold">❌ خطأ: ${err.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "تحديث ورفع الأسئلة الآن 🚀";
            }
        };
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: #f8fafc; }
        .admin-card { background: linear-gradient(145deg, #0f172a, #1e293b); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 40px; }
        input, select { background: #020617 !important; border: 1px solid #334155 !important; color: white !important; border-radius: 15px !important; padding: 15px !important; width: 100%; }
        label { font-size: 14px; font-weight: bold; color: #94a3b8; margin-bottom: 10px; display: block; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-xl w-full">
        <div class="admin-card p-10 shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-indigo-600/10 rounded-3xl mb-4">
                    <span class="text-4xl">⚡</span>
                </div>
                <h1 class="text-3xl font-black">تحديث البيانات الفوري</h1>
                <p class="text-slate-400 mt-2">سيتم رفع الأسئلة مباشرة من ملف <code class="text-indigo-400">questions.json</code></p>
            </div>

            <div class="space-y-6">
                <div>
                    <label>القسم المستهدف</label>
                    <select id="main-cat">
                        <option value="إسلاميات">إسلاميات 🌙</option>
                        <option value="علوم وطبيعة">علوم وطبيعة 🧪</option>
                        <option value="جغرافيا">جغرافيا 🌍</option>
                        <option value="تاريخ">تاريخ 📜</option>
                        <option value="رياضة">رياضة ⚽</option>
                        <option value="ثقافة عامة">ثقافة عامة 💡</option>
                    </select>
                </div>

                <div>
                    <label>اسم الفرع الجديد</label>
                    <input type="text" id="sub-cat" placeholder="مثال: معلومات عامة 2026">
                </div>

                <button id="btn-sync" onclick="syncQuestionsDirectly()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black text-xl shadow-lg shadow-indigo-500/20 transition-all active:scale-95 flex justify-center items-center">
                    تحديث ورفع الأسئلة الآن 🚀
                </button>

                <div id="sync-status" class="text-center text-sm text-slate-500 min-h-[20px]">
                    جاهز للمزامنة...
                </div>
            </div>
        </div>

        <p class="text-center text-[10px] text-slate-600 mt-6 uppercase tracking-widest">تأكد من وجود الملف بجانب صفحة الـ Admin</p>
    </div>

</body>
</html>
