<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شغل مخك - لوحة تحكم Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; border: 2px solid #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 18px; width: 100%; margin: 10px 0; font-weight: bold; }
        button:hover { background: #2563eb; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; font-weight: bold; }
        .loader { color: #60a5fa; }
        .success { color: #4ade80; border: 1px solid #4ade80; }
        .error { color: #f87171; border: 1px solid #f87171; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🚀 إدارة Firestore</h1>
        <p>تحديث قاعدة البيانات من GitHub</p>
        
        <button onclick="syncData()">تحديث الأسئلة الآن 🔄</button>
        
        <div id="status">جاهز للتحديث...</div>
    </div>

    <script src="https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/main/questions.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          messagingSenderId: "167435076773",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
          measurementId: "G-EPJ1MGWBQW"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function syncData() {
            const status = document.getElementById('status');
            status.className = "loader";
            status.innerText = "⏳ جاري الرفع إلى Firestore...";

            try {
                // التأكد إن المتغير allQuestions موجود في ملفك
                if (typeof allQuestions === 'undefined') {
                    throw new Error("لم يتم العثور على الأسئلة في ملف GitHub");
                }

                // رفع الأقسام واحد ورا التاني
                for (const key in allQuestions) {
                    await db.collection("quiz").doc(key).set(allQuestions[key]);
                }

                status.className = "success";
                status.innerText = "✅ تم تحديث Firestore بنجاح!";
            } catch (err) {
                console.error(err);
                status.className = "error";
                status.innerText = "❌ فشل: " + err.message;
            }
        }
    </script>
</body>
</html>
