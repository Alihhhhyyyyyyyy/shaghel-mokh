<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة المحتوى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';

        onAuthStateChanged(auth, (user) => {
            if (user) loadData();
            else signInAnonymously(auth);
        });

        // دالة لجلب البيانات وتحديث الإحصائيات
        async function loadData() {
            const list = document.getElementById('list');
            const statsContainer = document.getElementById('stats-content');
            const totalDisplay = document.getElementById('total-questions');
            
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
                const stats = {};
                list.innerHTML = "";
                totalDisplay.innerText = snap.size;

                snap.forEach(d => {
                    const q = d.data();
                    const cat = q.category || "غير مصنف";
                    stats[cat] = (stats[cat] || 0) + 1;

                    const item = document.createElement('div');
                    item.className = "p-3 bg-slate-800/40 border border-slate-700/50 rounded-xl mb-2 flex justify-between items-center text-xs";
                    item.innerHTML = `<div><div class="text-amber-500 font-bold">${q.category} > ${q.subCategory}</div><div class="text-white opacity-90">${q.t}</div></div><button onclick="deleteQ('${d.id}')" class="text-red-500 p-2"><i class="fas fa-trash-alt"></i></button>`;
                    list.appendChild(item);
                });

                statsContainer.innerHTML = "";
                Object.keys(stats).forEach(cat => {
                    const statBox = document.createElement('div');
                    statBox.className = "bg-slate-700/30 p-2 rounded-xl border border-white/5 text-center min-w-[80px]";
                    statBox.innerHTML = `<div class="text-[9px] text-slate-400 font-bold uppercase">${cat}</div><div class="text-lg font-black text-amber-500">${stats[cat]}</div>`;
                    statsContainer.appendChild(statBox);
                });
            } catch (e) { console.error(e); }
        }

        // دالة حفظ الأسئلة من النص المنسوخ
        window.saveManual = async () => {
            const jsonInput = document.getElementById('jsonInput').value;
            const topic = document.getElementById('topic').value.trim();
            const status = document.getElementById('status');
            
            if(!jsonInput || !topic) return alert("امسح الخانات واكتب الموضوع والأسئلة!");
            
            status.innerHTML = "⏳ جاري الحفظ في القاعدة...";
            const [cat, sub] = topic.split('-').map(s => s.trim());

            try {
                const questions = JSON.parse(jsonInput);
                for (const q of questions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q, category: cat, subCategory: sub || cat, createdAt: Date.now()
                    });
                }
                status.innerHTML = "🎉 مبروك! تم إضافة الأسئلة بنجاح.";
                document.getElementById('jsonInput').value = "";
                loadData();
            } catch (e) {
                status.innerHTML = "❌ خطأ في تنسيق الكود المنسوخ.";
            }
        };

        window.deleteQ = async (id) => {
            if(confirm("حذف؟")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
                loadData();
            }
        };

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        textarea { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 10px; width: 100%; color: #94a3b8; font-family: monospace; font-size: 10px; resize: none; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto min-h-screen flex flex-col">

    <div class="glass p-5 mb-4">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-black text-amber-500 uppercase tracking-widest">إحصائيات الأقسام</h2>
            <div class="text-[10px] bg-amber-500/10 text-amber-500 px-3 py-1 rounded-full border border-amber-500/20">
                إجمالي الأسئلة: <span id="total-questions" class="font-black">0</span>
            </div>
        </div>
        <div id="stats-content" class="flex gap-2 overflow-x-auto pb-2">
            <!-- إحصائيات الأقسام -->
        </div>
    </div>

    <div class="glass p-5 mb-4">
        <h3 class="text-xs font-black mb-3 text-blue-400">إضافة أسئلة (نظام الحقن)</h3>
        <input type="text" id="topic" placeholder="الموضوع (مثال: رياضة - أهلي وزمالك)" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-3 text-white text-sm outline-none">
        
        <label class="text-[10px] text-slate-500 block mb-1 font-bold">انسخ الأسئلة من الدردشة وضعها هنا:</label>
        <textarea id="jsonInput" rows="4" placeholder='[{"t":"السؤال","a":[".."],"c":0}]'></textarea>
        
        <button onclick="saveManual()" class="w-full bg-amber-500 text-black font-black py-4 rounded-xl mt-4 active:scale-95 transition-all text-sm">
             حفظ في قاعدة البيانات <i class="fas fa-database mr-1"></i>
        </button>
        <div id="status" class="text-center text-[10px] mt-2 font-bold text-blue-400 min-h-[14px]"></div>
    </div>

    <div class="glass p-5 flex-1 flex flex-col overflow-hidden">
        <h3 class="text-xs font-black mb-3 opacity-50 uppercase tracking-tighter">الأسئلة الحالية</h3>
        <div id="list" class="flex-1 overflow-y-auto space-y-1 pr-1"></div>
    </div>

</body>
</html>
