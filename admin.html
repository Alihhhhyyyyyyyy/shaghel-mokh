<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE ADMIN | Precision v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #f59e0b; --bg: #020617; }
        body { 
            font-family: 'Tajawal', sans-serif; background: var(--bg); color: #f1f5f9; 
            background-image: radial-gradient(circle at 2px 2px, rgba(245, 158, 11, 0.05) 1px, transparent 0);
            background-size: 30px 30px;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05); border-top: 3px solid var(--accent);
        }
        .cyber-button {
            background: linear-gradient(45deg, #b45309, #f59e0b);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
            transition: all 0.3s;
        }
        .cyber-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .branch-pill { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .scroll-custom::-webkit-scrollbar { width: 5px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center rotate-3 shadow-lg">
                    <i class="fas fa-microchip text-slate-900 text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight italic">SUPREME <span class="text-amber-500 tracking-widest uppercase text-xl">Architect</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold tracking-widest mt-1">STRUCTURAL DATA INJECTION v3.0</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="glass-panel px-8 py-4 rounded-3xl text-center">
                    <span class="text-[9px] text-slate-500 block font-black uppercase mb-1">Total Bank</span>
                    <span id="count-display" class="text-3xl font-black mono italic text-white">0000</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left: Control & Logs -->
            <div class="lg:col-span-8 space-y-8">
                <div class="glass-panel p-10 rounded-[40px] relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-3xl font-black mb-4">وحدة الحقن الهيكلي</h2>
                        <p class="text-slate-400 text-sm mb-8 leading-relaxed max-w-xl">
                            النظام مبرمج لتوليد <span class="text-amber-500 font-bold">40 سؤالاً</span> مقسمة بالتساوي على <span class="text-amber-500 font-bold">8 موضوعات</span>، مع تغطية شاملة لـ <span class="text-amber-500 font-bold">24 فرعاً فرعياً</span> (سؤال أو اثنين لكل فرع).
                        </p>

                        <div class="flex gap-4 mb-8">
                            <button id="main-btn" onclick="startPreciseGeneration()" class="cyber-button flex-[4] py-8 text-2xl font-black text-slate-900 uppercase italic">
                                Run Deployment Cycle
                            </button>
                            <button id="stop-btn" onclick="abortMission()" class="hidden bg-red-600/10 border border-red-500/50 text-red-500 rounded-2xl flex-1 font-black text-xs uppercase hover:bg-red-500 hover:text-white transition-all">
                                <i class="fas fa-hand-paper block text-lg mb-1"></i> Stop
                            </button>
                        </div>

                        <div id="prog-area" class="hidden">
                            <div class="flex justify-between items-end mb-3">
                                <span id="prog-label" class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Processing...</span>
                                <span id="prog-pct" class="mono text-3xl font-black">0%</span>
                            </div>
                            <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden">
                                <div id="prog-bar" class="h-full bg-amber-500 w-0 transition-all duration-700 shadow-[0_0_15px_#fbbf24]"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Terminal -->
                <div class="bg-black/80 p-8 rounded-[40px] border border-white/5">
                    <div id="terminal" class="h-56 overflow-y-auto scroll-custom mono text-[11px] space-y-2 text-slate-500 leading-relaxed">
                        <div>>> System active. Waiting for architect command...</div>
                    </div>
                </div>
            </div>

            <!-- Right: Detailed Metrics -->
            <div class="lg:col-span-4">
                <div class="glass-panel p-8 rounded-[40px] border-t-4 border-amber-500">
                    <h3 class="font-black mb-8 flex justify-between items-center">
                        <span>مراقبة الفروع (24)</span>
                        <i class="fas fa-layer-group text-amber-500"></i>
                    </h3>
                    <div id="metrics-grid" class="space-y-6 overflow-y-auto max-h-[600px] scroll-custom pr-2">
                        <!-- Content via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "", // تملأ آلياً
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const GEMINI_KEY = ""; // تملأ آلياً
        const APP_ID = "shaghel-mokh-ultra-v2";

        // الهيكل الدقيق لمشروعك
        const structure = {
            "الإسلاميات": ["القرآن الكريم", "السيرة النبوية", "تاريخ الخلفاء"],
            "تاريخ مصر": ["العصر الفرعوني", "مصر الإسلامية", "التاريخ الحديث"],
            "علوم عامة": ["الفضاء والكون", "جسم الإنسان", "فيزياء وكيمياء"],
            "جغرافيا": ["عواصم العالم", "بحار ومحيطات", "تضاريس"],
            "تكنولوجيا": ["الذكاء الاصطناعي", "تاريخ الحواسيب", "الاختراعات الحديثة"],
            "رياضة": ["كرة القدم", "الألعاب الأولمبية", "أرقام قياسية"],
            "أدب وثقافة": ["روايات عالمية", "شعر عربي", "حكم وأمثال"],
            "فنون": ["سينما ومسرح", "لوحات شهيرة", "موسيقى"]
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let abortController = null;

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            const colors = { info: '', success: 'text-emerald-400', err: 'text-red-500', sys: 'text-amber-500 font-bold' };
            div.className = colors[type];
            div.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            const terminal = document.getElementById('terminal');
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function updateUI(val, label) {
            document.getElementById('prog-area').classList.remove('hidden');
            document.getElementById('prog-bar').style.width = val + '%';
            document.getElementById('prog-pct').innerText = val + '%';
            document.getElementById('prog-label').innerText = label;
        }

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                log("ARCHITECT_AUTHORIZED", "success");
                onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'), (snap) => {
                    document.getElementById('count-display').innerText = snap.size.toString().padStart(4, '0');
                    renderDetailedMetrics(snap.docs.map(d => d.data()));
                });
            }
        });

        function renderDetailedMetrics(data) {
            const container = document.getElementById('metrics-grid');
            container.innerHTML = '';
            
            for (const [main, branches] of Object.entries(structure)) {
                let mainCount = data.filter(q => q.category === main).length;
                let html = `
                    <div class="space-y-3">
                        <div class="flex justify-between items-center px-1">
                            <span class="text-xs font-black text-white">${main}</span>
                            <span class="mono text-[10px] text-amber-500 bg-amber-500/10 px-2 py-0.5 rounded">${mainCount}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2">`;
                
                branches.forEach(br => {
                    // نفترض أن x هو حقل "الفرع" في قاعدة بياناتك
                    let brCount = data.filter(q => q.category === main && q.branch === br).length;
                    html += `
                        <div class="branch-pill p-2 rounded-xl text-center">
                            <span class="text-[8px] text-slate-500 block truncate mb-1">${br}</span>
                            <span class="mono text-[10px] font-bold">${brCount}</span>
                        </div>`;
                });

                html += `</div></div><div class="h-px bg-white/5 w-full"></div>`;
                container.innerHTML += html;
            }
        }

        window.startPreciseGeneration = async () => {
            const btn = document.getElementById('main-btn');
            const stop = document.getElementById('stop-btn');
            btn.disabled = true;
            stop.classList.remove('hidden');
            abortController = new AbortController();
            
            log("INITIATING_STRUCTURAL_CYCLE...", "sys");

            try {
                updateUI(20, "SCANNING_REDUNDANCY...");
                const qSnap = await getDocs(query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'), limit(30)));
                const history = qSnap.docs.map(d => d.data().t);

                updateUI(50, "GENERATE_40_PRECISION_ASSETS...");
                
                const prompt = `
                Generate exactly 40 Arabic quiz questions.
                Structure: 8 Main Topics, 5 questions each.
                Inside each Topic, rotate between 3 sub-branches.
                Topics & Branches: ${JSON.stringify(structure)}.
                Rules: 4 options, c is index (0-3), no duplicates from: ${history.join(', ')}.
                Response: JSON Array [{category, branch, t, a, c, x}]. (x is additional info).`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    }),
                    signal: abortController.signal
                });

                if(!res.ok) throw new Error("UPSTREAM_FAIL");
                const resData = await res.json();
                const items = JSON.parse(resData.candidates[0].content.parts[0].text);

                updateUI(85, "COMMITTING_BATCH...");
                const batch = writeBatch(db);
                items.forEach(i => {
                    const ref = doc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'));
                    batch.set(ref, i);
                });
                await batch.commit();

                updateUI(100, "STABILIZED");
                log(`INJECTED 40 QUESTIONS ACROSS 24 BRANCHES.`, "success");

            } catch (err) {
                if(err.name === 'AbortError') log("CYCLE_ABORTED", "err");
                else log("CRITICAL_ERR: " + err.message, "err");
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    stop.classList.add('hidden');
                    document.getElementById('prog-area').classList.add('hidden');
                }, 3000);
            }
        };

        window.abortMission = () => {
            if(abortController) abortController.abort();
        };
    </script>
</body>
</html>
