<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - شغل مخك (المطورة)</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { color: var(--primary); margin-bottom: 10px; }
        p { color: #94a3b8; }

        .stats-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 25px 0;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 15px;
        }

        .stat-item {
            padding: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .stat-item span { display: block; font-size: 0.9rem; color: #94a3b8; }
        .stat-item b { font-size: 1.2rem; color: white; }

        button {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>تحديث قاعدة البيانات ⚙️</h1>
    <p>سيتم قراءة البيانات من ملف <b>questions.js</b> وتقسيمها لفروع تلقائياً.</p>

    <div id="stats" class="stats-box">
        </div>

    <button id="upload-btn" onclick="syncData()">رفع الأسئلة الآن 🚀</button>

    <div id="status"></div>
</div>

<script src="questions.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // نفس بيانات الـ Firebase بتاعتك
    const firebaseConfig = {
      apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
      authDomain: "shaghel-mokh-ultra.firebaseapp.com",
      projectId: "shaghel-mokh-ultra",
      databaseURL: "https://shaghel-mokh-ultra-default-rtdb.firebaseio.com",
      storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
      messagingSenderId: "167435076773",
      appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // دالة لتحليل البيانات قبل الرفع
    function initStats() {
        if (typeof allQuestions !== 'undefined') {
            const statsDiv = document.getElementById('stats');
            const categories = {};
            
            allQuestions.forEach(q => {
                categories[q.category] = (categories[q.category] || 0) + 1;
            });

            statsDiv.innerHTML = `<div class="stat-item"><span>الإجمالي</span><b>${allQuestions.length} سؤال</b></div>`;
            for (let cat in categories) {
                statsDiv.innerHTML += `<div class="stat-item"><span>${cat}</span><b>${categories[cat]}</b></div>`;
            }
        } else {
            alert("خطأ: لم يتم العثور على مصفوفة allQuestions في ملف questions.js");
        }
    }

    // دالة الرفع
    async function syncData() {
        const btn = document.getElementById('upload-btn');
        const statusDiv = document.getElementById('status');
        
        btn.disabled = true;
        statusDiv.style.display = "block";
        statusDiv.style.background = "#334155";
        statusDiv.innerHTML = '<div class="loader"></div> جاري الرفع...';

        try {
            // رفع المصفوفة بالكامل للـ Firebase
            await set(ref(db, 'questions/'), allQuestions);
            
            statusDiv.style.background = "#065f46";
            statusDiv.innerHTML = "✅ تمت العملية بنجاح! تم تحديث " + allQuestions.length + " سؤال.";
            btn.disabled = false;
        } catch (error) {
            statusDiv.style.background = "#7f1d1d";
            statusDiv.innerHTML = "❌ فشل الرفع: " + error.message;
            btn.disabled = false;
        }
    }

    // تشغيل الإحصائيات عند الفتح
    window.onload = initStats;
    window.syncData = syncData;
</script>

</body>
</html>
