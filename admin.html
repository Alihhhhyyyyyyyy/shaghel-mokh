<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - مولد الأسئلة الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعداداتك اللي بعتها
        const firebaseConfig = {
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';

        // دالة توليد الأسئلة باستخدام Gemini
        window.generateWithAI = async () => {
            const topic = document.getElementById('topic').value;
            const count = document.getElementById('count').value;
            const status = document.getElementById('status');
            const apiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA"; // مفتاحك

            if(!topic) return alert("اكتب الموضوع الأول!");

            status.innerText = "⏳ جاري استدعاء العبقري الاصطناعي...";
            
            const prompt = `أريد ${count} أسئلة عن "${topic}" بصيغة JSON فقط.
            التنسيق المطلوب لكل كائن هو:
            {
                "t": "نص السؤال",
                "a": ["اختيار1", "اختيار2", "اختيار3", "اختيار4"],
                "c": رقم الإجابة الصحيحة يبدأ من 0,
                "x": "تحليل السؤال ومعلومة إضافية عنه",
                "category": "إسلاميات" أو "تقنية" أو "جغرافيا" الخ.. حسب الموضوع
            }
            ملاحظة: لا تكتب أي كلام خارج مصفوفة الـ JSON.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let textResponse = data.candidates[0].content.parts[0].text;
                
                // تنظيف الرد من علامات الـ Markdown إذا وجدت
                textResponse = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                const cleanQuestions = JSON.parse(textResponse);

                status.innerText = `✅ تم توليد ${cleanQuestions.length} سؤال. جاري الحفظ في Firebase...`;

                // حفظ الأسئلة في Firestore
                for (const q of cleanQuestions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), q);
                }

                status.innerText = "🚀 تمت العملية بنجاح! الأسئلة الآن في لعبتك.";
                alert("تمت إضافة الأسئلة بنجاح!");
            } catch (error) {
                console.error(error);
                status.innerText = "❌ حدث خطأ.. تأكد من الكونسول";
            }
        };
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0a0a0a; color: white; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-[#111] p-8 rounded-[40px] border border-white/5 w-full max-w-md shadow-2xl">
        <h1 class="text-3xl font-black text-amber-500 mb-6 text-center">إدارة الأسئلة الذكية 🤖</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">موضوع الأسئلة</label>
                <input type="text" id="topic" placeholder="مثلاً: تاريخ الأندلس" 
                       class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-amber-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">عدد الأسئلة</label>
                <input type="number" id="count" value="5" max="10"
                       class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-amber-500 transition">
            </div>

            <button onclick="generateWithAI()" 
                    class="w-full py-5 bg-amber-500 text-black font-black rounded-3xl text-xl shadow-lg active:scale-95 transition">
                توليد وحفظ تلقائي ✨
            </button>

            <div id="status" class="text-center text-sm font-bold text-slate-400 mt-4"></div>
        </div>
    </div>

</body>
</html>
