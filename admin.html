<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحقن التلقائي بالذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: #f8fafc; }
        .ai-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.3); }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-3xl w-full">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 bg-slate-900/50 p-6 rounded-[32px] border border-white/5">
            <div>
                <h1 class="text-2xl font-black text-emerald-400">محرك الحقن الذكي</h1>
                <p class="text-slate-400 text-sm mt-1">يعمل بنظام Gemini 2.5 Flash للنمذجة التلقائية</p>
            </div>
            <div id="status-badge" class="px-4 py-2 bg-slate-800 rounded-full text-xs font-bold flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                جاري الفحص...
            </div>
        </div>

        <!-- Progress Card -->
        <div class="bg-slate-900 rounded-[40px] p-8 mb-6 ai-glow relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <span class="text-4xl font-black block" id="counter">0</span>
                        <span class="text-slate-500 text-sm font-bold">سؤال في قاعدة البيانات</span>
                    </div>
                    <div class="text-right">
                        <span class="text-emerald-500 font-bold block" id="action-label">فحص الحالة...</span>
                    </div>
                </div>
                
                <div class="w-full h-4 bg-slate-800 rounded-full overflow-hidden mb-2">
                    <div id="progress" class="progress-bar h-full bg-emerald-500 w-0"></div>
                </div>
                <p class="text-[10px] text-slate-500 text-center uppercase tracking-widest">Database Sync Terminal</p>
            </div>
        </div>

        <!-- Logs Terminal -->
        <div class="bg-black/40 rounded-[24px] border border-white/5 p-4 h-64 overflow-hidden flex flex-col">
            <div class="flex items-center gap-2 mb-3 border-b border-white/5 pb-2">
                <div class="flex gap-1">
                    <div class="w-2 h-2 rounded-full bg-red-500/50"></div>
                    <div class="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                    <div class="w-2 h-2 rounded-full bg-green-500/50"></div>
                </div>
                <span class="text-[10px] text-slate-500 font-mono">SYSTEM_LOGS</span>
            </div>
            <div id="logs" class="log-container flex-1 overflow-y-auto font-mono text-xs text-slate-400 space-y-1">
                <div>[SYSTEM] Initializing automated engine...</div>
            </div>
        </div>

        <!-- Control Area -->
        <div class="mt-6 flex gap-3">
            <button id="force-gen" class="flex-1 py-4 bg-white text-black font-black rounded-2xl hover:bg-emerald-400 transition-colors disabled:opacity-50">
                توليد أسئلة إضافية بالذكاء الاصطناعي 🤖
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-auto-v1';
        const apiKey = ""; // API Key supplied by environment

        const logs = document.getElementById('logs');
        const counter = document.getElementById('counter');
        const progress = document.getElementById('progress');
        const actionLabel = document.getElementById('action-label');
        const statusBadge = document.getElementById('status-badge');
        const forceBtn = document.getElementById('force-gen');

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            const colors = { info: 'text-slate-400', success: 'text-emerald-400', error: 'text-red-400', ai: 'text-purple-400' };
            div.className = colors[type];
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        async function fetchQuestionsCount() {
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                const snap = await getDocs(colRef);
                return snap.size;
            } catch (e) {
                addLog(`Error fetching: ${e.message}`, 'error');
                return 0;
            }
        }

        async function generateWithAI() {
            addLog("Calling Gemini AI to generate unique questions...", "ai");
            actionLabel.innerText = "توليد أسئلة ذكية...";
            
            const systemPrompt = `You are a professional quiz master. Generate 15 unique, high-quality trivia questions in Arabic.
            Categories: (إسلاميات، تاريخ، تقنية، علوم، جغرافيا، رياضة، ألغاز، طعام).
            Format: JSON array of objects.
            Schema: { category: string, subCategory: string, t: string (question), a: string[] (4 options), c: number (index of correct 0-3), x: string (short fun explanation) }
            IMPORTANT: Ensure high diversity and accuracy. Output ONLY the JSON array.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "توليد 15 سؤالاً متنوعاً فوراً" }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const questions = JSON.parse(data.candidates[0].content.parts[0].text);
                addLog(`AI generated ${questions.length} new questions.`, "success");
                return questions;
            } catch (err) {
                addLog("AI Generation failed. Retrying...", "error");
                throw err;
            }
        }

        async function injectBatch(questions) {
            addLog(`Injecting ${questions.length} questions into Firestore...`, "info");
            const batch = writeBatch(db);
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
            
            questions.forEach(q => {
                const newDoc = doc(colRef);
                batch.set(newDoc, q);
            });

            await batch.commit();
            addLog("Batch committed successfully.", "success");
        }

        async function syncProcess() {
            statusBadge.innerHTML = `<span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span> جاري المزامنة...`;
            
            const count = await fetchQuestionsCount();
            counter.innerText = count;
            progress.style.width = `${Math.min((count / 200) * 100, 100)}%`;

            if (count < 100) {
                addLog(`Low question count detected (${count}). Starting auto-injection...`, "info");
                try {
                    const newQuestions = await generateWithAI();
                    await injectBatch(newQuestions);
                    const newCount = await fetchQuestionsCount();
                    counter.innerText = newCount;
                    progress.style.width = `${Math.min((newCount / 200) * 100, 100)}%`;
                    addLog(`Auto-injection complete. Current total: ${newCount}`, "success");
                } catch (e) {
                    addLog("Auto-process failed. Ready for manual trigger.", "error");
                }
            } else {
                addLog("Question database is healthy (>100).", "success");
                actionLabel.innerText = "قاعدة البيانات مكتملة";
            }

            statusBadge.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> نظام مستقر`;
        }

        // Init
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                addLog(`Auth confirmed: ${user.uid}`, "info");
                syncProcess();
            } else {
                addLog("Authenticating...", "info");
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            }
        });

        forceBtn.onclick = async () => {
            forceBtn.disabled = true;
            try {
                const q = await generateWithAI();
                await injectBatch(q);
                await syncProcess();
            } catch(e) {}
            forceBtn.disabled = false;
        };

    </script>
</body>
</html>
