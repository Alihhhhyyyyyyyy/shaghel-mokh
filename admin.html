<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المعاينة والربط | مشروع التخرج</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; border: 1px solid #334155; }
        .status-box { background: #000; padding: 15px; border-radius: 8px; color: #10b981; font-family: monospace; margin: 20px 0; max-height: 200px; overflow-y: auto; }
        .btn-check { background: #6366f1; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; margin-bottom: 10px; }
        .btn-upload { background: #ef4444; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; display: none; }
        .preview-area { background: #334155; padding: 15px; border-radius: 8px; margin-top: 20px; display: none; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>نظام ربط البيانات الذكي 🧠</h2>
    <p>هذا الكود سيقوم بجلب الأسئلة من GitHub ومعاينتها أولاً دون رفعها.</p>

    <button id="checkBtn" class="btn-check" onclick="checkData()">1. جلب البيانات ومعاينتها 🔍</button>
    <button id="uploadBtn" class="btn-upload" onclick="finalUpload()">2. تأكيد الرفع النهائي لـ Firestore 🚀</button>

    <div id="status" class="status-box">في انتظار الأوامر...</div>

    <div id="preview" class="preview-area">
        <h3>ملخص البيانات المستلمة:</h3>
        <ul id="summary-list"></ul>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
        authDomain: "shaghel-mokh-ultra.firebaseapp.com",
        projectId: "shaghel-mokh-ultra",
        storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
        messagingSenderId: "167435076773",
        appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let fetchedData = null;

    function log(msg) {
        const d = document.getElementById('status');
        d.innerHTML += `<div>> ${msg}</div>`;
        d.scrollTop = d.scrollHeight;
    }

    async function checkData() {
        log("بدء الاتصال بالرابط...");
        const url = "https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/refs/heads/main/questions.js";
        
        try {
            const res = await fetch(url);
            const text = await res.text();
            
            // تحليل البيانات
            let dataString = text.trim();
            const start = dataString.indexOf('{');
            const end = dataString.lastIndexOf('}') + 1;
            fetchedData = eval('(' + dataString.substring(start, end) + ')');

            log("تم جلب البيانات بنجاح من GitHub.");
            
            // عرض المعاينة
            const list = document.getElementById('summary-list');
            list.innerHTML = "";
            for (let key in fetchedData) {
                const li = document.createElement('li');
                li.innerText = `قسم: ${fetchedData[key].name} (${fetchedData[key].qs.length} سؤال)`;
                list.appendChild(li);
            }
            
            document.getElementById('preview').style.display = 'block';
            document.getElementById('uploadBtn').style.display = 'block';
            log("تستطيع الآن المراجعة. لن يتم الرفع إلا إذا ضغطت على الزر الأحمر.");

        } catch (e) {
            log("خطأ: " + e.message);
        }
    }

    async function finalUpload() {
        if(!fetchedData) return;
        log("بدء الرفع الفعلي لـ Firestore...");
        
        try {
            const batch = db.batch();
            for (let key in fetchedData) {
                const docRef = db.collection("quiz").doc(key);
                batch.set(docRef, fetchedData[key]);
            }
            await batch.commit();
            log("✅ اكتمل الرفع بنجاح! البيانات الآن على السحابة.");
            document.getElementById('uploadBtn').disabled = true;
        } catch (e) {
            log("فشل الرفع: " + e.message);
        }
    }
</script>

</body>
</html>
