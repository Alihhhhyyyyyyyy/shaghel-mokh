<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العقل المفكر - Ultra Brain</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: #c9d1d9; overflow-x: hidden; }
        .brain-border { border: 1px solid rgba(56, 189, 248, 0.2); transition: 0.3s; }
        .brain-border:hover { border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        .grid-bg { background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .neon-text { text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen grid-bg">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 p-8 rounded-[32px] bg-[#0d1117] border border-[#30363d] shadow-2xl">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-sky-500/10 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🧠</div>
                <div>
                    <h1 class="text-3xl font-black text-white tracking-tight neon-text uppercase">The Brain <span class="text-sky-400">Ultra</span></h1>
                    <p class="text-slate-500 font-mono text-xs mt-1">AI Content Governance System v4.0.2</p>
                </div>
            </div>
            <div class="flex gap-6 mt-6 md:mt-0">
                <div class="text-center">
                    <span class="text-[10px] text-slate-500 block uppercase font-bold">Total Assets</span>
                    <span id="stat-total" class="text-3xl font-black text-white italic">---</span>
                </div>
                <div class="w-[1px] h-12 bg-slate-800"></div>
                <div class="text-center">
                    <span class="text-[10px] text-slate-500 block uppercase font-bold">Health Score</span>
                    <span class="text-3xl font-black text-emerald-400 italic">99%</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar: Categories Health -->
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-[#0d1117] p-6 rounded-[28px] border border-[#30363d]">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase">تحليل التوزيع الحالي</h3>
                    <div id="category-health" class="space-y-3">
                        <div class="animate-pulse h-4 bg-slate-800 rounded w-full"></div>
                        <div class="animate-pulse h-4 bg-slate-800 rounded w-3/4"></div>
                        <div class="animate-pulse h-4 bg-slate-800 rounded w-5/6"></div>
                    </div>
                </div>
                
                <div class="bg-gradient-to-br from-sky-900/40 to-blue-900/40 p-6 rounded-[28px] border border-sky-500/20">
                    <h3 class="font-bold text-white text-sm mb-2">وضع التلقائي</h3>
                    <p class="text-[11px] text-sky-200/60 leading-relaxed">النظام الآن في وضع "الحماية من التكرار الدلالي". سيتم تجاهل أي سؤال مشابه فكرياً لما هو موجود.</p>
                </div>
            </div>

            <!-- Main Panel -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Action Bar -->
                <div class="bg-[#161b22] p-2 rounded-3xl flex flex-wrap gap-2 border border-[#30363d]">
                    <button onclick="runMasterInjection(50)" id="btn-50" class="flex-1 min-w-[120px] py-4 bg-white text-black font-black rounded-2xl hover:bg-sky-400 transition-all active:scale-95">حقن 50 سؤال</button>
                    <button onclick="runMasterInjection(100)" id="btn-100" class="flex-1 min-w-[120px] py-4 bg-slate-800 text-white font-black rounded-2xl hover:bg-slate-700 transition-all active:scale-95">توسعة بـ 100</button>
                    <button onclick="runMasterInjection(300)" id="btn-300" class="flex-1 min-w-[120px] py-4 bg-sky-600 text-white font-black rounded-2xl hover:bg-sky-500 transition-all active:scale-95 shadow-lg shadow-sky-900/20">حقن عملاق 300</button>
                </div>

                <!-- Live Monitor -->
                <div class="bg-[#0d1117] rounded-[32px] border border-[#30363d] overflow-hidden flex flex-col h-[450px]">
                    <div class="px-6 py-4 border-b border-[#30363d] bg-[#161b22] flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span id="live-indicator" class="status-dot bg-slate-500"></span>
                            <span class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">Live Engine Feed</span>
                        </div>
                        <span id="progress-text" class="text-xs font-mono text-sky-500">Idle</span>
                    </div>
                    
                    <div id="terminal" class="flex-1 p-6 overflow-y-auto font-mono text-[11px] space-y-2 custom-scroll bg-black/20">
                        <div class="text-slate-500 italic">// بانتظار بدء العملية...</div>
                    </div>

                    <!-- Micro Progress Bar -->
                    <div class="h-1 w-full bg-slate-900">
                        <div id="master-progress" class="h-full bg-sky-500 w-0 transition-all duration-700 shadow-[0_0_10px_#38bdf8]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const apiKey = ""; 

        const terminal = document.getElementById('terminal');
        const statTotal = document.getElementById('stat-total');
        const masterProgress = document.getElementById('master-progress');
        const progressText = document.getElementById('progress-text');
        const liveIndicator = document.getElementById('live-indicator');
        const catHealth = document.getElementById('category-health');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            const styles = {
                info: 'text-slate-500',
                ai: 'text-sky-400 font-bold',
                success: 'text-emerald-500',
                error: 'text-red-500 blink'
            };
            div.className = styles[type];
            div.innerHTML = `<span class="opacity-40">>></span> ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function fetchAnalysis() {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
            const data = snap.docs.map(d => d.data());
            statTotal.innerText = data.length;
            
            const cats = {};
            data.forEach(q => cats[q.category] = (cats[q.category] || 0) + 1);
            
            catHealth.innerHTML = Object.entries(cats).map(([name, count]) => `
                <div class="flex justify-between items-center text-[10px]">
                    <span class="text-slate-400">${name}</span>
                    <span class="text-white font-bold">${count}</span>
                </div>
                <div class="w-full h-1 bg-slate-800 rounded-full mb-2">
                    <div class="h-full bg-sky-500/40" style="width: ${Math.min(count, 100)}%"></div>
                </div>
            `).join('') || '<div class="text-xs text-slate-600">قاعدة البيانات فارغة</div>';

            return data.map(q => q.t).slice(-50); // آخر 50 سؤال للمنع
        }

        window.runMasterInjection = async (targetCount) => {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            liveIndicator.classList.replace('bg-slate-500', 'bg-emerald-500');
            liveIndicator.classList.add('animate-pulse');

            try {
                log("بدء تحليل القاعدة الحالية لمنع التكرار...", "info");
                const existingTitles = await fetchAnalysis();
                const batches = targetCount / 50;

                for(let i=1; i<=batches; i++) {
                    progressText.innerText = `Processing Batch ${i}/${batches}...`;
                    log(`استدعاء Gemini AI لتوليد الدفعة رقم ${i}...`, "ai");

                    const systemPrompt = `You are an expert trivia engine. Generate exactly 50 unique questions in Arabic.
                    Categories: (إسلاميات، تاريخ، تقنية، علوم، جغرافيا، رياضة، ألغاز، طعام).
                    Rules: 
                    1. ABSOLUTELY NO DUPLICATION with these topics: [${existingTitles.join(', ')}].
                    2. High complexity variety.
                    3. Strict JSON format: Array of {category, subCategory, t, a, c, x}.`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Start generation batch " + i }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const resData = await response.json();
                    const questions = JSON.parse(resData.candidates[0].content.parts[0].text);
                    
                    log(`تم التحقق من الدفعة (${questions.length} سؤال). جاري البدء بالحقن...`, "success");

                    const batch = writeBatch(db);
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                    questions.forEach(q => batch.set(doc(colRef), q));
                    await batch.commit();

                    const progress = (i / batches) * 100;
                    masterProgress.style.width = `${progress}%`;
                    log(`تم حقن الدفعة ${i} بنجاح.`, "success");
                    await fetchAnalysis();
                }

                log("اكتملت العملية الكبرى. العقل المفكر في وضع الاستعداد.", "ai");
                progressText.innerText = "Operation Success";

            } catch (err) {
                log(`فشل في النظام: ${err.message}`, "error");
                progressText.innerText = "Error Occurred";
            } finally {
                buttons.forEach(b => b.disabled = false);
                liveIndicator.classList.replace('bg-emerald-500', 'bg-slate-500');
                liveIndicator.classList.remove('animate-pulse');
            }
        };

        // Initial Boot
        signInAnonymously(auth).then(() => {
            log("تم الاتصال بالعقدة المركزية بنجاح.", "success");
            fetchAnalysis();
        });

    </script>
</body>
</html>
