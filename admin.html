<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع تلقائي سريع ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body { font-family: 'Tajawal', sans-serif; background: #0b0e14; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-[#151921] p-10 rounded-[3rem] border border-white/5 text-center shadow-2xl">
        <h1 class="text-3xl font-black text-yellow-500 mb-4">الرفع التلقائي 🚀</h1>
        <p class="text-gray-400 text-sm mb-8">حط أسئلتك جوه الكود ودوس الزرار ده، وهتترفع كلها للقسم اللي تختاره فوراً.</p>

        <select id="target-cat" class="w-full bg-[#0b0e14] border border-white/10 p-4 rounded-2xl mb-6 outline-none text-yellow-500 font-bold">
            <option value="general">قسم: ثقافة عامة 🧠</option>
            <option value="science">قسم: علوم 🧪</option>
            <option value="sports">قسم: رياضة ⚽</option>
            <option value="islamic">قسم: إسلاميات 🕌</option>
        </select>

        <button onclick="uploadEverything()" id="mega-btn" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-6 rounded-3xl text-xl shadow-lg shadow-yellow-500/20 active:scale-95 transition-all">
            رفع كل الأسئلة الآن 🔥
        </button>

        <div id="loader" class="hidden mt-4 text-xs text-yellow-500 animate-pulse">جاري صب الأسئلة في السحاب...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 📥 حط أسئلتك هنا دفعة واحدة 📥 ---
        const myBigData = [
            { t: "ما هو أكبر كوكب في المجموعة الشمسية؟", a: ["المشتري", "الأرض", "زحل", "المريخ"], c: 0 },
            { t: "كم عدد قارات العالم؟", a: ["7 قارات", "5 قارات", "6 قارات", "8 قارات"], c: 0 },
            { t: "ما هي عاصمة السعودية؟", a: ["الرياض", "جدة", "مكة", "الدمام"], c: 0 },
            { t: "من هو مخترع المصباح الكهربائي؟", a: ["إديسون", "نيوتن", "تسلا", "دا فينشي"], c: 0 },
            { t: "ما هو أسرع حيوان بري؟", a: ["الفهد", "الأسد", "الغزال", "النمر"], c: 0 },
            // زود براحتك هنا... بنفس الشكل ده
        ];

        window.uploadEverything = async function() {
            const cat = document.getElementById('target-cat').value;
            const btn = document.getElementById('mega-btn');
            const loader = document.getElementById('loader');

            btn.disabled = true;
            btn.style.opacity = "0.5";
            loader.classList.remove('hidden');

            try {
                // هيرفع المصفوفة كاملة ويمسح أي قديم في القسم ده (OverWrite) عشان ينجز
                await setDoc(doc(db, "questions", cat), {
                    list: myBigData
                });

                Swal.fire({
                    icon: 'success',
                    title: 'تم الرفع بنجاح!',
                    text: `تم رفع ${myBigData.length} سؤال لقسم ${cat} في ثانية واحدة!`,
                    background: '#151921',
                    color: '#fff',
                    confirmButtonColor: '#f59e0b'
                });
            } catch (e) {
                Swal.fire('خطأ!', e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
                loader.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
