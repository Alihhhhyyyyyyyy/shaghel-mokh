<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #16213e; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #e94560; width: 80%; }
        .btn { background: #e94560; color: white; border: none; padding: 20px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: bold; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <button class="btn" onclick="sync()">تحديث الموقع من GitHub الآن 🚀</button>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            databaseURL: "https://shaghel-mokh-ultra-default-rtdb.firebaseio.com",
            projectId: "shaghel-mokh-ultra"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function sync() {
            const status = document.getElementById('status');
            status.innerText = "⏳ جاري التحديث...";
            
            // رابط ملفك الـ Raw (تأكد إنه شغال في المتصفح)
            const url = "https://raw.githubusercontent.com/Alihhhhyyyyyyyy/shaghel-mokh/main/questions.js?t=" + new Date().getTime();

            try {
                const response = await fetch(url);
                const data = await response.json(); // هنا هيقرأ الملف كـ JSON علطول

                await db.ref('questionsBank').set(data);
                status.innerText = "✅ تم التحديث بنجاح!";
                status.style.color = "#27ae60";
            } catch (err) {
                status.innerText = "❌ فشل: تأكد من تعديل ملف questions.js وحذف أول سطر";
                status.style.color = "#ff4d4d";
            }
        }
    </script>
</body>
</html>
