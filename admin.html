<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شغل مخك | Admin PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #08080a; color: white; }
        .card { background: #111115; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        input, select { background: #000; border: 1px solid #222; color: white; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black text-amber-500">GOD MODE <span class="text-white">PRO</span></h1>
            <p class="text-gray-500 text-sm">نظام حقن الـ 50 سؤال بالذكاء الاصطناعي</p>
        </header>

        <div class="grid gap-6">
            <div class="card p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i class="fas fa-bolt text-yellow-400"></i> حقن 50 سؤال دفعة واحدة
                </h2>
                <div class="flex flex-col gap-4">
                    <select id="cat-select" class="w-full">
                        <option value="isl_prophets">🕌 قصص الأنبياء</option>
                        <option value="his_world">🌍 تاريخ العالم</option>
                        <option value="sci_physics">⚛️ فيزياء وكون</option>
                        <option value="iq_math">🧠 رياضيات وألغاز</option>
                    </select>
                    <button id="gen-btn" onclick="generate50()" class="w-full py-4 bg-amber-500 text-black font-black rounded-xl hover:bg-amber-400 transition">
                        ابدأ توليد وحقن 50 سؤال الآن
                    </button>
                    <div id="progress-bar" class="hidden w-full bg-gray-800 rounded-full h-2">
                        <div id="progress-fill" class="bg-amber-500 h-2 rounded-full transition-all" style="width: 0%"></div>
                    </div>
                    <p id="status-text" class="text-xs text-gray-500 text-center"></p>
                </div>
            </div>

            <div class="card p-6 overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="text-gray-500 text-xs border-b border-white/5">
                            <th class="pb-3">اللاعب</th>
                            <th class="pb-3 text-center">الكوينز</th>
                            <th class="pb-3 text-center">القلوب</th>
                        </tr>
                    </thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const GEMINI_KEY = "AIzaSyAOELEuu8EVlY6bRs9yTyrbTwOjuLskiW8";
        const appId = "shaghel-mokh-ultra-v2";

        signInAnonymously(auth);

        // الاستماع للاعبين
        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'rankings'), (snap) => {
            const list = document.getElementById('user-list');
            list.innerHTML = snap.docs.map(d => `
                <tr class="border-b border-white/5">
                    <td class="py-4 font-bold text-sm">${d.data().name || 'لاعب'}</td>
                    <td class="text-center"><input type="number" onchange="updatePlayer('${d.id}', 'coins', this.value)" value="${d.data().coins || 0}" class="w-16 bg-transparent text-yellow-500 text-center"></td>
                    <td class="text-center"><input type="number" onchange="updatePlayer('${d.id}', 'hearts', this.value)" value="${d.data().hearts || 0}" class="w-12 bg-transparent text-red-500 text-center"></td>
                </tr>
            `).join('');
        });

        window.updatePlayer = async (id, field, val) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', id), { [field]: parseInt(val) });
        };

        // دالة توليد 50 سؤال (مقسمة لـ 5 دفعات)
        window.generate50 = async () => {
            const btn = document.getElementById('gen-btn');
            const progress = document.getElementById('progress-bar');
            const fill = document.getElementById('progress-fill');
            const status = document.getElementById('status-text');
            const cat = document.getElementById('cat-select').value;

            btn.disabled = true;
            progress.classList.remove('hidden');
            
            // سنقوم بعمل 5 طلبات، كل طلب فيه 10 أسئلة
            for (let i = 1; i <= 5; i++) {
                status.innerText = `جاري توليد الدفعة ${i} من 5...`;
                fill.style.width = `${(i/5)*100}%`;

                try {
                    const prompt = `أعطني 10 أسئلة مسابقات متنوعة وصعبة في قسم ${cat} باللغة العربية. التنسيق JSON فقط بدون علامات: [{"text":"..","options":["..","..","..",".."],"correctIndex":0,"explanation":".."}]`;
                    
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await res.json();
                    let text = data.candidates[0].content.parts[0].text;
                    text = text.replace(/```json|```/g, "").trim();
                    const questions = JSON.parse(text);

                    for (let q of questions) {
                        const qId = `q_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', qId), {
                            ...q, category: cat, createdAt: new Date().toISOString()
                        });
                    }
                } catch (e) {
                    console.error("خطأ في الدفعة " + i, e);
                }
            }

            status.innerText = "تم حقن 50 سؤال بنجاح! راجع قاعدة البيانات.";
            btn.disabled = false;
            alert("اكتملت العملية بنجاح 🚀");
        };
    </script>
</body>
</html>
