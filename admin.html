<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-v2';
        const apiKey = ""; // سيتم تعويضه تلقائياً في البيئة

        // تسجيل الدخول كمسؤول (مجهول حالياً للتجربة)
        signInAnonymously(auth);

        const categories = [
            { id: "isl_prophets", name: "قصص الأنبياء" }, { id: "isl_quran", name: "علوم القرآن" }, { id: "isl_companions", name: "الصحابة" },
            { id: "his_egypt_anc", name: "الفراعنة" }, { id: "his_egypt_mod", name: "مصر الحديثة" }, { id: "his_world", name: "تاريخ العالم" },
            { id: "sci_physics", name: "فيزياء وكون" }, { id: "sci_biology", name: "أحياء وطب" }, { id: "sci_chem", name: "كيمياء" },
            { id: "tech_ai", name: "ذكاء اصطناعي" }, { id: "tech_coding", name: "برمجة وتقنية" }, { id: "tech_future", name: "اختراعات" },
            { id: "geo_capitals", name: "عواصم ودول" }, { id: "geo_nature", name: "بحار وجبال" }, { id: "geo_maps", name: "خرائط" },
            { id: "spo_football", name: "كرة قدم" }, { id: "spo_olympics", name: "ألعاب أولمبية" }, { id: "spo_local", name: "رياضة عربية" },
            { id: "lit_poetry", name: "شعر وأدب" }, { id: "lit_novels", name: "روايات عالمية" }, { id: "lit_cinema", name: "سينما وفن" },
            { id: "iq_math", name: "رياضيات" }, { id: "iq_logic", name: "منطق وألغاز" }, { id: "iq_riddles", name: "فوازير" }
        ];

        // تهيئة القائمة المنسدلة
        window.onload = () => {
            const select = document.getElementById('cat-select');
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                select.appendChild(opt);
            });
            updateStats();
        };

        // دالة الذكاء الاصطناعي لتوليد الأسئلة
        window.generateWithAI = async () => {
            const catId = document.getElementById('cat-select').value;
            const catName = categories.find(c => c.id === catId).name;
            const btn = document.getElementById('ai-btn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> جاري التوليد...';

            const prompt = `Generate 10 multiple choice questions in Arabic about "${catName}". 
            Format as JSON array of objects: 
            [{"text": "question", "options": ["opt1", "opt2", "opt3", "opt4"], "correctIndex": 0, "explanation": "why"}]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                // تنظيف النص من علامات markdown
                text = text.replace(/```json|```/g, "").trim();
                const questions = JSON.parse(text);

                for (let q of questions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q,
                        category: catId,
                        createdAt: new Date().toISOString()
                    });
                }

                alert(`تمت إضافة 10 أسئلة لقسم ${catName} بنجاح!`);
                updateStats();
            } catch (err) {
                console.error(err);
                alert("فشل التوليد. تأكد من إعدادات API.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> توليد 10 أسئلة بالذكاء الاصطناعي';
            }
        };

        // تحديث الإحصائيات
        async function updateStats() {
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
            document.getElementById('total-q').innerText = snap.size;
            
            const userSnap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'rankings'));
            document.getElementById('total-u').innerText = userSnap.size;
        }

        // حذف جميع الأسئلة في قسم معين
        window.clearCategory = async () => {
            const catId = document.getElementById('cat-select').value;
            if(!confirm("هل أنت متأكد من حذف جميع أسئلة هذا القسم؟")) return;

            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), where('category', '==', catId));
            const snap = await getDocs(q);
            
            const promises = snap.docs.map(d => deleteDoc(d.ref));
            await Promise.all(promises);
            
            alert("تم إفراغ القسم.");
            updateStats();
        };

    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0a0a0c; color: white; }
        .card { background: #15151a; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 24px; }
        input, select { background: #0a0a0c; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        input:focus { border-color: #f59e0b; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black">لوحة <span class="text-amber-500">الإدارة</span></h1>
                <p class="text-slate-500 text-sm mt-1">إدارة الأسئلة والمحتوى بالذكاء الاصطناعي</p>
            </div>
            <div class="flex gap-4">
                <div class="card p-4 flex flex-col items-center min-w-[120px]">
                    <span id="total-q" class="text-2xl font-black text-amber-500">0</span>
                    <span class="text-[10px] uppercase font-bold text-slate-400">سؤال إجمالي</span>
                </div>
                <div class="card p-4 flex flex-col items-center min-w-[120px]">
                    <span id="total-u" class="text-2xl font-black text-blue-500">0</span>
                    <span class="text-[10px] uppercase font-bold text-slate-400">مستخدم نشط</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- قسم التوليد الآلي -->
            <div class="card">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-robot text-amber-500"></i> التوليد بالذكاء الاصطناعي
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-2">اختر القسم المستهدف</label>
                        <select id="cat-select"></select>
                    </div>
                    <button id="ai-btn" onclick="window.generateWithAI()" class="w-full py-4 bg-amber-500 text-black font-black rounded-xl shadow-lg shadow-amber-500/20 hover:bg-amber-400 transition flex items-center justify-center gap-2">
                        <i class="fas fa-magic"></i> توليد 10 أسئلة بالذكاء الاصطناعي
                    </button>
                    <button onclick="window.clearCategory()" class="w-full py-2 text-red-500 text-xs font-bold hover:underline">
                        حذف أسئلة القسم الحالي
                    </button>
                </div>
                <div class="mt-6 p-4 bg-amber-500/5 border border-amber-500/10 rounded-xl">
                    <p class="text-[11px] text-amber-200/70 leading-relaxed">
                        <i class="fas fa-info-circle ml-1"></i> 
                        سيقوم النظام باستخدام Gemini Flash لتوليد 10 أسئلة فريدة، مع خياراتها، الإجابة الصحيحة، وشرح مفصل لكل سؤال.
                    </p>
                </div>
            </div>

            <!-- قسم الإضافة اليدوية -->
            <div class="card">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-blue-500"></i> إضافة سؤال يدوياً
                </h2>
                <div class="space-y-3">
                    <input type="text" id="manual-q" placeholder="نص السؤال...">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="manual-o0" placeholder="الخيار 1 (الصحيح)">
                        <input type="text" id="manual-o1" placeholder="الخيار 2">
                        <input type="text" id="manual-o2" placeholder="الخيار 3">
                        <input type="text" id="manual-o3" placeholder="الخيار 4">
                    </div>
                    <input type="text" id="manual-x" placeholder="شرح الإجابة (اختياري)">
                    <button onclick="window.addManual()" class="w-full py-4 bg-blue-600 text-white font-black rounded-xl hover:bg-blue-500 transition">
                        حفظ السؤال في القاعدة
                    </button>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-xs">
            نظام إدارة محتوى شغل مخك الفائق &copy; 2024
        </footer>
    </div>

    <script>
        window.addManual = async () => {
            const catId = document.getElementById('cat-select').value;
            const text = document.getElementById('manual-q').value;
            const options = [
                document.getElementById('manual-o0').value,
                document.getElementById('manual-o1').value,
                document.getElementById('manual-o2').value,
                document.getElementById('manual-o3').value
            ];
            const explanation = document.getElementById('manual-x').value;

            if(!text || options.some(o => !o)) return alert("أكمل جميع الحقول!");

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                text, options, correctIndex: 0, explanation, category: catId, createdAt: new Date().toISOString()
            });

            alert("تم الحفظ!");
            document.getElementById('manual-q').value = "";
            updateStats();
        };
    </script>
</body>
</html>
