<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية | شغل مخك</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(99,102,241,0.2);
            transition: 0.3s;
        }

        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .stat-card span { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; }
        .stat-card b { font-size: 1.5rem; color: var(--text); }

        .action-zone {
            background: #0f172a;
            padding: 30px;
            border-radius: 25px;
            border: 2px dashed rgba(99,102,241,0.3);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(99,102,241,0.3);
        }

        button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(99,102,241,0.5);
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            display: none;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>مدير البيانات السحابية ⚡</h1>
    <p>قم بتحديث الأسئلة والفروع لجميع اللاعبين بضغطة واحدة</p>

    <div id="stats-area" class="stats-grid">
        </div>

    <div class="action-zone">
        <button id="upload-btn" onclick="syncAllData()">تحديث قاعدة البيانات السحابية 🚀</button>
        <div id="status"></div>
    </div>

    <div style="margin-top: 30px; color: #475569; font-size: 0.8rem;">
        تأكد من وجود مصفوفة <b>allQuestions</b> داخل ملف <b>questions.js</b>
    </div>
</div>

<script src="questions.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // إعدادات Firebase (نفس اللي في index.html)
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-ultra';

    function initDashboard() {
        if (typeof allQuestions !== 'undefined') {
            const statsArea = document.getElementById('stats-area');
            const categories = {};
            
            allQuestions.forEach(q => {
                categories[q.category] = (categories[q.category] || 0) + 1;
            });

            statsArea.innerHTML = `<div class="stat-card"><span>إجمالي الأسئلة</span><b>${allQuestions.length}</b></div>`;
            for (let cat in categories) {
                statsArea.innerHTML += `<div class="stat-card"><span>${cat}</span><b>${categories[cat]}</b></div>`;
            }
        } else {
            document.getElementById('status').style.display = "block";
            document.getElementById('status').style.background = "#7f1d1d";
            document.getElementById('status').innerText = "❌ خطأ: ملف questions.js غير موجود أو فارغ!";
            document.getElementById('upload-btn').disabled = true;
        }
    }

    async function syncAllData() {
        const btn = document.getElementById('upload-btn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.style.display = "block";
        status.style.background = "#1e293b";
        status.innerHTML = '<div class="loader"></div> جاري معالجة البيانات ورفعها للسحابة...';

        try {
            // تنظيم الأسئلة حسب القسم للرفع بكفاءة
            const organized = {};
            allQuestions.forEach(q => {
                if(!organized[q.category]) organized[q.category] = [];
                // تحويل الصيغة لتناسب كود اللعبة (t للسؤال، a للاختيارات، c للإجابة، x للتفسير)
                organized[q.category].push({
                    t: q.question,
                    a: q.options,
                    c: q.answer,
                    x: q.info || "معلومة قيمة!"
                });
            });

            // الرفع لـ Firestore باستخدام Batch (أسرع وأضمن)
            for (const category in organized) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', category);
                await setDoc(docRef, { 
                    category: category,
                    questions: organized[category],
                    lastUpdated: new Date().toISOString()
                });
            }

            status.style.background = "#065f46";
            status.innerHTML = `✅ تم التحديث بنجاح! تم رفع ${allQuestions.length} سؤال موزع على ${Object.keys(organized).length} قسم.`;
        } catch (error) {
            console.error(error);
            status.style.background = "#7f1d1d";
            status.innerHTML = "❌ فشل الرفع: " + error.message;
        } finally {
            btn.disabled = false;
        }
    }

    window.onload = initDashboard;
    window.syncAllData = syncAllData;
</script>

</body>
</html>
