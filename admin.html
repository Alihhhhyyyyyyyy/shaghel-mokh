<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم | شغل مخك 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // بيانات الـ Firebase الخاصة بك (جاهزة)
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 👇 امسح اللي جوه القوسين [ ] وحط الـ 200 سؤال بتوعك مكانه
        // ==========================================
        const allQuestions = [
            {
                "category": "إسلاميات",
                "subCategory": "الأنبياء",
                "question": "من هو كليم الله؟",
                "options": ["إبراهيم", "موسى", "عيسى", "محمد"],
                "answer": 1,
                "info": "سيدنا موسى عليه السلام هو الذي كلمه الله تكليماً."
            }
            // ضيف باقي الـ 200 هنا بنفس الطريقة...
        ];

        window.uploadToFirebase = async () => {
            const btn = document.getElementById('main-btn');
            const status = document.getElementById('status-msg');

            if (allQuestions.length === 0) return alert("المصفوفة فاضية! حط الأسئلة الأول");

            btn.disabled = true;
            btn.innerHTML = "جاري الرفع... ⏳";
            status.innerText = "بدأنا نرفع الـ 200 سؤال...";

            try {
                // تجميع الأسئلة لتقليل عدد المستندات (Documents)
                const groups = {};
                allQuestions.forEach(q => {
                    const key = `${q.category}-${q.subCategory}`;
                    if (!groups[key]) {
                        groups[key] = {
                            category: q.category,
                            subCategory: q.subCategory,
                            questions: []
                        };
                    }
                    groups[key].questions.push(q);
                });

                for (const key in groups) {
                    await addDoc(collection(db, "questions"), {
                        ...groups[key],
                        timestamp: serverTimestamp()
                    });
                }

                status.innerHTML = "✅ <b class='text-green-400'>عاش يا بطل!</b> تم الرفع بنجاح.";
                btn.innerText = "تم الرفع بنجاح ✨";
            } catch (e) {
                console.error(e);
                status.innerText = "حصلت مشكلة: " + e.message;
                btn.disabled = false;
                btn.innerText = "جرب تاني";
            }
        };
    </script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="bg-slate-900 border border-slate-800 p-8 rounded-[40px] shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-2xl font-black mb-2 text-indigo-400">لوحة التحكم (موبايل)</h1>
        <p class="text-slate-500 text-xs mb-8 italic">سيتم الرفع مباشرة لـ Cloud Firestore</p>

        <button id="main-btn" onclick="uploadToFirebase()" class="w-full bg-indigo-600 py-5 rounded-2xl font-bold text-lg active:scale-95 transition-all shadow-lg shadow-indigo-500/20">
            ارفع الـ 200 سؤال الآن 🚀
        </button>

        <div id="status-msg" class="mt-6 text-sm text-slate-400">جاهز للرفع...</div>
    </div>
</body>
</html>
