<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - محرك التوليد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';
        
        // استخدام المفتاح كمتغير بيئي أو افتراضي
        const apiKey = ""; 

        onAuthStateChanged(auth, (user) => {
            if (user) loadQuestions();
            else signInAnonymously(auth);
        });

        // دالة التوليد الذكية باستخدام Gemini 2.5 Flash
        window.generateWithAI = async () => {
            const topic = document.getElementById('topic').value;
            const status = document.getElementById('ai-status');
            const resultBox = document.getElementById('ai-result');
            
            if(!topic) return alert("اكتب الموضوع الأول!");

            status.innerHTML = "⏳ جاري تشغيل العقل الاصطناعي... انتظر ثوانٍ";
            resultBox.classList.add('hidden');

            const systemPrompt = "أنت خبير تأليف أسئلة مسابقات. قم بتوليد 10 أسئلة MCQ باللغة العربية. الرد يجب أن يكون مصفوفة JSON فقط بدون أي نص إضافي.";
            const userQuery = `ألف 10 أسئلة عن موضوع: ${topic}. كل سؤال يحتوي على: t (نص السؤال)، a (4 اختيارات)، c (رقم الإجابة الصحيحة 0-3)، x (معلومة إضافية قصيرة).`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const questions = JSON.parse(data.candidates[0].content.parts[0].text);
                
                window.tempQuestions = questions; // تخزين مؤقت
                
                status.innerHTML = `✅ تم توليد ${questions.length} أسئلة بنجاح!`;
                resultBox.classList.remove('hidden');
                
                // عرض معاينة
                document.getElementById('preview-text').innerText = `تم تجهيز أسئلة عن: ${topic}. اضغط حفظ لإضافتها للقاعدة.`;
            } catch (e) {
                status.innerHTML = "❌ فشل التوليد.. السيرفر مضغوط، جرب كمان مرة";
                console.error(e);
            }
        };

        // دالة حفظ الأسئلة المولدة
        window.saveGenerated = async () => {
            const status = document.getElementById('ai-status');
            const topic = document.getElementById('topic').value;
            const [cat, sub] = topic.split('-').map(s => s.trim());

            status.innerHTML = "💾 جاري الحفظ في القاعدة...";
            
            try {
                for (const q of window.tempQuestions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q,
                        category: cat || "عام",
                        subCategory: sub || topic,
                        createdAt: Date.now()
                    });
                }
                status.innerHTML = "🎉 تم الحفظ بنجاح! الأسئلة الآن في اللعبة.";
                document.getElementById('ai-result').classList.add('hidden');
                loadQuestions();
            } catch (e) {
                status.innerHTML = "❌ خطأ أثناء الحفظ.";
            }
        };

        async function loadQuestions() {
            const list = document.getElementById('list');
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
            list.innerHTML = "";
            snap.forEach(d => {
                const q = d.data();
                const div = document.createElement('div');
                div.className = "bg-white/5 p-3 rounded-xl mb-2 flex justify-between items-center text-xs border border-white/5";
                div.innerHTML = `
                    <div>
                        <div class="text-amber-500 font-bold mb-1">${q.category} > ${q.subCategory}</div>
                        <div>${q.t}</div>
                    </div>
                    <button onclick="deleteQ('${d.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                `;
                list.appendChild(div);
            });
        }

        window.deleteQ = async (id) => {
            if(confirm("حذف؟")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
                loadQuestions();
            }
        };

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 12px; width: 100%; color: white; margin-bottom: 12px; }
        .btn-gen { background: linear-gradient(to right, #f59e0b, #ea580c); color: black; font-weight: 900; padding: 14px; border-radius: 14px; width: 100%; transition: 0.2s; }
        .btn-save { background: #10b981; color: white; font-weight: 900; padding: 12px; border-radius: 14px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <h1 class="text-2xl font-black text-center text-amber-500 mb-6">محرك شغل مخك <span class="text-white text-sm">V5</span></h1>

    <!-- لوحة التوليد الجديدة -->
    <div class="card mb-6 border-amber-500/20 shadow-amber-500/5">
        <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
            <i class="fas fa-magic text-amber-500"></i> ماذا تريد أن تضيف الآن؟
        </h2>
        <input type="text" id="topic" placeholder="مثال: رياضة - الدوري المصري">
        <p class="text-[10px] text-slate-500 mb-3">* اكتب (القسم - الفرع) لترتيب الأسئلة تلقائياً</p>
        
        <button onclick="generateWithAI()" class="btn-gen active:scale-95">
            توليد 10 أسئلة ذكية 🤖
        </button>

        <div id="ai-status" class="mt-3 text-center text-xs font-bold text-blue-400 min-h-[16px]"></div>

        <!-- منطقة التأكيد -->
        <div id="ai-result" class="hidden mt-4 p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
            <p id="preview-text" class="text-xs text-center mb-3"></p>
            <button onclick="saveGenerated()" class="btn-save shadow-lg shadow-emerald-500/20">
                حفظ الأسئلة في قاعدة البيانات ✅
            </button>
        </div>
    </div>

    <!-- بنك الأسئلة -->
    <div class="card flex-1">
        <h3 class="text-sm font-bold mb-4 opacity-50">الأسئلة الحالية في تطبيقك</h3>
        <div id="list" class="max-h-64 overflow-y-auto pr-1">
            <!-- قائمة الأسئلة -->
        </div>
    </div>

</body>
</html>
