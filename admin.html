<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم شغل مخك</title>
    <style>
        body { font-family: sans-serif; background: #1a2a3a; color: white; text-align: center; padding: 20px; }
        .card { background: #243b55; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; border: 1px solid #ff4b2b; }
        .status { margin: 15px 0; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .error { background: #721c24; color: #f8d7da; }
        .success { background: #155724; color: #d4edda; }
        button { background: #ff4b2b; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>⚡ لوحة التحكم</h2>
        <div id="msg" class="status" style="display:none;"></div>
        <button onclick="update()">🔄 تحديث البيانات الآن</button>
        <p id="details" style="font-size: 12px; margin-top: 10px; color: #aaa;"></p>
    </div>

    <script>
        async function update() {
            const msg = document.getElementById('msg');
            const details = document.getElementById('details');
            msg.style.display = "block";
            msg.className = "status";
            msg.innerText = "⏳ جاري المحاولة...";

            // الرابط ده هو اللي فيه السر (لازم يكون Raw)
            const url = "https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/main/questions.js";

            try {
                const res = await fetch(url + "?t=" + Date.now());
                if (!res.ok) throw new Error("GitHub بيقول الملف مش موجود! (404)");
                
                let text = await res.ok ? await res.text() : "";
                
                // تنظيف الملف لو كان بيبدأ بـ const
                let cleanData = text;
                if (text.includes('=')) {
                    cleanData = text.split('=')[1].replace(/;/g, '').trim();
                }

                JSON.parse(cleanData); // تجربة هل الكود سليم؟
                
                localStorage.setItem('gameQuestions', cleanData);
                msg.className = "status success";
                msg.innerText = "✅ اشتغلت! تم التحديث بنجاح.";
                details.innerText = "تم حفظ الأسئلة في متصفحك.";

            } catch (err) {
                msg.className = "status error";
                msg.innerText = "❌ فشل: " + err.message;
                details.innerText = "تأكد أن اسم الملف في GitHub هو questions.js بالظبط.";
            }
        }
    </script>
</body>
</html>
