<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - النسخة المستقرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';
        
        // استخدام المفتاح المباشر
        const aiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA"; 

        onAuthStateChanged(auth, (user) => {
            if (user) loadQuestions();
            else signInAnonymously(auth);
        });

        window.startGeneration = async () => {
            const cat = document.getElementById('cat').value.trim();
            const sub = document.getElementById('sub').value.trim();
            const status = document.getElementById('status');
            
            if(!cat || !sub) return alert("اكتب القسم والفرع");

            status.innerHTML = "<i class='fas fa-sync fa-spin ml-2'></i> جاري الاتصال بسيرفر جوجل (النسخة المستقرة)...";
            
            // برومبت مبسط جداً لضمان الاستجابة السريعة
            const promptText = `أريد 10 أسئلة MCQ باللغة العربية عن موضوع (${cat} - ${sub}). 
            يجب أن يكون الرد بصيغة JSON فقط كالتالي:
            [{"t":"السؤال","a":["خيار1","خيار2","خيار3","خيار4"],"c":0,"x":"معلومة"}]`;

            try {
                // استخدام موديل 1.5 flash المستقر
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                if (!response.ok) throw new Error("السيرفر لا يستجيب حالياً، جرب مرة أخرى بعد ثوانٍ");

                const result = await response.json();
                
                // تنظيف النص المستلم من أي علامات Markdown
                let rawText = result.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                
                const questions = JSON.parse(rawText);

                status.innerHTML = "✅ تم التأليف! جاري الحفظ في قاعدة البيانات...";

                for (const q of questions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        category: cat,
                        subCategory: sub,
                        t: q.t,
                        a: q.a,
                        c: q.c,
                        x: q.x || "معلومة مفيدة",
                        createdAt: Date.now()
                    });
                }

                status.innerHTML = "<span class='text-green-400'>🎉 نجحت العملية! الأسئلة أضيفت.</span>";
                loadQuestions();

            } catch (e) {
                console.error(e);
                status.innerHTML = "<span class='text-red-500'>❌ خطأ: " + e.message + "</span>";
            }
        };

        async function loadQuestions() {
            const list = document.getElementById('list');
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
                list.innerHTML = "";
                snap.forEach(d => {
                    const q = d.data();
                    const item = document.createElement('div');
                    item.className = "p-3 bg-white/5 border border-white/10 rounded-xl mb-2 flex justify-between items-center";
                    item.innerHTML = `
                        <div class="flex-1">
                            <div class="text-[10px] text-amber-500 font-bold">${q.category} | ${q.subCategory}</div>
                            <div class="text-xs">${q.t}</div>
                        </div>
                        <button onclick="deleteQ('${d.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>`;
                    list.appendChild(item);
                });
            } catch (e) {}
        }

        window.deleteQ = async (id) => {
            if(confirm("حذف؟")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
                loadQuestions();
            }
        };

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: white; margin-bottom: 12px; outline: none; }
        input:focus { border-color: #f59e0b; }
        .btn { background: #f59e0b; color: black; font-weight: 900; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-5 max-w-lg mx-auto">

    <h1 class="text-2xl font-black text-center text-amber-500 mb-8">لوحة التحكم (V4)</h1>

    <div class="card mb-6">
        <input type="text" id="cat" placeholder="القسم (مثلاً: رياضة)">
        <input type="text" id="sub" placeholder="الفرع (مثلاً: كرة القدم)">
        <button onclick="startGeneration()" class="btn">توليد 10 أسئلة 🚀</button>
        <div id="status" class="text-center text-xs mt-3 font-bold text-blue-400"></div>
    </div>

    <div class="card">
        <h2 class="font-black text-sm mb-4">الأسئلة الحالية</h2>
        <div id="list" class="max-h-64 overflow-y-auto pr-2"></div>
    </div>

</body>
</html>
