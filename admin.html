<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع قاعدة البيانات ⚡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="questions.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0b0e14; color: white; }
        .btn-mega { background: linear-gradient(90deg, #f59e0b, #d97706); border-radius: 20px; transition: 0.3s; }
        .btn-mega:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-[#151921] p-10 rounded-[3rem] border border-white/5 text-center">
        <div class="mb-6">
            <div class="inline-block p-4 bg-yellow-500/10 rounded-full mb-4">
                <span class="text-4xl">📦</span>
            </div>
            <h1 class="text-2xl font-black text-yellow-500">تحديث البيانات السحابية</h1>
            <p class="text-gray-400 text-xs mt-2">سيتم رفع جميع الأقسام (ذكاء، كرة قدم، جغرافيا...) دفعة واحدة.</p>
        </div>

        <button onclick="syncNow()" id="main-btn" class="btn-mega w-full py-5 text-black font-black text-xl shadow-xl active:scale-95">
            ابدأ المزامنة الآن 🔥
        </button>

        <div id="progress" class="mt-8 space-y-2 hidden">
            <p id="status" class="text-sm text-yellow-500 font-bold">جاري التحضير...</p>
            <div class="w-full bg-white/5 rounded-full h-2">
                <div id="bar" class="bg-yellow-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // الكونفيج بتاعك
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.syncNow = async function() {
            // التحقق من وجود الكود بتاعك
            if (typeof constAllQuestions === 'undefined' && typeof allQuestions === 'undefined') {
                return Swal.fire('خطأ!', 'مش شايف متغير allQuestions، اتأكد انك رابط الملف صح فوق.', 'error');
            }

            const data = typeof allQuestions !== 'undefined' ? allQuestions : constAllQuestions;
            const keys = Object.keys(data);
            const btn = document.getElementById('main-btn');
            const progress = document.getElementById('progress');
            const bar = document.getElementById('bar');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.innerText = "جاري الرفع...";
            progress.classList.remove('hidden');

            try {
                let count = 0;
                for (const key of keys) {
                    count++;
                    const percent = (count / keys.length) * 100;
                    status.innerText = `جاري رفع قسم: ${data[key].name}...`;
                    bar.style.width = percent + "%";

                    // هيكلة البيانات عشان تناسب اللعبة
                    // بنحول الـ subs والـ qs لشكل مبسط لو محتاج، بس هنا هنرفعها زي ما هي
                    await setDoc(doc(db, "questions", key), {
                        categoryName: data[key].name,
                        subCategories: data[key].subs
                    });
                }

                Swal.fire({
                    icon: 'success',
                    title: 'تمت المزامنة بنجاح!',
                    text: 'كل الأسئلة دلوقتى موجودة على Firebase ونقدر نلعب بيها.',
                    background: '#151921',
                    color: '#fff',
                    confirmButtonColor: '#f59e0b'
                });
                status.innerText = "اكتملت العملية ✅";

            } catch (e) {
                console.error(e);
                Swal.fire('فشل الرفع', e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = "ابدأ المزامنة الآن 🔥";
            }
        };
    </script>
</body>
</html>
