<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة محتوى شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const appId = 'shaghel-mokh-ultra';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const apiKey = ""; // Gemini API Key Auto-inject

        const categories = {
            "اللغة العربية": ["نحو", "بلاغة", "أدب"],
            "اللغات الأجنبية": ["إنجليزية", "فرنسية", "ألمانية"],
            "الرياضيات": ["جبر", "تفاضل وتكامل", "هندسة فراغية"],
            "العلوم الطبيعية": ["فيزياء", "كيمياء", "أحياء"],
            "الدراسات الاجتماعية": ["تاريخ", "جغرافيا", "فلسفة"],
            "تكنولوجيا المعلومات": ["برمجة", "ذكاء اصطناعي", "أمن سيبراني"],
            "الثقافة العامة": ["دين", "رياضة", "فن"],
            "تطوير الذات": ["منطق", "علم نفس", "إدارة وقت"]
        };

        let generatedQuestions = [];

        window.onload = () => {
            const topicSelect = document.getElementById('topic-select');
            const branchSelect = document.getElementById('branch-select');

            for (let topic in categories) {
                let opt = document.createElement('option');
                opt.value = topic; opt.innerText = topic;
                topicSelect.appendChild(opt);
            }

            topicSelect.onchange = () => {
                branchSelect.innerHTML = '<option value="">اختر الفرع...</option>';
                if(topicSelect.value) {
                    categories[topicSelect.value].forEach(branch => {
                        let opt = document.createElement('option');
                        opt.value = branch; opt.innerText = branch;
                        branchSelect.appendChild(opt);
                    });
                }
            };
            signInAnonymously(auth);
        };

        window.generateAI = async () => {
            const topic = document.getElementById('topic-select').value;
            const branch = document.getElementById('branch-select').value;
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('gen-btn');

            if(!topic || !branch) return alert("اختر القسم والفرع أولاً!");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> جاري التفكير...';

            const systemPrompt = `أنت خبير تعليمي. قم بتوليد 5 أسئلة في مجال "${branch}" ضمن "${topic}".
            توجيه إضافي: ${prompt || 'أسئلة احترافية'}.
            الرد يجب أن يكون JSON حصراً: {"questions": [{"text": "نص السؤال", "options": ["أ","ب","ج","د"], "correct": 1}]}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: systemPrompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                generatedQuestions = result.questions;
                renderPreview();
            } catch (error) {
                alert("حدث خطأ في الاتصال بالذكاء الاصطناعي");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic ml-2"></i> توليد بالذكاء الاصطناعي';
            }
        };

        function renderPreview() {
            const area = document.getElementById('preview-area');
            area.innerHTML = '<h3 class="text-xl font-bold mb-4 text-amber-500">الأسئلة المولدة:</h3>';
            generatedQuestions.forEach((q, idx) => {
                const d = document.createElement('div');
                d.className = "p-6 glass rounded-2xl mb-4 border-r-4 border-amber-500";
                d.innerHTML = `<p class="font-bold mb-3">${idx+1}. ${q.text}</p>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        ${q.options.map((o, i) => `<div class="${q.correct === i+1 ? 'text-green-400 font-bold' : 'text-slate-500'}">${i+1}. ${o}</div>`).join('')}
                    </div>`;
                area.appendChild(d);
            });
            document.getElementById('publish-btn').classList.remove('hidden');
        }

        window.publish = async () => {
            const topic = document.getElementById('topic-select').value;
            const branch = document.getElementById('branch-select').value;
            const btn = document.getElementById('publish-btn');
            
            btn.disabled = true;
            btn.innerText = "جاري الحفظ في قاعدة البيانات...";

            for (let q of generatedQuestions) {
                const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id), {
                    ...q, topic, branch, createdAt: new Date().toISOString()
                });
            }

            alert("تم النشر! الأسئلة الآن متوفرة في اللعبة.");
            location.reload();
        };
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0a0a0c; color: white; }
        .glass { background: rgba(22, 22, 28, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        select, input { background: #15151a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; color: white; outline: none; width: 100%; }
        button { transition: 0.3s; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 border-r-8 border-amber-500 pr-6">
            <h1 class="text-4xl font-black">إدارة المحتوى الذكي</h1>
            <p class="text-slate-500 font-bold mt-2">نظام توليد الأسئلة لـ "شغل مخك" عبر Gemini AI</p>
        </header>

        <div class="glass p-8 rounded-[40px] mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <select id="topic-select"><option value="">اختر القسم...</option></select>
                <select id="branch-select"><option value="">اختر الفرع...</option></select>
            </div>
            <input type="text" id="prompt" class="mb-6" placeholder="توجيه إضافي (مثال: أسئلة صعبة عن الفلك)...">
            <button id="gen-btn" onclick="generateAI()" class="w-full bg-white text-black py-5 rounded-3xl font-black text-xl hover:bg-amber-500">
                <i class="fas fa-magic ml-2"></i> توليد بالذكاء الاصطناعي
            </button>
        </div>

        <div id="preview-area"></div>
        <button id="publish-btn" onclick="publish()" class="hidden mt-6 w-full py-6 bg-green-600 text-white rounded-3xl font-black text-2xl shadow-xl hover:brightness-110">
            🚀 نشر الأسئلة في اللعبة فوراً
        </button>
    </div>
</body>
</html>
