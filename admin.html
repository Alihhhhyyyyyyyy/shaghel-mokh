<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شغل مخك - النسخة الاحترافية 24 فرعاً</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.6.0/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query, where, orderBy, limit, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const appId = 'shaghel-mokh-ultra'; // تأكد أنه نفس الـ ID في لوحة التحكم
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db;

        window.gameData = {
            coins: 1000, xp: 0, level: 1, hearts: 5,
            username: "العبقري الصغير",
            avatar: "https://i.postimg.cc/qqTBP312/1000061201.png",
            inventory: { delete: 3, skip: 3, hint: 3 },
            stats: { gamesPlayed: 0, totalCorrect: 0 },
            theme: 'dark'
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                const userDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                onSnapshot(userDoc, (snap) => {
                    if (snap.exists()) window.gameData = { ...window.gameData, ...snap.data() };
                    else setDoc(userDoc, window.gameData);
                    if (window.updateUI) window.updateUI();
                });
            }
        });

        window.saveData = async () => {
            if (!window.currentUser) return;
            const uid = window.currentUser.uid;
            await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), window.gameData, { merge: true });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', uid), {
                username: window.gameData.username, xp: window.gameData.xp, avatar: window.gameData.avatar, lastActive: new Date().toISOString()
            }, { merge: true });
        };

        window.fetchQuestionsFromDB = async (branchName, topicName) => {
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                const qSnap = await getDocs(qRef);
                let questions = [];
                qSnap.forEach(doc => {
                    const data = doc.data();
                    // الربط بناءً على الموضوع والفرع المختارين من الـ Admin
                    if (data.topic === topicName && data.branch === branchName) {
                        questions.push({
                            t: data.text, a: data.options, c: data.correct - 1, x: "إجابة صحيحة! استمر في التألق."
                        });
                    }
                });
                return questions.sort(() => Math.random() - 0.5).slice(0, 10);
            } catch (error) { return []; }
        };
    </script>

    <style>
        :root { --bg: #0a0a0c; --card: #15151a; --accent: #f59e0b; --text: #ffffff; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; --accent: #d97706; --text: #0f172a; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        .screen { display: none; height: calc(100vh - 85px - 75px); padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }
        .btn-option { background: var(--card); padding: 16px; border-radius: 20px; text-align: right; border: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 10px; font-weight: 700; transition: 0.2s; color: var(--text); }
        .btn-option.correct { background: #10b981 !important; color: white; }
        .btn-option.wrong { background: #ef4444 !important; color: white; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: var(--bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-link { opacity: 0.4; font-size: 20px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-link.active { opacity: 1; color: var(--accent); }
        .xp-bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .xp-fill { height: 100%; background: var(--accent); transition: 0.5s; width: 0%; }
        #loading-screen { position: fixed; inset: 0; background: #0a0a0c; z-index: 2000; display: flex; items-center; justify-center; flex-direction: column; }
    </style>
</head>
<body id="main-body">

<div id="loading-screen" class="hidden">
    <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-amber-500 font-bold">جاري تحميل الأسئلة...</p>
</div>

<div class="max-w-[500px] mx-auto h-screen relative flex flex-col">
    <!-- Top Header -->
    <div class="px-6 flex justify-between items-center h-[75px]">
        <div class="flex items-center gap-3">
            <div id="top-lvl" class="w-9 h-9 bg-amber-500 text-black rounded-lg flex items-center justify-center font-black">1</div>
            <div class="bg-[var(--card)] px-3 py-1.5 rounded-lg border border-white/5 text-sm font-bold">
                <span id="coin-count" class="text-amber-500">1000</span> 💰
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span id="heart-count" class="text-red-500 font-bold">5</span> ❤️
        </div>
    </div>

    <!-- Screen Container -->
    <div class="flex-1 overflow-hidden">
        
        <!-- Home -->
        <div id="screen-home" class="screen active justify-center items-center text-center">
            <img id="home-avatar" src="" class="w-36 h-36 rounded-[40px] border-4 border-amber-500 mb-6 shadow-2xl">
            <h1 class="text-3xl font-black mb-2">شغل <span class="text-amber-500">مخك</span></h1>
            <p id="rank-badge" class="text-amber-500 text-xs font-bold mb-10 bg-amber-500/10 px-4 py-1 rounded-full">...</p>
            <button onclick="navTo('paths')" class="w-64 bg-amber-500 text-black py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition">ابدأ اللعب</button>
        </div>

        <!-- Paths (24 Branches) -->
        <div id="screen-paths" class="screen">
            <h2 class="text-xl font-black mb-6">المسارات <span class="text-amber-500">التعليمية</span></h2>
            <div id="paths-list" class="space-y-3 pb-20"></div>
        </div>

        <!-- Quiz -->
        <div id="screen-quiz" class="screen">
            <div class="flex justify-between items-center mb-6">
                <button onclick="navTo('paths')" class="text-slate-500"><i class="fas fa-times"></i></button>
                <div class="flex-1 mx-4"><div class="xp-bar"><div id="q-progress" class="xp-fill"></div></div></div>
                <span id="q-counter" class="text-xs font-bold">1/10</span>
            </div>
            <div class="bg-[var(--card)] p-8 rounded-[30px] text-center mb-6 min-h-[150px] flex items-center justify-center border border-white/5 shadow-lg">
                <h3 id="q-text" class="text-lg font-bold leading-relaxed">...</h3>
            </div>
            <div id="options-box" class="space-y-1"></div>
            <div id="analysis-container" style="display:none" class="mt-4">
                <button onclick="nextQuestion()" class="w-full py-4 bg-amber-500 text-black font-black rounded-xl">استمرار ➜</button>
            </div>
        </div>

        <!-- Leaderboard -->
        <div id="screen-leaderboard" class="screen">
            <h2 class="text-xl font-black mb-6">المتصدرون 🏆</h2>
            <div id="leader-list" class="space-y-3"></div>
        </div>

    </div>

    <!-- Navigation -->
    <div id="main-nav" class="nav-bar">
        <div onclick="navTo('home')" id="n-home" class="nav-link active"><i class="fas fa-house"></i><span class="text-[10px] mt-1 font-bold">الرئيسية</span></div>
        <div onclick="navTo('paths')" id="n-paths" class="nav-link"><i class="fas fa-compass"></i><span class="text-[10px] mt-1 font-bold">المسارات</span></div>
        <div onclick="navTo('leaderboard')" id="n-leaderboard" class="nav-link"><i class="fas fa-trophy"></i><span class="text-[10px] mt-1 font-bold">الترتيب</span></div>
    </div>
</div>

<script>
    const STRUCTURE = {
        "اللغة العربية": ["نحو", "بلاغة", "أدب"],
        "اللغات الأجنبية": ["إنجليزية", "فرنسية", "ألمانية"],
        "الرياضيات": ["جبر", "تفاضل وتكامل", "هندسة فراغية"],
        "العلوم الطبيعية": ["فيزياء", "كيمياء", "أحياء"],
        "الدراسات الاجتماعية": ["تاريخ", "جغرافيا", "فلسفة"],
        "تكنولوجيا المعلومات": ["برمجة", "ذكاء اصطناعي", "أمن سيبراني"],
        "الثقافة العامة": ["دين", "رياضة", "فن"],
        "تطوير الذات": ["منطق", "علم نفس", "إدارة وقت"]
    };

    let currentQuestions = [], currentQIdx = 0;

    window.navTo = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(`screen-${id}`).classList.add('active');
        if(document.getElementById(`n-${id}`)) document.getElementById(`n-${id}`).classList.add('active');
        document.getElementById('main-nav').style.display = (id === 'quiz') ? 'none' : 'flex';
        if(id === 'paths') renderMainTopics();
        if(id === 'leaderboard') renderLeaderboard();
    };

    function renderMainTopics() {
        const list = document.getElementById('paths-list');
        list.innerHTML = '';
        Object.keys(STRUCTURE).forEach(topic => {
            list.innerHTML += `
                <div onclick="renderBranches('${topic}')" class="bg-[var(--card)] p-5 rounded-2xl flex justify-between items-center border border-white/5 cursor-pointer">
                    <span class="font-bold">${topic}</span>
                    <i class="fas fa-chevron-left text-amber-500"></i>
                </div>`;
        });
    }

    window.renderBranches = (topic) => {
        const list = document.getElementById('paths-list');
        list.innerHTML = `<button onclick="renderMainTopics()" class="text-amber-500 text-sm mb-4">🔙 عودة للمواضيع</button>`;
        STRUCTURE[topic].forEach(branch => {
            list.innerHTML += `
                <div onclick="startSession('${branch}', '${topic}')" class="bg-white/5 p-4 rounded-xl border border-white/5 mb-2 flex justify-between items-center cursor-pointer hover:bg-white/10">
                    <span class="text-sm font-medium">${branch}</span>
                    <i class="fas fa-play-circle text-amber-500"></i>
                </div>`;
        });
    };

    window.startSession = async (branch, topic) => {
        if(window.gameData.hearts <= 0) return alert("نفذت القلوب!");
        document.getElementById('loading-screen').classList.remove('hidden');
        currentQuestions = await window.fetchQuestionsFromDB(branch, topic);
        document.getElementById('loading-screen').classList.add('hidden');
        
        if(currentQuestions.length === 0) return alert("عذراً، لا توجد أسئلة في هذا الفرع بعد.");
        
        currentQIdx = 0;
        navTo('quiz');
        showQuestion();
    };

    function showQuestion() {
        const q = currentQuestions[currentQIdx];
        document.getElementById('q-counter').innerText = `${currentQIdx+1}/${currentQuestions.length}`;
        document.getElementById('q-progress').style.width = ((currentQIdx+1)/currentQuestions.length)*100 + "%";
        document.getElementById('q-text').innerText = q.t;
        document.getElementById('analysis-container').style.display = 'none';
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = document.querySelectorAll('.btn-option');
                btns.forEach(b => b.disabled = true);
                if(idx === q.c) {
                    btn.classList.add('correct');
                    window.gameData.coins += 20;
                    window.gameData.xp += 50;
                    confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
                } else {
                    btn.classList.add('wrong');
                    btns[q.c].classList.add('correct');
                    window.gameData.hearts--;
                }
                document.getElementById('analysis-container').style.display = 'block';
                window.saveData(); window.updateUI();
            };
            box.appendChild(btn);
        });
    }

    window.nextQuestion = () => {
        currentQIdx++;
        if(currentQIdx < currentQuestions.length && window.gameData.hearts > 0) showQuestion();
        else navTo('home');
    };

    window.updateUI = () => {
        const d = window.gameData;
        document.getElementById('coin-count').innerText = d.coins;
        document.getElementById('heart-count').innerText = d.hearts;
        document.getElementById('top-lvl').innerText = Math.floor(d.xp / 500) + 1;
        document.getElementById('home-avatar').src = d.avatar;
        document.getElementById('rank-badge').innerText = `المستوى ${Math.floor(d.xp / 500) + 1}`;
        document.getElementById('main-body').className = d.theme === 'light' ? 'light-mode' : '';
    };

    async function renderLeaderboard() {
        const list = document.getElementById('leader-list');
        list.innerHTML = '';
        const q = query(collection(window.db, 'artifacts', 'shaghel-mokh-ultra', 'public', 'data', 'rankings'), orderBy('xp', 'desc'), limit(10));
        const snap = await getDocs(q);
        let i = 1;
        snap.forEach(d => {
            const u = d.data();
            list.innerHTML += `
                <div class="bg-[var(--card)] p-4 rounded-xl flex justify-between items-center border border-white/5">
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-amber-500 w-4">${i++}</span>
                        <img src="${u.avatar}" class="w-10 h-10 rounded-lg object-cover">
                        <span class="font-bold text-sm">${u.username}</span>
                    </div>
                    <span class="text-xs font-bold text-slate-500">${u.xp} XP</span>
                </div>`;
        });
    }

    window.onload = () => window.updateUI();
</script>
</body>
</html>
