<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | رفع الأسئلة للسحابة</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        button:disabled { background: #ccc; }
        #status { margin-top: 20px; font-size: 14px; color: #555; line-height: 1.6; }
        .error { color: #d93025; font-weight: bold; }
        .success { color: #188038; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>تحديث بيانات المشروع 🚀</h2>
    <p>اضغط الزر لجلب 200 سؤال من GitHub ورفعهم إلى Firebase Firestore</p>
    <button id="uploadBtn">بدء عملية الرفع الآن</button>
    <div id="status">جاهز للعمل...</div>
</div>

<script>
    // 1. إعدادات Firebase (تأكد أنها نفس الإعدادات في index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
        authDomain: "shaghel-mokh-ultra.firebaseapp.com",
        projectId: "shaghel-mokh-ultra",
        storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
        messagingSenderId: "167435076773",
        appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');

    uploadBtn.addEventListener('click', async () => {
        uploadBtn.disabled = true;
        statusDiv.innerHTML = "⏳ جاري محاولة سحب الملف من GitHub...";

        // 2. رابط الملف المباشر (تأكد من اسم الملف واليوزر)
        // أضفت t=${Date.now()} عشان نمنع المتصفح إنه يجيب نسخة قديمة (Cache)
        const user = "Alihhhhhyyyyyyyy";
        const repo = "shaghel-mokh";
        const file = "questions.js";
        const url = `https://raw.githubusercontent.com/${user}/${repo}/main/${file}?t=${Date.now()}`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`فشل الوصول للملف (كود الخطأ: ${response.status}). تأكد من اسم الملف في GitHub.`);
            }

            const rawText = await response.text();
            
            // تحويل النص إلى Object برمجياً
            // بنشيل "const allQuestions =" وبناخد اللي بعدها عشان نحوله لـ JSON
            const jsonString = rawText.replace(/const\s+allQuestions\s*=\s*/, '').replace(/;$/, '');
            
            // ملاحظة: لو الملف فيه دوال أو تنسيق معقد، Eval هي الحل الأضمن في سياق مشروع تخرج
            const data = eval('(' + jsonString + ')');

            statusDiv.innerHTML = "✅ تم جلب الملف! جاري الرفع لـ Firestore...";

            // 3. رفع كل قسم كـ Document منفصل
            const batch = db.batch();
            
            for (const key in data) {
                const docRef = db.collection("quiz").doc(key);
                batch.set(docRef, data[key]);
            }

            await batch.commit();
            
            statusDiv.innerHTML = `<span class="success">🎉 مبروك! تم رفع 200 سؤال بنجاح.<br>تقسيم الأقسام: ${Object.keys(data).length} أقسام جاهزة.</span>`;

        } catch (error) {
            console.error(error);
            statusDiv.innerHTML = `<span class="error">❌ خطأ: ${error.message}</span>`;
            uploadBtn.disabled = false;
        }
    });
</script>

</body>
</html>
