<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaghel Mokh Ultra - المحرك المستمر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: #c9d1d9; }
        .card { background: #0d1117; border: 1px solid #30363d; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .btn-green { background: #238636; color: white; font-weight: bold; transition: 0.2s; }
        .btn-green:hover { background: #2ea043; transform: scale(1.02); }
        .btn-green:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .log-container { background: #010409; border: 1px solid #30363d; font-family: 'Consolas', monospace; height: 300px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full card p-8">
        <!-- Header -->
        <div class="flex justify-between items-start mb-8 border-b border-[#30363d] pb-6">
            <div>
                <h1 class="text-2xl font-black text-white">إدارة محتوى Shaghel Mokh</h1>
                <p class="text-xs text-[#8b949e] mt-2 italic">نظام التوليد التلقائي المعتمد على Gemini 2.0</p>
            </div>
            <div class="flex flex-col items-end">
                <div id="conn-badge" class="status-pill bg-red-500/10 text-red-500 mb-2">غير متصل</div>
                <div class="text-right">
                    <span class="text-[10px] text-[#8b949e] uppercase block">الرصيد الحالي</span>
                    <span id="db-count" class="text-4xl font-black text-white tracking-tighter">--</span>
                </div>
            </div>
        </div>

        <!-- Dashboard Controls -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="md:col-span-2 space-y-4">
                <div class="flex gap-2">
                    <button id="btn-50" onclick="injectBatch(50)" class="btn-green flex-1 py-4 rounded-xl">حقن 50 سؤال</button>
                    <button id="btn-100" onclick="injectBatch(100)" class="btn-green flex-1 py-4 rounded-xl border border-white/10 bg-slate-800">حقن 100 سؤال</button>
                </div>
                <p class="text-[10px] text-[#8b949e] text-center italic">كل عملية حقن تستغرق حوالي 10-15 ثانية لضمان جودة البيانات.</p>
            </div>
            
            <div class="bg-[#161b22] p-4 rounded-xl border border-[#30363d]">
                <h3 class="text-xs font-bold text-white mb-3">إحصائيات الجلسة</h3>
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px]"><span class="text-[#8b949e]">تمت إضافتها الآن:</span><span id="session-added" class="text-green-400 font-bold">0</span></div>
                    <div class="flex justify-between text-[10px]"><span class="text-[#8b949e]">فشل التوليد:</span><span id="session-errors" class="text-red-400 font-bold">0</span></div>
                </div>
            </div>
        </div>

        <!-- Progress Log -->
        <div class="space-y-2">
            <div id="progress-bar-container" class="hidden">
                <div class="flex justify-between text-[9px] text-green-400 mb-1 font-bold">
                    <span id="prog-text">INITIALIZING...</span>
                    <span id="prog-val">0%</span>
                </div>
                <div class="h-1 w-full bg-[#21262d] rounded-full overflow-hidden">
                    <div id="prog-fill" class="h-full bg-green-500 w-0 transition-all duration-300"></div>
                </div>
            </div>
            
            <div id="logs" class="log-container rounded-xl p-4 overflow-y-auto text-[11px] text-[#8b949e] space-y-1">
                <div>>> بانتظار الأوامر...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, writeBatch, doc, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعداداتك الحقيقية التي زودتني بها
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const GEMINI_KEY = "AIzaSyAOELEuu8EVlY6bRs9yTyrbTwOjuLskiW8";
        const APP_ID = "shaghel-mokh-ultra";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const logs = document.getElementById('logs');
        const dbCount = document.getElementById('db-count');
        const sessionAdded = document.getElementById('session-added');
        const connBadge = document.getElementById('conn-badge');
        const progFill = document.getElementById('prog-fill');
        const progVal = document.getElementById('prog-val');
        const progText = document.getElementById('prog-text');

        let totalAddedThisSession = 0;

        function addLog(msg, color = "#8b949e") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `<span style="opacity:0.3">[${new Date().toLocaleTimeString()}]</span> > ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
        }

        function updateProgress(pct, text) {
            document.getElementById('progress-bar-container').classList.remove('hidden');
            progFill.style.width = pct + "%";
            progVal.innerText = pct + "%";
            progText.innerText = text;
        }

        // تسجيل الدخول
        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    addLog("متصل بـ Firebase Cloud بنجاح.", "#238636");
                    connBadge.innerText = "متصل";
                    connBadge.className = "status-pill bg-green-500/10 text-green-500 mb-2";
                    
                    // تحديث العداد اللحظي
                    onSnapshot(collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'), (snap) => {
                        dbCount.innerText = snap.size;
                    });
                }
            });
        });

        window.injectBatch = async (amount) => {
            const btn50 = document.getElementById('btn-50');
            const btn100 = document.getElementById('btn-100');
            btn50.disabled = true; btn100.disabled = true;

            try {
                updateProgress(10, "تحليل البيانات الموجودة لمنع التكرار...");
                
                // سحب آخر 100 عنوان سؤال لمنع التكرار
                const snap = await getDocs(collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'));
                const blacklist = snap.docs.slice(-100).map(d => d.data().t);

                updateProgress(30, `جاري استدعاء Gemini لتوليد ${amount} سؤال...`);
                
                const prompt = `أريد ${amount} سؤالاً ثقافياً عربياً متنوعاً جداً (علوم، تاريخ، جغرافيا، فنون، رياضة، إسلاميات).
                يجب ألا تتكرر أو تشبه هذه العناوين: [${blacklist.join(', ')}].
                أجب بتنسيق JSON Array فقط: [{category, t, a, c, x}].
                t=السؤال، a=الجواب الصح، c=مصفوفة 3 أجوبة خطأ، x=شرح مفيد للسؤال.`;

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Start production" }] }],
                        systemInstruction: { parts: [{ text: prompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!res.ok) throw new Error("فشل الاتصال بمزود الذكاء الاصطناعي.");
                
                const data = await res.json();
                const questions = JSON.parse(data.candidates[0].content.parts[0].text);
                
                updateProgress(70, `تم التوليد! جاري حقن ${questions.length} سؤال في السحابة...`);
                
                const batch = writeBatch(db);
                const colRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                
                questions.forEach(q => {
                    batch.set(doc(colRef), q);
                });

                await batch.commit();

                totalAddedThisSession += questions.length;
                sessionAdded.innerText = totalAddedThisSession;
                
                updateProgress(100, "اكتمل الحقن بنجاح!");
                addLog(`تمت إضافة ${questions.length} سؤال جديد لمشروعك.`, "#238636");

            } catch (err) {
                addLog(`عطل فني: ${err.message}`, "#f85149");
                document.getElementById('session-errors').innerText = parseInt(document.getElementById('session-errors').innerText) + 1;
            } finally {
                setTimeout(() => {
                    document.getElementById('progress-bar-container').classList.add('hidden');
                    btn50.disabled = false; btn100.disabled = false;
                }, 2000);
            }
        };
    </script>
</body>
</html>
