            {t:"ما هو اسم الجهاز الذي يظهر لنا الطقس؟", a:["البارومتر", "الترمومتر", "الهيدرومتر", "البوصلة"], cat:"ثقافة", sub:"علوم عامة"},
            {t:"كم عدد ألوان قوس قزح؟", a:["7 ألوان", "5 ألوان", "6 ألوان", "8 ألوان"], cat:"ثقافة", sub:"طبيعة"},
            {t:"ما هو اسم العملة الموحدة لأوروبا؟", a:["اليورو", "الدولار", "الجنيه", "الفرنك"], cat:"ثقافة", sub:"مال"},
            {t:"ما هي عاصمة إيطاليا؟", a:["روما", "فينيسيا", "ميلان", "فلورنسا"], cat:"ثقافة", sub:"دول"},
            {t:"ما هو الحيوان الذي لا ينام أبداً؟", a:["القرش", "الزرافة", "الفيل", "النمل"], cat:"ثقافة", sub:"حيوانات"},
            {t:"ما هو المكون الأساسي للزجاج؟", a:["الرمل", "الملح", "السكر", "التراب"], cat:"ثقافة", sub:"مواد"},
            {t:"ما هو اسم أقدم عاصمة في التاريخ؟", a:["دمشق", "القاهرة", "بغداد", "أثينا"], cat:"ثقافة", sub:"تاريخ"},
            {t:"ما هو صوت الضفدع؟", a:["نقيق", "صهيل", "زئير", "فحيح"], cat:"ثقافة", sub:"حيوانات"},
            {t:"كم عدد أيام السنة الكبيسة؟", a:["366 يوم", "365 يوم", "364 يوم", "360 يوم"], cat:"ثقافة", sub:"زمن"},
            {t:"ما هو الحيوان الذي يغير لونه؟", a:["الحرباء", "الأخطبوط", "السلحفاة", "التمساح"], cat:"ثقافة", sub:"حيوانات"},
            {t:"ما هو الغاز الذي يستخدم في إطفاء الحرائق؟", a:["ثاني أكسيد الكربون", "الأكسجين", "الهيدروجين", "النيتروجين"], cat:"ثقافة", sub:"علوم عامة"},
            {t:"أين تقع غابات الأمازون؟", a:["البرازيل", "أستراليا", "أفريقيا", "كندا"], cat:"ثقافة", sub:"طبيعة"},
            {t:"ما هو الكائن الذي يرى بأذنه؟", a:["الخفاش", "البومة", "الغراب", "القط"], cat:"ثقافة", sub:"حيوانات"},
            {t:"ما هي الدولة صاحبة أكبر عدد سكان في العالم؟", a:["الهند", "الصين", "أمريكا", "إندونيسيا"], cat:"ثقافة", sub:"دول"},
            {t:"ما هو أطول حيوان في العالم؟", a:["الزرافة", "الفيل", "الحوت الأزرق", "الجمل"], cat:"ثقافة", sub:"حيوانات"}
        ];

        // تهيئة الفئات في الواجهة
        const catStats = document.getElementById('categoryStats');
        const categories = [...new Set(rawData.map(i => i.cat))];
        
        categories.forEach(c => {
            const div = document.createElement('div');
            div.id = `stat-${c}`;
            div.className = "cat-item";
            div.innerHTML = `<div class="font-bold">${c}</div><div class="text-xs text-blue-300"><span class="count">0</span> / 25</div>`;
            catStats.appendChild(div);
        });

        // وظيفة الحقن
        window.processInjection = async () => {
            if(!confirm("سيتم حقن 200 سؤال بالتساوي. لا تغلق الصفحة حتى تنتهي العملية.")) return;
            
            const btn = document.getElementById('mainActionBtn');
            const log = document.getElementById('log');
            const pBar = document.getElementById('progressBar');
            const pText = document.getElementById('percentText');
            const cText = document.getElementById('counterText');

            btn.disabled = true;
            btn.innerText = "⏳ جاري الرفع الآن...";
            log.innerHTML = "> بدء معالجة 200 سؤال...\n";

            let success = 0;
            const categoryCounters = {};
            categories.forEach(c => categoryCounters[c] = 0);

            for(let i=0; i < rawData.length; i++) {
                const item = rawData[i];
                try {
                    // تفعيل حالة الفئة الحالية
                    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
                    const currentCatEl = document.getElementById(`stat-${item.cat}`);
                    currentCatEl.classList.add('active');

                    // الرفع الفعلي لـ Firebase
                    await addDoc(collection(db, "questions"), {
                        question: item.t,
                        answers: item.a, // الإجابة الصحيحة هي الأولى ويتم خلطها في التطبيق
                        category: item.cat,
                        subCategory: item.sub,
                        info: `هذه معلومة إضافية عن سؤال ${item.cat}: ${item.t}`,
                        createdAt: serverTimestamp()
                    });

                    success++;
                    categoryCounters[item.cat]++;

                    // تحديث الإحصائيات
                    const percent = Math.round((success / 200) * 100);
                    pBar.style.width = percent + "%";
                    pText.innerText = percent + "%";
                    cText.innerText = `${success} / 200`;
                    
                    currentCatEl.querySelector('.count').innerText = categoryCounters[item.cat];
                    if(categoryCounters[item.cat] >= 25) currentCatEl.classList.add('done');

                    // تحديث السجل
                    const logLine = document.createElement('div');
                    logLine.innerText = `[${success}] ✅ تم حقن: ${item.t.substring(0,25)}... (${item.cat})`;
                    log.appendChild(logLine);
                    log.scrollTop = log.scrollHeight;

                } catch (e) {
                    const errLine = document.createElement('div');
                    errLine.style.color = "red";
                    errLine.innerText = `[خطأ] فشل رفع سؤال ${i+1}: ${e.message}`;
                    log.appendChild(errLine);
                }
            }

            btn.innerText = "✅ اكتمل الحقن بنجاح";
            log.innerHTML += "\n> تمت العملية بنجاح كامل. 200 سؤال في القاعدة الآن.";
            alert("تم حقن 200 سؤال بنجاح وتوزيعهم على 8 فئات بالتساوي!");
        };
    </script>
</body>
