<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | حل نهائي للأخطاء</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; width: 450px; border: 1px solid #334155; }
        .btn { background: #4f46e5; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
        #log { margin-top: 15px; background: #000; padding: 10px; border-radius: 8px; color: #10b981; font-family: monospace; font-size: 12px; text-align: left; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2>تحديث وربط البيانات 🚀</h2>
    <p style="color:#94a3b8">حل مشكلة التوكن وجلب الـ 200 سؤال</p>
    <button id="btn" class="btn" onclick="startFix()">ابدأ الربط الآن</button>
    <div id="log">جاهز...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
        authDomain: "shaghel-mokh-ultra.firebaseapp.com",
        projectId: "shaghel-mokh-ultra",
        storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
        messagingSenderId: "167435076773",
        appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function addLog(m) { document.getElementById('log').innerHTML += `<div>> ${m}</div>`; }

    async function startFix() {
        const btn = document.getElementById('btn');
        btn.disabled = true;
        addLog("جاري سحب الملف من GitHub...");

        // الرابط المباشر اللي إنت بعته
        const url = "https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/main/questions.js";

        try {
            const res = await fetch(url);
            if(!res.ok) throw new Error("GitHub رفض الوصول. تأكد أن Repo هو Public.");
            
            const text = await res.text();
            addLog("تم استلام الملف. جاري معالجة الـ Token...");

            // قص النص لتحويله لبيانات (بنشيل const والـ =)
            const start = text.indexOf('{');
            const end = text.lastIndexOf('}') + 1;
            const data = eval('(' + text.substring(start, end) + ')');

            addLog("تم تحليل البيانات. جاري الرفع لـ Firestore...");

            const batch = db.batch();
            for (let key in data) {
                batch.set(db.collection("quiz").doc(key), data[key]);
                addLog("تجهيز قسم: " + data[key].name);
            }

            await batch.commit();
            addLog("✅ تم الرفع بنجاح! مبروك يا بطل.");
            btn.innerText = "اكتمل بنجاح ✅";
        } catch (e) {
            addLog("خطأ: " + e.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
