<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة محتوى شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعدادات Firebase الموحدة
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const appId = 'shaghel-mokh-ultra';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // مفتاح API فارغ للتعرف التلقائي في بيئة التشغيل
        const apiKey = ""; 

        const categories = {
            "اللغة العربية": ["نحو", "بلاغة", "أدب"],
            "اللغات الأجنبية": ["إنجليزية", "فرنسية", "ألمانية"],
            "الرياضيات": ["جبر", "تفاضل وتكامل", "هندسة فراغية"],
            "العلوم الطبيعية": ["فيزياء", "كيمياء", "أحياء"],
            "الدراسات الاجتماعية": ["تاريخ", "جغرافيا", "فلسفة"],
            "تكنولوجيا المعلومات": ["برمجة", "ذكاء اصطناعي", "أمن سيبراني"],
            "الثقافة العامة": ["دين", "رياضة", "فن"],
            "تطوير الذات": ["منطق", "علم نفس", "إدارة وقت"]
        };

        let generatedQuestions = [];

        window.onload = () => {
            const topicSelect = document.getElementById('topic-select');
            const branchSelect = document.getElementById('branch-select');

            for (let topic in categories) {
                let opt = document.createElement('option');
                opt.value = topic;
                opt.innerText = topic;
                topicSelect.appendChild(opt);
            }

            topicSelect.onchange = () => {
                branchSelect.innerHTML = '<option value="">اختر الفرع...</option>';
                if(topicSelect.value) {
                    categories[topicSelect.value].forEach(branch => {
                        let opt = document.createElement('option');
                        opt.value = branch;
                        opt.innerText = branch;
                        branchSelect.appendChild(opt);
                    });
                }
            };

            signInAnonymously(auth);
        };

        // وظيفة التوليد عبر Gemini AI
        window.generateAIQuestions = async () => {
            const topic = document.getElementById('topic-select').value;
            const branch = document.getElementById('branch-select').value;
            const promptInput = document.getElementById('ai-prompt').value;
            const btn = document.getElementById('gen-btn');

            if(!topic || !branch) {
                showToast("يرجى تحديد القسم والفرع أولاً", "error");
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin ml-2"></i> جاري التوليد بذكاء...';

            const systemPrompt = `أنت خبير في وضع أسئلة المسابقات التعليمية. قم بتوليد 5 أسئلة في مجال "${branch}" التابع لقسم "${topic}".
            توجيه إضافي: ${promptInput || 'أسئلة عامة وممتعة'}.
            يجب أن يكون الرد بتنسيق JSON حصراً كأوبجكت يحتوي على مصفوفة باسم questions.
            كل سؤال يحتوي على:
            - text: نص السؤال
            - options: مصفوفة من 4 خيارات
            - correct: رقم الإجابة الصحيحة (1 إلى 4)
            اللغة: العربية الفصحى الرصينة.`;

            try {
                // تنفيذ طلب الـ API مع محاولات إعادة الاتصال (Retries)
                const fetchWithRetry = async (retries = 5, delay = 1000) => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: systemPrompt }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        if (!response.ok) throw new Error("API Failure");
                        return await response.json();
                    } catch (e) {
                        if (retries > 0) {
                            await new Promise(res => setTimeout(res, delay));
                            return fetchWithRetry(retries - 1, delay * 2);
                        }
                        throw e;
                    }
                };

                const data = await fetchWithRetry();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                generatedQuestions = result.questions;
                displayPreview();
                showToast("تم توليد الأسئلة بنجاح!", "success");
            } catch (error) {
                showToast("فشل التوليد، يرجى المحاولة مرة أخرى", "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt ml-2 text-amber-500"></i> توليد بالذكاء الاصطناعي';
            }
        };

        function displayPreview() {
            const container = document.getElementById('preview-area');
            container.innerHTML = '<h3 class="text-xl font-bold mb-6 text-white border-r-4 border-amber-500 pr-3">المحتوى المقترح:</h3>';
            
            generatedQuestions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'glass p-6 rounded-2xl mb-4 border border-white/5 hover:border-amber-500/30 transition-all';
                qDiv.innerHTML = `
                    <p class="font-bold text-lg mb-4 text-slate-100">${idx+1}. ${q.text}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${q.options.map((opt, i) => `
                            <div class="p-3 rounded-xl border ${q.correct === i+1 ? 'bg-green-500/10 border-green-500/50 text-green-400' : 'bg-white/5 border-white/5 text-slate-400'}">
                                <span class="text-[10px] ml-2 font-black">${i+1}.</span> ${opt}
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });

            document.getElementById('publish-btn').classList.remove('hidden');
        }

        window.publishAll = async () => {
            const topic = document.getElementById('topic-select').value;
            const branch = document.getElementById('branch-select').value;
            const btn = document.getElementById('publish-btn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> جاري الحفظ سحابياً...';

            try {
                for (const q of generatedQuestions) {
                    const qId = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                    const qRef = doc(db, 'artifacts', appId, 'public', 'data', 'questions', qId);
                    await setDoc(qRef, {
                        ...q,
                        topic,
                        branch,
                        createdAt: new Date().toISOString()
                    });
                }
                showToast("تم النشر بنجاح! الأسئلة الآن مباشرة في اللعبة", "success");
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showToast("حدث خطأ أثناء النشر", "error");
                btn.disabled = false;
            }
        };

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-bold text-white z-50 shadow-2xl transition-all animate-bounce ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0a0a0c; color: white; }
        .glass { background: rgba(22, 22, 28, 0.7); backdrop-filter: blur(20px); }
        select, input { background: #15151a; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 14px; color: white; outline: none; width: 100%; transition: 0.3s; }
        select:focus, input:focus { border-color: #f59e0b; background: #1c1c24; }
        .ai-card { background: linear-gradient(135deg, rgba(245,158,11,0.05) 0%, rgba(22,22,28,1) 100%); border: 1px solid rgba(245,158,11,0.1); }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-amber-500 mb-2">إدارة المحتوى الذكي</h1>
            <p class="text-slate-500 font-bold">توليد الأسئلة لـ "شغل مخك" عبر Gemini AI</p>
        </header>

        <!-- Generation Panel -->
        <div class="glass ai-card p-8 rounded-[40px] shadow-2xl mb-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div>
                    <label class="block text-xs font-black text-amber-500/60 mb-3 uppercase tracking-tighter">1. القسم الرئيسي</label>
                    <select id="topic-select">
                        <option value="">اختر القسم...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-black text-amber-500/60 mb-3 uppercase tracking-tighter">2. الفرع المحدد</label>
                    <select id="branch-select">
                        <option value="">اختر الفرع...</option>
                    </select>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-xs font-black text-amber-500/60 mb-3 uppercase tracking-tighter">3. توجيه الذكاء الاصطناعي (اختياري)</label>
                <input type="text" id="ai-prompt" placeholder="مثلاً: أسئلة للمحترفين عن الجبر، أو ملوك الدولة العباسية...">
            </div>

            <button id="gen-btn" onclick="generateAIQuestions()" class="w-full bg-white text-black py-5 rounded-3xl font-black text-xl hover:scale-[1.01] active:scale-[0.98] transition-all shadow-xl flex items-center justify-center group">
                <i class="fas fa-bolt ml-3 text-amber-500 group-hover:animate-pulse"></i> توليد بالذكاء الاصطناعي
            </button>
        </div>

        <!-- Preview & Action -->
        <div id="preview-area" class="mb-10">
            <!-- سيتم حقن الأسئلة هنا -->
        </div>

        <button id="publish-btn" onclick="publishAll()" class="hidden w-full bg-gradient-to-r from-green-600 to-emerald-500 text-white py-6 rounded-3xl font-black text-2xl shadow-2xl hover:brightness-110 active:scale-95 transition-all">
            🚀 نشر الأسئلة في اللعبة فوراً
        </button>
    </div>

</body>
</html>
