<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم شغل مخك 🛠️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="questions.js"></script> 

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // تأكد من وضع بيانات الـ Config الخاصة بك هنا
        const firebaseConfig = JSON.parse(__firebase_config); 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra';

        window.uploadAllData = async () => {
            const btn = document.getElementById('btn-upload');
            const status = document.getElementById('status');

            // التحقق من وجود البيانات في ملف questions.js
            // ملاحظة: لازم يكون المتغير في ملف questions.js اسمه questions
            if (typeof questions === 'undefined') {
                alert("خطأ: لم يتم العثور على متغير باسم questions داخل ملف questions.js");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳ جاري الرفع الشامل...";

            try {
                // تقسيم الأسئلة لمجموعات حسب الـ category و الـ subCategory تلقائياً
                const groups = {};
                questions.forEach(q => {
                    const key = `${q.category || 'عام'}-${q.subCategory || 'عام'}`;
                    if (!groups[key]) {
                        groups[key] = {
                            category: q.category || 'عام',
                            subCategory: q.subCategory || 'عام',
                            questions: []
                        };
                    }
                    groups[key].questions.push(q);
                });

                // رفع كل مجموعة لـ Firebase
                for (const key in groups) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), groups[key]);
                }

                status.innerHTML = "✅ تم رفع جميع الأسئلة بنجاح!";
                btn.innerText = "تم الرفع بنجاح ✔️";
            } catch (error) {
                console.error(error);
                status.innerHTML = "❌ حدث خطأ أثناء الرفع.. اطلّع على الـ Console";
                btn.disabled = false;
                btn.innerText = "إعادة محاولة الرفع";
            }
        };
    </script>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen font-sans">
    <div class="bg-slate-900 p-10 rounded-[40px] border border-slate-800 text-center max-w-lg w-full">
        <h1 class="text-3xl font-black mb-4">رفع بيانات المشروع 🚀</h1>
        <p class="text-slate-400 mb-8">سيتم سحب الأسئلة من <span class="text-indigo-400">questions.js</span> ورفعها لـ Firebase</p>
        
        <button id="btn-upload" onclick="uploadAllData()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-bold text-xl transition-transform active:scale-95 shadow-xl shadow-indigo-500/20">
            اضغط للرفع الآن ⚡
        </button>

        <div id="status" class="mt-6 text-sm text-slate-500 italic">جاهز للعمل...</div>
    </div>
</body>
</html>
