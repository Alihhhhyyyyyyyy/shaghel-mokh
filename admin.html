<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | رفع الـ 300 سؤال</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-['Tajawal'] p-6">

    <div class="max-w-2xl mx-auto bg-slate-900 rounded-[30px] p-8 border border-white/10 shadow-2xl mt-10">
        <h1 class="text-2xl font-black text-indigo-500 mb-2">تحديث قاعدة البيانات السحابية ⚡</h1>
        <p class="text-slate-400 text-sm mb-8">سيتم سحب 300 سؤال من GitHub ورفعهم لـ Firestore</p>

        <div class="bg-black/50 p-4 rounded-2xl mb-6 border border-white/5 text-[10px] text-indigo-300 break-all">
            <span class="text-slate-500 block mb-1">الرابط المستخدم حالياً:</span>
            https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/refs/heads/main/questions.js
        </div>

        <button id="mainBtn" onclick="syncData()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-lg shadow-indigo-600/20">
            ابدأ الرفع الآن 🚀
        </button>

        <div id="statusBox" class="mt-8 bg-black rounded-xl p-4 h-60 overflow-y-auto text-xs font-mono text-green-400 hidden">
            </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function addLog(msg, color = "text-green-400") {
            const box = document.getElementById('statusBox');
            box.classList.remove('hidden');
            box.innerHTML += `<div class="${color}">> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function syncData() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = true;
            btn.innerText = "جاري العمل...";
            addLog("بدء الاتصال بـ GitHub...");

            // الرابط اللي إنت بعته بالظبط
            const url = "https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/refs/heads/main/questions.js";

            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("الملف غير موجود (404). تأكد أن المستودع Public.");
                
                const text = await res.text();
                addLog("تم جلب الملف. جاري تحليل الأسئلة...");

                // استخراج الأوبجكت من النص
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}') + 1;
                const data = eval('(' + text.substring(start, end) + ')');

                const categories = Object.keys(data);
                addLog(`وجدنا ${categories.length} أقسام.`);

                const batch = db.batch();
                let total = 0;

                categories.forEach(key => {
                    const docRef = db.collection("quiz").doc(key);
                    batch.set(docRef, data[key]);
                    const count = data[key].qs.length;
                    total += count;
                    addLog(`تجهيز قسم [${data[key].name}] : ${count} سؤال`);
                });

                addLog(`جاري رفع ${total} سؤال لـ Firebase...`);
                await batch.commit();

                addLog("✅ مبروك! تمت العملية بنجاح كامل.", "text-indigo-400 font-bold text-lg");
                btn.innerText = "تم الرفع بنجاح ✅";
                btn.className = "w-full bg-green-600 py-5 rounded-2xl font-black text-xl";

            } catch (e) {
                addLog("خطأ: " + e.message, "text-red-500");
                btn.disabled = false;
                btn.innerText = "إعادة المحاولة 🔄";
            }
        }
    </script>
</body>
</html>
