<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | الرفع النهائي لـ Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #334155; width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #4f46e5; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #4338ca; transform: translateY(-2px); }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 13px; text-align: right; background: #000; padding: 15px; border-radius: 10px; color: #10b981; max-height: 150px; overflow-y: auto; font-family: monospace; }
        .err { color: #ef4444; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">تحديث بيانات المشروع 🚀</h2>
    <p style="color: #94a3b8; font-size: 14px;">سيتم سحب الأسئلة من الرابط الذي أرسلته ورفعها فوراً</p>
    
    <button id="uploadBtn" class="btn">ابدأ الرفع الآن</button>
    
    <div id="status">جاهز للربط...</div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
        authDomain: "shaghel-mokh-ultra.firebaseapp.com",
        projectId: "shaghel-mokh-ultra",
        storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
        messagingSenderId: "167435076773",
        appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');

    function log(msg, isError = false) {
        const div = document.createElement('div');
        if (isError) div.className = 'err';
        div.innerText = "> " + msg;
        statusDiv.appendChild(div);
        statusDiv.scrollTop = statusDiv.scrollHeight;
    }

    uploadBtn.addEventListener('click', async () => {
        uploadBtn.disabled = true;
        statusDiv.innerHTML = "";
        
        // الرابط اللي إنت بعته بالظبط
        const targetUrl = "https://raw.githubusercontent.com/Alihhhhhyyyyyyyy/shaghel-mokh/refs/heads/main/questions.js";

        log("جاري الاتصال بـ GitHub...");

        try {
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error("فشل الوصول للرابط. تأكد من إعدادات GitHub.");
            
            const rawContent = await response.text();
            log("تم استلام ملف الأسئلة بنجاح ✅");

            // تحويل نص الملف إلى بيانات Object
            // بنقص "const allQuestions =" وبناخد اللي بين الأقواس { }
            let dataString = rawContent.trim();
            const start = dataString.indexOf('{');
            const end = dataString.lastIndexOf('}') + 1;
            const finalJson = dataString.substring(start, end);
            
            // الربط البرمجي
            const allQuestions = eval('(' + finalJson + ')');
            const categories = Object.keys(allQuestions);
            log(`تم تحليل ${categories.length} أقسام جاهزة للرفع...`);

            // الرفع لـ Firestore بنظام Batch (دفعة واحدة)
            const batch = db.batch();
            categories.forEach(key => {
                const docRef = db.collection("quiz").doc(key);
                batch.set(docRef, allQuestions[key]);
                log(`تجهيز قسم: ${allQuestions[key].name}`);
            });

            await batch.commit();
            log("🎉 مبروك! تم رفع الـ 200 سؤال بنجاح لـ Firestore.");
            uploadBtn.innerText = "اكتمل التحديث ✅";
            uploadBtn.style.background = "#059669";

        } catch (error) {
            log("خطأ: " + error.message, true);
            console.error(error);
            uploadBtn.disabled = false;
        }
    });
</script>

</body>
</html>
