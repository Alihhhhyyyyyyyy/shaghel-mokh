<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - تحديث الأسئلة</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; }
        #status { margin-top: 15px; font-weight: bold; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>

<div class="card">
    <h1>⚙️ لوحة التحكم</h1>
    <p>سيتم سحب الأسئلة من GitHub ورفعها لـ Firebase</p>
    <button id="uploadBtn" onclick="fetchAndUpload()">تحديث الأسئلة الآن</button>
    <div id="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
      authDomain: "shaghel-mokh-ultra.firebaseapp.com",
      projectId: "shaghel-mokh-ultra",
      storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
      messagingSenderId: "167435076773",
      appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.fetchAndUpload = async function() {
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "جاري جلب الأسئلة من GitHub...";

        try {
            // جلب ملف questions.js مباشرة من GitHub Raw
            const response = await fetch('https://raw.githubusercontent.com/Alihhhhhyyyyyyy/shaghel-mokh/main/questions.js');
            const text = await response.text();
            
            // تحويل النص لكود جافاسكريبت واستخراج المصفوفة
            const data = eval(text + " allQuestions;");

            status.innerText = "جاري الرفع إلى Firebase...";
            await set(ref(db, 'questions/'), data);
            
            status.innerHTML = "<span class='success'>✅ تم التحديث بنجاح! اللعبة الآن تعمل بأحدث الأسئلة.</span>";
        } catch (err) {
            status.innerHTML = "<span class='error'>❌ فشل: " + err.message + "</span>";
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
