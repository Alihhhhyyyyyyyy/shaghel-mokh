<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - العبقري الخارق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          projectId: "shaghel-mokh-ultra",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const apiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA";

        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.generateAIQuestions = async () => {
            const topic = document.getElementById('topic').value;
            const cat = document.getElementById('category').value;
            const status = document.getElementById('status');
            if(!topic) return alert("ادخل الموضوع");

            status.innerText = "⏳ جاري التوليد...";
            const prompt = `أعطني 5 أسئلة عن ${topic} بتنسيق JSON: {"t":"سؤال","a":["1","2","3","4"],"c":0,"x":"تلميح","category":"${cat}"}`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });
                const data = await res.json();
                let text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const qs = JSON.parse(text);

                for(let q of qs) {
                    await addDoc(collection(db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'questions'), q);
                }
                status.innerText = "✅ تمت الإضافة للعبة!";
            } catch(e) { status.innerText = "❌ خطأ في الاتصال"; }
        };

        window.clearLeaderboard = async () => {
            if(!confirm("حذف كل المتصدرين؟")) return;
            const snap = await getDocs(collection(db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'rankings'));
            snap.forEach(async (d) => await deleteDoc(doc(db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'rankings', d.id)));
            alert("تم التصفير!");
        };
    </script>
    <style>body { font-family: 'Tajawal', sans-serif; background: #0a0a0a; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-black text-amber-500 mb-8 text-center">لوحة التحكم الألترا 💎</h1>
        
        <div class="flex gap-4 mb-8 justify-center">
            <button onclick="switchTab('q-gen')" class="bg-amber-500 text-black px-6 py-3 rounded-2xl font-bold">توليد أسئلة</button>
            <button onclick="switchTab('manage')" class="bg-zinc-800 px-6 py-3 rounded-2xl font-bold">الإحصائيات</button>
        </div>

        <div id="q-gen" class="tab-content bg-zinc-900 p-8 rounded-[40px] border border-white/5">
            <h2 class="text-2xl font-bold mb-6">مولد الأسئلة الذكي</h2>
            <input type="text" id="topic" placeholder="الموضوع (مثلاً: الفضاء)" class="w-full bg-black p-4 rounded-2xl mb-4 border border-white/10">
            <select id="category" class="w-full bg-black p-4 rounded-2xl mb-6 border border-white/10">
                <option value="إسلاميات">إسلاميات</option>
                <option value="تقنية">تقنية</option>
                <option value="تاريخ مصر">تاريخ مصر</option>
            </select>
            <button onclick="generateAIQuestions()" class="w-full py-5 bg-blue-600 rounded-3xl font-black text-xl">توليد وحفظ في Firebase ✨</button>
            <p id="status" class="mt-4 text-center text-amber-500"></p>
        </div>

        <div id="manage" class="tab-content hidden bg-zinc-900 p-8 rounded-[40px] border border-white/5">
            <h2 class="text-2xl font-bold mb-6">إدارة النظام</h2>
            <button onclick="clearLeaderboard()" class="bg-red-600 w-full py-4 rounded-2xl font-bold mb-4">تصفير لوحة المتصدرين 🏆</button>
            <p class="text-slate-500 text-center">ملاحظة: تصفير اللوحة يحذف الترتيب فقط ولا يحذف بيانات المستخدمين.</p>
        </div>
    </div>
</body>
</html>
