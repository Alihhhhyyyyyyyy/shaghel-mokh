<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - إدارة الأسئلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';
        const aiApiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA"; 

        // الانتظار حتى تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                signInAnonymously(auth);
            } else {
                loadQuestions();
            }
        });

        async function loadQuestions() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="text-center p-5 text-amber-500"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>';
            
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                const snap = await getDocs(qRef);
                container.innerHTML = '';
                
                if (snap.empty) {
                    container.innerHTML = '<p class="text-center opacity-50 p-5">لا توجد أسئلة.</p>';
                    return;
                }

                snap.forEach(d => {
                    const q = d.data();
                    const div = document.createElement('div');
                    div.className = "bg-slate-800 p-4 rounded-xl mb-3 border border-slate-700 flex justify-between items-center";
                    div.innerHTML = `
                        <div>
                            <div class="text-[10px] text-amber-500 font-bold mb-1">${q.category} > ${q.subCategory}</div>
                            <div class="text-sm font-bold">${q.t}</div>
                        </div>
                        <button onclick="deleteQ('${d.id}')" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = '<p class="text-red-500">حدث خطأ في جلب البيانات.</p>';
            }
        }

        window.deleteQ = async (id) => {
            if(confirm('حذف السؤال؟')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
                loadQuestions();
            }
        };

        window.generateAI = async () => {
            const cat = document.getElementById('ai-cat').value;
            const sub = document.getElementById('ai-sub').value;
            const log = document.getElementById('status-log');
            
            if(!cat || !sub) return alert('املأ البيانات');

            log.innerHTML = '<div class="text-amber-500 font-bold animate-pulse">جاري التوليد... انتظر قليلاً</div>';
            
            const prompt = `ألف 10 أسئلة MCQ بالعربي عن "${cat} - ${sub}". الرد JSON فقط كـ مصفوفة: [{"t":"السؤال","a":["1","2","3","4"],"c":0,"x":"معلومة"}]. بدون أي نص إضافي.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiApiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const questions = JSON.parse(text);

                log.innerHTML = '<div class="text-blue-400 font-bold">جاري الحفظ في القاعدة...</div>';

                for (let q of questions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q, category: cat, subCategory: sub, createdAt: Date.now()
                    });
                }

                log.innerHTML = '<div class="text-green-500 font-bold">✅ تم إضافة 10 أسئلة بنجاح!</div>';
                loadQuestions();
            } catch (e) {
                log.innerHTML = '<div class="text-red-500 font-bold">❌ فشل: تأكد من كتابة القسم والفرع بشكل صحيح.</div>';
            }
        };

        window.addManual = async (e) => {
            e.preventDefault();
            const qData = {
                category: document.getElementById('m-cat').value,
                subCategory: document.getElementById('m-sub').value,
                t: document.getElementById('m-q').value,
                a: [document.getElementById('m-a1').value, document.getElementById('m-a2').value, document.getElementById('m-a3').value, document.getElementById('m-a4').value],
                c: parseInt(document.getElementById('m-c').value),
                x: document.getElementById('m-x').value,
                createdAt: Date.now()
            };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), qData);
            alert('تم الحفظ');
            e.target.reset();
            loadQuestions();
        };

    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        input, textarea, select { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; border-radius: 8px; padding: 10px; width: 100%; margin-bottom: 10px; }
        .btn-ai { background: linear-gradient(to right, #f59e0b, #ea580c); color: black; font-weight: 900; padding: 15px; border-radius: 12px; width: 100%; }
        .btn-man { background: #3b82f6; color: white; font-weight: 900; padding: 12px; border-radius: 12px; width: 100%; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
    </style>
</head>
<body class="p-4 max-w-xl mx-auto">

    <h1 class="text-2xl font-black text-center mb-6 text-amber-500">لوحة إدارة الأسئلة 🛠️</h1>

    <!-- التوليد الذكي -->
    <div class="card">
        <h2 class="font-black mb-4"><i class="fas fa-robot"></i> توليد بالذكاء الاصطناعي</h2>
        <input type="text" id="ai-cat" placeholder="القسم (مثل: إسلاميات)">
        <input type="text" id="ai-sub" placeholder="الفرع (مثل: الصحابة)">
        <button onclick="generateAI()" class="btn-ai">توليد 10 أسئلة الآن 🚀</button>
        <div id="status-log" class="mt-3 text-center text-xs"></div>
    </div>

    <!-- إضافة يدوي -->
    <details class="card">
        <summary class="font-black cursor-pointer"><i class="fas fa-pen"></i> إضافة سؤال يدوي (اضغط للفتح)</summary>
        <form onsubmit="addManual(event)" class="mt-4">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="m-cat" placeholder="القسم" required>
                <input type="text" id="m-sub" placeholder="الفرع" required>
            </div>
            <textarea id="m-q" placeholder="السؤال" required></textarea>
            <input type="text" id="m-a1" placeholder="خيار 1" required>
            <input type="text" id="m-a2" placeholder="خيار 2" required>
            <input type="text" id="m-a3" placeholder="خيار 3" required>
            <input type="text" id="m-a4" placeholder="خيار 4" required>
            <select id="m-c">
                <option value="0">الإجابة 1 صح</option>
                <option value="1">الإجابة 2 صح</option>
                <option value="2">الإجابة 3 صح</option>
                <option value="3">الإجابة 4 صح</option>
            </select>
            <input type="text" id="m-x" placeholder="معلومة إضافية">
            <button type="submit" class="btn-man">حفظ السؤال</button>
        </form>
    </details>

    <!-- القائمة -->
    <div class="card">
        <h2 class="font-black mb-4 text-amber-500"><i class="fas fa-database"></i> الأسئلة المضافة</h2>
        <div id="list-container" class="max-h-[400px] overflow-y-auto"></div>
    </div>

</body>
</html>
