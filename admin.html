<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | رفع الأسئلة لـ Firebase</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; }
        .log-box { background: #020617; border: 1px solid #1e293b; height: 300px; overflow-y: auto; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl bg-slate-900 p-8 rounded-[2rem] border border-slate-800 shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-500 mb-2">مدير قاعدة البيانات 🛠️</h1>
            <p class="text-slate-400">ارفع الـ 300 سؤال لـ Firebase بضغطة واحدة</p>
        </div>

        <div class="space-y-6">
            <div class="bg-indigo-500/10 p-4 rounded-xl border border-indigo-500/20 text-sm text-indigo-300">
                <strong>تنبيه:</strong> تأكد من وضع بيانات الـ Config الخاصة بك في الكود بالأسفل، وتأكد أن ملف <code>questions.js</code> موجود في نفس المجلد.
            </div>

            <button id="upload-btn" onclick="syncData()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-4 rounded-xl font-bold text-xl transition-all active:scale-95 flex items-center justify-center gap-3">
                <span>ابدأ المزامنة الآن</span>
                <span id="loader" class="hidden animate-spin">⏳</span>
            </button>

            <div id="status-log" class="log-box p-4 rounded-xl font-mono text-xs text-green-400 space-y-1">
                <div>> نظام الإدارة جاهز...</div>
            </div>

            <div class="text-center">
                <a href="index.html" class="text-slate-500 hover:text-white text-sm underline">العودة لصفحة اللعبة الرئيسية</a>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>

    <script>
        // --- ضع بيانات Firebase الخاصة بك هنا ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "your-app.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // تهيئة Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const logDiv = document.getElementById('status-log');
        const btn = document.getElementById('upload-btn');
        const loader = document.getElementById('loader');

        function addLog(msg, color = 'text-green-400') {
            const entry = document.createElement('div');
            entry.className = color;
            entry.innerText = `> ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function syncData() {
            // التحقق من وجود البيانات
            if (typeof allQuestions === 'undefined') {
                addLog('خطأ: لم يتم العثور على متغير allQuestions في ملف questions.js', 'text-red-400');
                return;
            }

            btn.disabled = true;
            loader.classList.remove('hidden');
            addLog('بدء عملية المزامنة مع Firestore...');

            try {
                // رفع البيانات بالكامل لمستند واحد يسمى 'main' داخل مجموعة 'questions'
                // ده أفضل عشان يقلل الـ Read/Write ويخلي اللعبة سريعة
                await db.collection('questions').doc('main').set(allQuestions);
                
                addLog('نجاح! تم رفع الـ 300 سؤال بنجاح.');
                addLog('يمكنك الآن فتح صفحة index.html واللعب أونلاين.');
                
                alert('تمت المهمة بنجاح يا بطل! قاعدة بياناتك الآن جاهزة.');
            } catch (error) {
                console.error(error);
                addLog('حدث خطأ أثناء الرفع: ' + error.message, 'text-red-400');
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
