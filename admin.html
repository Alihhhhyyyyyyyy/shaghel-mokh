<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - حقيقة الذكاء الاصطناعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';
        const apiKey = ""; // سيتم استخدام المفتاح المدمج في البيئة أو المفتاح الافتراضي

        onAuthStateChanged(auth, (user) => {
            if (!user) signInAnonymously(auth);
            else loadQuestions();
        });

        // دالة التوليد الحقيقية
        window.startGeneration = async () => {
            const cat = document.getElementById('cat').value;
            const sub = document.getElementById('sub').value;
            const status = document.getElementById('status');
            
            if(!cat || !sub) {
                status.innerHTML = "❌ اكتب القسم والفرع أولاً";
                return;
            }

            status.innerHTML = "⏳ 1. جاري الاتصال بذكاء جوجل...";
            
            const prompt = `أجب بصيغة JSON فقط. مصفوفة بها 10 كائنات لكل كائن: t (السؤال)، a (4 اختيارات)، c (رقم الإجابة الصح 0-3)، x (معلومة). الموضوع: ${cat} - ${sub}`;

            try {
                // محاولة الاتصال بـ Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if(!response.ok) throw new Error("فشل الاتصال بسيرفر الذكاء الاصطناعي");

                const data = await response.json();
                const questions = JSON.parse(data.candidates[0].content.parts[0].text);

                status.innerHTML = `✅ 2. تم تأليف ${questions.length} أسئلة.. جاري الحفظ...`;

                for (const q of questions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q, category: cat, subCategory: sub, createdAt: Date.now()
                    });
                }

                status.innerHTML = "🎉 3. مبروك! الأسئلة الآن في تطبيقك!";
                loadQuestions();
            } catch (e) {
                status.innerHTML = "❌ فشل: " + e.message;
                console.error(e);
            }
        };

        async function loadQuestions() {
            const list = document.getElementById('list');
            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
            list.innerHTML = "";
            snap.forEach(d => {
                const q = d.data();
                const item = document.createElement('div');
                item.className = "p-3 bg-white/5 border border-white/10 rounded-lg mb-2 flex justify-between items-center";
                item.innerHTML = `<div><div class="text-[10px] text-amber-500">${q.category}</div><div class="text-xs">${q.t}</div></div>
                <button onclick="deleteQ('${d.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>`;
                list.appendChild(item);
            });
        }

        window.deleteQ = async (id) => {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
            loadQuestions();
        };

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 20px; border-radius: 20px; }
    </style>
</head>
<body class="p-5 max-w-lg mx-auto">
    <h1 class="text-2xl font-black text-center text-amber-500 mb-8">إدارة المحتوى الحقيقية 🤖</h1>

    <div class="card mb-6">
        <label class="block text-sm mb-2 opacity-70">القسم الرئيسي</label>
        <input type="text" id="cat" placeholder="مثلاً: تاريخ" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-4 text-white">
        
        <label class="block text-sm mb-2 opacity-70">الفرع أو المادة</label>
        <input type="text" id="sub" placeholder="مثلاً: الحرب العالمية" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl mb-6 text-white">

        <button onclick="startGeneration()" class="w-full bg-amber-500 text-black font-black py-4 rounded-xl active:scale-95 transition-transform">
            توليد وحفظ الأسئلة فوراً ✨
        </button>

        <div id="status" class="mt-4 text-center text-sm font-bold text-blue-400"></div>
    </div>

    <div class="card">
        <h2 class="font-black mb-4"><i class="fas fa-database text-amber-500"></i> الأسئلة المخزنة فعلياً</h2>
        <div id="list" class="max-h-60 overflow-y-auto pr-2 text-right"></div>
    </div>
</body>
</html>
