<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | ربط ورفع الأسئلة</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #334155; width: 450px; }
        .btn { background: #4f46e5; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #4338ca; transform: scale(1.02); }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; text-align: right; background: #000; padding: 15px; border-radius: 8px; color: #10b981; min-height: 50px; overflow-y: auto; }
        .err { color: #ef4444; }
    </style>
</head>
<body>

<div class="box">
    <h2>تحديث بيانات المشروع ⚙️</h2>
    <p style="color: #94a3b8;">سيتم جلب 200 سؤال من GitHub وربطهم بـ Firestore</p>
    
    <button id="startBtn" class="btn">ابدأ عملية الربط والرفع</button>
    
    <div id="status">جاهز لبدء العملية...</div>
</div>

<script>
    // 1. إعدادات Firebase (تأكد إنها صحيحة 100% من الـ Console بتاعك)
    const firebaseConfig = {
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
        authDomain: "shaghel-mokh-ultra.firebaseapp.com",
        projectId: "shaghel-mokh-ultra",
        storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
        messagingSenderId: "167435076773",
        appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('status');

    function log(msg, isError = false) {
        const span = document.createElement('div');
        if (isError) span.className = 'err';
        span.innerText = "> " + msg;
        statusDiv.appendChild(span);
        statusDiv.scrollTop = statusDiv.scrollHeight;
    }

    startBtn.addEventListener('click', async () => {
        startBtn.disabled = true;
        statusDiv.innerHTML = "";
        log("بدء الربط مع GitHub...");

        // 2. بيانات الملف على GitHub
        const username = "Alihhhhhyyyyyyyy";
        const repo = "shaghel-mokh";
        const file = "questions.js";
        // إضافة timestamp للرابط لمنع الـ Cache (عشان يجيب التعديلات الجديدة دايماً)
        const githubUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/${file}?t=${new Date().getTime()}`;

        try {
            // جلب ملف الأسئلة
            const response = await fetch(githubUrl);
            if (!response.ok) throw new Error("مشكلة في الوصول لملف GitHub (تأكد من اسم الملف)");
            
            const fileContent = await response.text();
            log("تم جلب ملف الأسئلة بنجاح ✅");

            // تحويل نص الملف إلى كائن (Object)
            // الكود ده بياخد الكلام اللي بعد علامة الـ = وبيمسح الـ ; اللي في الآخر
            let dataRaw = fileContent.trim();
            const startIndex = dataRaw.indexOf('=') + 1;
            const endIndex = dataRaw.lastIndexOf(';');
            const jsonString = dataRaw.substring(startIndex, endIndex).trim();
            
            // الربط البرمجي وتحويل النص لبيانات
            const allQuestions = eval('(' + jsonString + ')');
            log("تم تحليل الأسئلة (عدد الأقسام: " + Object.keys(allQuestions).length + ") 📊");

            // 3. الرفع لـ Firestore
            log("بدء الرفع للسحابة (Firestore)...");
            const batch = db.batch();

            for (const categoryKey in allQuestions) {
                const docRef = db.collection("quiz").doc(categoryKey);
                batch.set(docRef, allQuestions[categoryKey]);
                log("تجهيز قسم: " + allQuestions[categoryKey].name);
            }

            await batch.commit();
            log("تم الرفع والربط بنجاح! مبروك 🎉", false);
            startBtn.innerText = "اكتمل بنجاح ✅";

        } catch (error) {
            log("خطأ: " + error.message, true);
            console.error(error);
            startBtn.disabled = false;
        }
    });
</script>

</body>
</html>
