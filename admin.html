<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | مخك ذهب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-3xl mx-auto text-center">
        <h1 class="text-4xl font-black text-indigo-400 mb-8 italic">Admin Injector V3.0</h1>
        
        <div class="glass p-12 rounded-[50px] border-2 border-indigo-500/20 shadow-2xl">
            <div class="mb-8">
                <span class="bg-indigo-600/20 text-indigo-400 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">Database Sync</span>
            </div>
            <h2 class="text-2xl font-bold mb-4">رفع الأسئلة من الملف المنفصل</h2>
            <p class="text-slate-400 mb-10 leading-relaxed">تأكد من تحديث ملف <code class="text-indigo-300">questions.js</code> أولاً، ثم اضغط الزر بالأسفل لتحديث قاعدة البيانات بالكامل.</p>
            
            <button onclick="syncData()" id="sync-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-6 rounded-3xl font-black text-2xl transition-all shadow-xl shadow-indigo-600/30 active:scale-95">
                تحديث الأسئلة الآن 🚀
            </button>
            
            <p id="status" class="mt-8 font-bold text-lg transition-all"></p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
    // استدعاء البيانات من الملف المنفصل
    import { giantData } from "./questions.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWIYaVgqpc2g8stA", 
        authDomain: "shaghel-mokh-ultra.firebaseapp.com", 
        projectId: "shaghel-mokh-ultra" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.syncData = async () => {
        const btn = document.getElementById('sync-btn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "⏳ جاري سحب البيانات من questions.js...";

        try {
            for (let path in giantData) {
                await setDoc(doc(db, "content", path), { qs: giantData[path] });
            }
            status.innerText = "✅ مبروك! كل الأسئلة أصبحت أونلاين الآن.";
            status.className = "mt-8 font-bold text-lg text-green-400 animate-bounce";
            btn.innerText = "تم التحديث بنجاح ✅";
        } catch (e) {
            status.innerText = "❌ فشل التحديث: " + e.message;
            status.className = "mt-8 font-bold text-lg text-red-500";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
