<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | GOD MODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-text { background: linear-gradient(to right, #f59e0b, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-gold { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #000; font-weight: 900; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8 glass p-6 rounded-[2rem]">
            <div>
                <h1 class="text-3xl font-black gold-text uppercase">GOD MODE</h1>
                <p class="text-xs text-gray-400">إدارة لعبة شغل مخك - الإصدار الاحترافي</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="flex items-center gap-2">
                    <span id="fb-status" class="status-dot bg-red-500"></span>
                    <span class="text-[10px] uppercase">Firebase Connection</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="gemini-status" class="status-dot bg-green-500"></span>
                    <span class="text-[10px] uppercase">Gemini AI Ready</span>
                </div>
            </div>
        </header>

        <div class="grid md:grid-cols-12 gap-6">
            
            <!-- AI Content Injection -->
            <section class="md:col-span-4 space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-brain text-amber-500"></i> حقن محتوى ذكي
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-xs text-gray-400 block mb-1">اختر القسم المستهدف</label>
                            <select id="target-cat" class="w-full bg-black/50 border border-white/10 p-3 rounded-xl outline-none focus:border-amber-500 transition">
                                <option value="isl_prophets">🕌 قصص الأنبياء</option>
                                <option value="his_world">🌍 تاريخ العالم</option>
                                <option value="sci_physics">🧪 فيزياء وعلوم</option>
                                <option value="spo_football">⚽ كرة قدم</option>
                            </select>
                        </div>
                        <button id="inject-btn" class="w-full py-4 btn-gold rounded-xl shadow-lg shadow-amber-500/20 active:scale-95 transition-all">
                            توليد 5 أسئلة احترافية
                        </button>
                        <div id="log-box" class="text-[10px] font-mono text-gray-500 bg-black/40 p-2 rounded h-20 overflow-y-auto border border-white/5">
                            > بانتظار الأوامر...
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl border-red-500/20">
                    <h3 class="text-lg font-bold mb-4 text-red-500 flex items-center gap-2">
                        <i class="fas fa-exclamation-triangle"></i> منطقة الخطر
                    </h3>
                    <button onclick="window.clearRankings()" class="w-full py-3 bg-red-600/10 border border-red-600 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition font-bold">
                        تصفير قائمة المتصدرين
                    </button>
                </div>
            </section>

            <!-- User Management -->
            <section class="md:col-span-8 glass p-6 rounded-3xl">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-users-cog text-blue-500"></i> إدارة اللاعبين والبيانات
                </h3>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-right">
                        <thead>
                            <tr class="text-gray-500 text-xs border-b border-white/5">
                                <th class="pb-4 pr-4">اللاعب</th>
                                <th class="pb-4">العملات (Coins)</th>
                                <th class="pb-4">القلوب (Hearts)</th>
                                <th class="pb-4">الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- سيتم ملء البيانات هنا -->
                        </tbody>
                    </table>
                </div>
                <div id="loading-spinner" class="py-20 text-center">
                    <i class="fas fa-circle-notch animate-spin text-3xl text-amber-500"></i>
                </div>
            </section>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, updateDoc, setDoc, deleteDoc, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const GEMINI_KEY = "AIzaSyAOELEuu8EVlY6bRs9yTyrbTwOjuLskiW8";
        const APP_ID = "shaghel-mokh-ultra-v2";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const log = (msg) => {
            const box = document.getElementById('log-box');
            box.innerHTML += `<div>> ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        };

        // دالة تحديث بيانات اللاعب
        window.updateStat = async (uid, field, val) => {
            try {
                const userRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'rankings', uid);
                await updateDoc(userRef, { [field]: parseInt(val) });
                log(`تم تحديث ${field} للاعب ${uid.substring(0,5)}...`);
            } catch (e) {
                console.error(e);
            }
        };

        // دالة توليد الأسئلة
        document.getElementById('inject-btn').onclick = async () => {
            const cat = document.getElementById('target-cat').value;
            const btn = document.getElementById('inject-btn');
            btn.disabled = true;
            btn.innerText = "جاري الاتصال بـ Gemini...";
            log(`بدء توليد أسئلة لقسم: ${cat}`);

            const prompt = `أعطني قائمة بـ 5 أسئلة مسابقات صعبة جداً وجديدة عن ${cat}. أريد التنسيق بصيغة JSON فقط كصفوف في مصفوفة. كل كائن يحتوي على: text (السؤال), options (4 اختيارات), correctIndex (0-3), explanation (شرح بسيط). اللغة: العربية.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                const cleanJson = aiResponse.replace(/```json|```/g, "").trim();
                const questions = JSON.parse(cleanJson);

                log(`تم استلام ${questions.length} أسئلة. جاري الحفظ...`);

                for (const q of questions) {
                    const qId = `ai_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'questions', qId), {
                        ...q,
                        category: cat,
                        source: 'AI_GOD_MODE',
                        createdAt: new Date().toISOString()
                    });
                }
                log("تم حقن الأسئلة بنجاح في قاعدة البيانات!");
                alert("تم تحديث بنك الأسئلة بالنجاح!");
            } catch (error) {
                log(`خطأ: ${error.message}`);
                alert("تأكد من إعدادات الـ API أو صلاحيات Firestore");
            } finally {
                btn.disabled = false;
                btn.innerText = "توليد 5 أسئلة احترافية";
            }
        };

        // تصفير البيانات
        window.clearRankings = async () => {
            if(!confirm("هل أنت متأكد؟ سيتم مسح جميع نقاط اللاعبين!")) return;
            const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'rankings'));
            const snap = await getDocs(q);
            snap.forEach(async (d) => await deleteDoc(d.ref));
            log("تم تصفير قائمة المتصدرين.");
        };

        // الاستماع للبيانات حياً
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('fb-status').classList.replace('bg-red-500', 'bg-green-500');
                log("متصل بـ Firebase بنجاح.");
                
                const rankingsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'rankings');
                onSnapshot(rankingsRef, (snapshot) => {
                    const body = document.getElementById('users-table-body');
                    const spinner = document.getElementById('loading-spinner');
                    spinner.style.display = 'none';
                    
                    body.innerHTML = '';
                    snapshot.forEach((docSnap) => {
                        const data = docSnap.data();
                        const id = docSnap.id;
                        body.innerHTML += `
                            <tr class="border-b border-white/5 hover:bg-white/[0.02] transition">
                                <td class="py-4 pr-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-full bg-amber-500/20 flex items-center justify-center text-amber-500 font-bold">
                                            ${(data.name || 'U').charAt(0)}
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm">${data.name || 'لاعب مجهول'}</p>
                                            <p class="text-[9px] text-gray-600 font-mono">${id}</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-4">
                                    <input type="number" value="${data.coins || 0}" 
                                        onchange="window.updateStat('${id}', 'coins', this.value)"
                                        class="bg-black/40 border border-white/10 w-20 p-1 rounded text-center text-yellow-500 focus:border-yellow-500 outline-none">
                                </td>
                                <td class="py-4">
                                    <input type="number" value="${data.hearts || 0}" 
                                        onchange="window.updateStat('${id}', 'hearts', this.value)"
                                        class="bg-black/40 border border-white/10 w-16 p-1 rounded text-center text-red-500 focus:border-red-500 outline-none">
                                </td>
                                <td class="py-4">
                                    <button onclick="window.updateStat('${id}', 'coins', 99999)" class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded">MAX COINS</button>
                                </td>
                            </tr>
                        `;
                    });
                }, (err) => {
                    log(`خطأ في التحميل: ${err.message}`);
                });
            } else {
                signInAnonymously(auth).catch(e => log(`فشل الدخول: ${e.message}`));
            }
        });

    </script>
</body>
</html>
