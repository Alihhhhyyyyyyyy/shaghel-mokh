<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأسئلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #16213e; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #e94560; width: 85%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #e94560; color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn:hover { background: #ff2e63; transform: scale(1.02); }
        #status { margin-top: 20px; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin-bottom: 20px;">⚡ لوحة التحكم</h2>
        <button class="btn" id="syncBtn" onclick="sync()">تحديث "علطول" من GitHub 🚀</button>
        <div id="status">اضغط على الزرار للتحديث</div>
        <button class="btn" style="background:#34495e; margin-top:15px; font-size: 0.9rem;" onclick="window.location.href='index.html'">العودة للموقع</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            databaseURL: "https://shaghel-mokh-ultra-default-rtdb.firebaseio.com",
            projectId: "shaghel-mokh-ultra"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function sync() {
            const status = document.getElementById('status');
            const btn = document.getElementById('syncBtn');
            status.innerText = "⏳ جاري السحب من GitHub...";
            status.style.color = "#f39c12";
            btn.disabled = true;

            const url = "https://raw.githubusercontent.com/Alihhhhyyyyyyyy/shaghel-mokh/main/questions.js?t=" + new Date().getTime();

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("مش قادر أوصل للملف على GitHub");
                
                let text = await response.text();
                
                // تنظيف ذكي: بياخد فقط ما بين أول { وآخر }
                const start = text.indexOf('{');
                const end = text.lastIndexOf('}') + 1;
                const cleanJson = text.substring(start, end);

                // تحويل النص لبيانات
                const data = JSON.parse(cleanJson);

                // الرفع لفايرباس
                await db.ref('questionsBank').set(data);
                
                status.innerText = "✅ تم التحديث بنجاح! الأسئلة الجديدة شغالة دلوقتي.";
                status.style.color = "#27ae60";
            } catch (err) {
                console.error(err);
                status.innerText = "❌ فشل التحديث: " + err.message + "\nتأكد إن الملف على GitHub لا يحتوي على أخطاء.";
                status.style.color = "#ff4d4d";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
