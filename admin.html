        window.uploadToFirebase = async () => {
            const btn = document.getElementById('main-btn');
            const status = document.getElementById('status-msg');

            if (allQuestions.length === 0) return alert("المصفوفة فاضية! حط الأسئلة الأول");

            btn.disabled = true;
            btn.innerHTML = "جاري الرفع... ⏳";
            status.innerText = "بدأنا نرفع الـ 200 سؤال...";

            try {
                // تجميع الأسئلة لتقليل عدد المستندات (Documents)
                const groups = {};
                allQuestions.forEach(q => {
                    const key = `${q.category}-${q.subCategory}`;
                    if (!groups[key]) {
                        groups[key] = {
                            category: q.category,
                            subCategory: q.subCategory,
                            questions: []
                        };
                    }
                    groups[key].questions.push(q);
                });

                for (const key in groups) {
                    await addDoc(collection(db, "questions"), {
                        ...groups[key],
                        timestamp: serverTimestamp()
                    });
                }

                status.innerHTML = "✅ <b class='text-green-400'>عاش يا بطل!</b> تم الرفع بنجاح.";
                btn.innerText = "تم الرفع بنجاح ✨";
            } catch (e) {
                console.error(e);
                status.innerText = "حصلت مشكلة: " + e.message;
                btn.disabled = false;
                btn.innerText = "جرب تاني";
            }
        };
    </script>
