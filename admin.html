ة<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير محتوى شغّل مخك</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-card { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="app" class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="glass p-6 rounded-[2rem] mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center text-black shadow-lg shadow-amber-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black">تحكم "شغّل مخك" الذكي</h1>
                    <p class="text-gray-500 text-xs font-bold uppercase tracking-widest">نظام توليد الأسئلة V3</p>
                </div>
            </div>
            <div id="connection-status" class="px-4 py-2 bg-yellow-500/10 text-yellow-500 rounded-full text-xs font-bold border border-yellow-500/20">
                جاري الاتصال بـ Firebase...
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar Controls -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="text-lg font-black mb-6 flex items-center gap-2">
                        <span class="text-amber-500">✦</span> توليد أسئلة جديدة
                    </h2>
                    
                    <div class="space-y-4">
                        <label class="block text-xs text-gray-500 mr-2">التصنيف الرئيسي</label>
                        <select id="main-cat" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-amber-500 transition-all font-bold">
                            <!-- Categories will be injected -->
                        </select>

                        <label class="block text-xs text-gray-500 mr-2">القسم الفرعي</label>
                        <select id="sub-cat" class="w-full bg-black border border-white/10 p-4 rounded-2xl outline-none focus:border-amber-500 transition-all font-bold">
                            <!-- Subcategories will be injected -->
                        </select>

                        <button id="gen-btn" class="w-full bg-amber-500 hover:bg-amber-400 text-black py-5 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-xl shadow-amber-500/10 mt-4 flex items-center justify-center gap-2">
                            توليد 10 أسئلة ذكية
                        </button>
                    </div>
                    
                    <div id="status-box" class="hidden mt-4 p-4 rounded-2xl text-sm font-bold border"></div>
                </div>

                <div class="glass p-6 rounded-[2rem] text-center">
                    <p class="text-gray-500 text-sm mb-1">إجمالي الأسئلة في هذا الحساب</p>
                    <p id="total-count" class="text-4xl font-black text-white">0</p>
                </div>
            </div>

            <!-- Content Area -->
            <div class="lg:col-span-8">
                <div class="glass rounded-[2.5rem] flex flex-col min-h-[600px] overflow-hidden">
                    <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
                        <h3 class="font-black text-xl">مستودع البيانات المباشر</h3>
                    </div>
                    <div id="questions-list" class="p-6 space-y-4 max-h-[700px] overflow-y-auto custom-scroll">
                        <!-- Questions will appear here -->
                        <div class="text-center py-20 opacity-20">جاري جلب البيانات...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-ultra-full';
        const apiKey = ""; // محقون تلقائياً

        const categoryConfig = {
            islamic: { name: "إسلاميات", icon: "🕌", subs: ["قصص الأنبياء", "القرآن الكريم", "السيرة النبوية", "الفقه الميسر"] },
            egypt: { name: "تاريخ مصر", icon: "🏺", subs: ["الفراعنة", "مصر الحديثة", "آثار النوبة", "ثورات مصر"] },
            tech: { name: "تقنية", icon: "💻", subs: ["برمجة", "ذكاء اصطناعي", "أمن سيبراني", "تاريخ الحواسيب"] },
            science: { name: "علوم وفضاء", icon: "🚀", subs: ["الفضاء", "جسم الإنسان", "الكيمياء", "الفيزياء الكمية"] },
            geo: { name: "جغرافيا", icon: "🌍", subs: ["عواصم", "أعلام", "عجائب الدنيا", "تضاريس الأرض"] },
            sports: { name: "رياضة", icon: "⚽", subs: ["كرة قدم", "أساطير", "الأولمبياد", "كأس العالم"] },
            puzzles: { name: "ألغاز", icon: "🧩", subs: ["منطق", "أحجيات", "رياضيات", "ذكاء بصري"] },
            food: { name: "طعام", icon: "🍱", subs: ["أطباق عالمية", "حلويات", "توابل", "فواكه نادرة"] }
        };

        let currentQuestions = [];

        // UI Selectors
        const mainCatSelect = document.getElementById('main-cat');
        const subCatSelect = document.getElementById('sub-cat');
        const genBtn = document.getElementById('gen-btn');
        const listDiv = document.getElementById('questions-list');
        const totalText = document.getElementById('total-count');
        const statusBox = document.getElementById('status-box');
        const connStatus = document.getElementById('connection-status');

        // Init UI
        Object.keys(categoryConfig).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = categoryConfig[key].icon + " " + categoryConfig[key].name;
            mainCatSelect.appendChild(opt);
        });

        const updateSubs = () => {
            subCatSelect.innerHTML = '';
            categoryConfig[mainCatSelect.value].subs.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = s;
                subCatSelect.appendChild(opt);
            });
        };
        mainCatSelect.onchange = updateSubs;
        updateSubs();

        // Firebase Connection
        const start = async () => {
            await signInAnonymously(auth);
            connStatus.innerText = "متصل بقاعدة البيانات";
            connStatus.classList.replace('text-yellow-500', 'text-green-500');
            connStatus.classList.replace('bg-yellow-500/10', 'bg-green-500/10');

            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
            onSnapshot(q, (snapshot) => {
                currentQuestions = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                currentQuestions.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                renderQuestions();
            });
        };

        const renderQuestions = () => {
            totalText.innerText = currentQuestions.length;
            if (currentQuestions.length === 0) {
                listDiv.innerHTML = `<div class="text-center py-20 opacity-20">لا يوجد أسئلة حالياً</div>`;
                return;
            }

            listDiv.innerHTML = currentQuestions.map(q => `
                <div class="bg-black/40 border border-white/5 p-6 rounded-[2rem] animate-card relative group">
                    <button onclick="window.deleteQ('${q.id}')" class="absolute top-4 left-4 p-2 text-red-500 hover:bg-red-500/10 rounded-lg transition-all">
                        حذف
                    </button>
                    <div class="flex gap-2 mb-3">
                        <span class="text-[10px] bg-amber-500/10 text-amber-500 px-2 py-1 rounded-md font-bold">${q.category}</span>
                        <span class="text-[10px] bg-white/5 text-gray-500 px-2 py-1 rounded-md font-bold">${q.subCategory}</span>
                    </div>
                    <h4 class="font-bold text-lg mb-4 pl-12">${q.t}</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        ${q.a.map((ans, i) => `
                            <div class="p-3 text-xs rounded-xl border ${i === q.c ? 'border-green-500/30 bg-green-500/10 text-green-400 font-bold' : 'border-white/5 bg-white/5 text-gray-400'}">
                                ${i + 1}. ${ans}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        };

        window.deleteQ = async (id) => {
            if(confirm('هل أنت متأكد من الحذف؟')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
            }
        };

        // Generation
        genBtn.onclick = async () => {
            genBtn.disabled = true;
            genBtn.innerText = "جاري التوليد...";
            statusBox.className = "mt-4 p-4 rounded-2xl text-sm font-bold border bg-blue-500/10 text-blue-400 border-blue-500/20";
            statusBox.innerText = "جاري فحص التكرار وتوليد المحتوى...";
            statusBox.classList.remove('hidden');

            const cat = categoryConfig[mainCatSelect.value].name;
            const sub = subCatSelect.value;
            const existing = currentQuestions.filter(q => q.subCategory === sub).map(q => q.t).slice(0, 15);

            try {
                const prompt = `Generate 10 UNIQUE MCQ in Arabic for ${cat} - ${sub}. Format: JSON Array only. No duplicates of: [${existing.join(',')}]. Schema: [{"t":"Q", "a":["1","2","3","4"], "c":0, "x":"exp"}]`;
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Return JSON ONLY" }] }
                    })
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const newQs = JSON.parse(text);

                for(const item of newQs) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...item,
                        category: cat,
                        subCategory: sub,
                        createdAt: Date.now()
                    });
                }

                statusBox.innerText = "تمت إضافة 10 أسئلة بنجاح!";
                statusBox.className = "mt-4 p-4 rounded-2xl text-sm font-bold border bg-green-500/10 text-green-400 border-green-500/20";
            } catch (err) {
                console.error(err);
                statusBox.innerText = "فشل التوليد. حاول مرة أخرى.";
                statusBox.className = "mt-4 p-4 rounded-2xl text-sm font-bold border bg-red-500/10 text-red-400 border-red-500/20";
            } finally {
                genBtn.disabled = false;
                genBtn.innerHTML = "توليد 10 أسئلة ذكية";
            }
        };

        start();
    </script>

</body>
</html>
