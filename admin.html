<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الذكية - شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';
        const apiKey = ""; // سيتم تعويضه تلقائياً من البيئة

        onAuthStateChanged(auth, (user) => {
            if (user) loadQuestions();
            else signInAnonymously(auth);
        });

        // دالة التوليد الذكية
        window.generateWithAI = async () => {
            const topicInput = document.getElementById('topic');
            const status = document.getElementById('ai-status');
            const resultBox = document.getElementById('ai-result');
            const topic = topicInput.value.trim();
            
            if(!topic) return alert("من فضلك اكتب الموضوع أولاً!");

            status.innerHTML = `<div class="flex items-center justify-center gap-2 text-amber-500 animate-pulse">
                <i class="fas fa-brain"></i> <span>جاري تفكير الذكاء الاصطناعي...</span>
            </div>`;
            resultBox.classList.add('hidden');

            const systemPrompt = "You are a professional quiz creator. Generate 10 multiple-choice questions in Arabic. Return ONLY a JSON array. Each object must have: t (question string), a (array of 4 options), c (index of correct answer 0-3), x (short interesting fact). No markdown, no extra text.";
            const userQuery = `Generate 10 questions about: ${topic}. Format: [{"t":"..","a":["..","..","..",".."],"c":0,"x":".."}]`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("Connection failed");

                const data = await response.json();
                const questions = JSON.parse(data.candidates[0].content.parts[0].text);
                
                window.tempQuestions = questions;
                window.currentTopic = topic;

                status.innerHTML = `<div class="text-green-500 font-bold"><i class="fas fa-check-circle"></i> تم توليد 10 أسئلة عن ${topic}</div>`;
                resultBox.classList.remove('hidden');
                document.getElementById('preview-info').innerText = `تم تجهيز الأسئلة، هل تريد حفظها في قاعدة البيانات؟`;
            } catch (e) {
                status.innerHTML = `<div class="text-red-500 font-bold">❌ حدث خطأ، جرب الضغط مرة أخرى</div>`;
                console.error(e);
            }
        };

        // دالة الحفظ
        window.saveGenerated = async () => {
            const status = document.getElementById('ai-status');
            const saveBtn = document.getElementById('save-btn');
            const topic = window.currentTopic || "عام";
            const parts = topic.split('-').map(p => p.trim());
            const category = parts[0];
            const subCategory = parts[1] || parts[0];

            saveBtn.disabled = true;
            status.innerHTML = "💾 جاري الحفظ الآن...";
            
            try {
                for (const q of window.tempQuestions) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q,
                        category: category,
                        subCategory: subCategory,
                        createdAt: Date.now()
                    });
                }
                status.innerHTML = "🎉 مبروك! الأسئلة أضيفت لمشروعك بنجاح.";
                document.getElementById('ai-result').classList.add('hidden');
                document.getElementById('topic').value = "";
                loadQuestions();
            } catch (e) {
                status.innerHTML = "❌ خطأ أثناء الحفظ.";
            } finally {
                saveBtn.disabled = false;
            }
        };

        async function loadQuestions() {
            const list = document.getElementById('list');
            const countDisplay = document.getElementById('total-count');
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
                list.innerHTML = "";
                countDisplay.innerText = snap.size;
                
                if(snap.empty) {
                    list.innerHTML = "<div class='text-center py-10 opacity-30'>القائمة فارغة</div>";
                    return;
                }

                snap.forEach(d => {
                    const q = d.data();
                    const item = document.createElement('div');
                    item.className = "p-4 bg-slate-800/40 border border-slate-700/50 rounded-2xl mb-2 flex justify-between items-center";
                    item.innerHTML = `
                        <div class="flex-1">
                            <div class="flex gap-2 items-center mb-1">
                                <span class="bg-amber-500/20 text-amber-500 text-[9px] font-bold px-2 py-0.5 rounded uppercase">${q.category}</span>
                                <span class="bg-blue-500/20 text-blue-500 text-[9px] font-bold px-2 py-0.5 rounded uppercase">${q.subCategory}</span>
                            </div>
                            <div class="text-xs font-bold">${q.t}</div>
                        </div>
                        <button onclick="deleteQ('${d.id}')" class="text-red-500/50 hover:text-red-500 p-2 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    `;
                    list.appendChild(item);
                });
            } catch (e) {}
        }

        window.deleteQ = async (id) => {
            if(!confirm("حذف السؤال؟")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
            loadQuestions();
        };

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .neon-border { border: 1px solid rgba(245, 158, 11, 0.1); box-shadow: 0 0 20px rgba(245, 158, 11, 0.05); }
        input { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 14px; width: 100%; color: white; margin-bottom: 8px; font-weight: bold; }
        input:focus { border-color: #f59e0b; outline: none; }
        .btn-main { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: black; font-weight: 900; padding: 16px; border-radius: 16px; width: 100%; transition: 0.2s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .btn-main:active { transform: scale(0.96); }
        .btn-confirm { background: #10b981; color: white; font-weight: 900; padding: 14px; border-radius: 16px; width: 100%; margin-top: 10px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto min-h-screen flex flex-col">

    <header class="text-center mb-8 pt-4">
        <h1 class="text-3xl font-black tracking-tight"><span class="text-amber-500">AI</span> CONTROL</h1>
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-1">المحرك الذكي لإدارة الأسئلة</p>
    </header>

    <!-- منطقة التوليد -->
    <div class="bg-slate-900/50 p-6 rounded-[2.5rem] neon-border mb-6">
        <h2 class="text-sm font-black mb-4 flex items-center gap-2">
            <i class="fas fa-plus-circle text-amber-500"></i> إضافة محتوى جديد
        </h2>
        <input type="text" id="topic" placeholder="مثال: جغرافيا - دول أفريقيا">
        <p class="text-[10px] text-slate-500 mb-6 mr-1">اكتب (القسم - الفرع) ليتم تصنيفهم تلقائياً في اللعبة.</p>
        
        <button onclick="generateWithAI()" class="btn-main">
            توليد 10 أسئلة الآن <i class="fas fa-magic mr-2"></i>
        </button>

        <div id="ai-status" class="mt-4 text-center text-xs font-bold min-h-[16px]"></div>

        <!-- معاينة قبل الحفظ -->
        <div id="ai-result" class="hidden mt-4 p-4 bg-emerald-500/5 border border-emerald-500/20 rounded-2xl">
            <p id="preview-info" class="text-[11px] text-center mb-4 text-emerald-400 font-bold"></p>
            <button id="save-btn" onclick="saveGenerated()" class="btn-confirm active:scale-95 transition-transform">
                تأكيد الحفظ في السحابة ✅
            </button>
        </div>
    </div>

    <!-- قائمة الأسئلة -->
    <div class="bg-slate-900/50 p-6 rounded-[2.5rem] flex-1 flex flex-col overflow-hidden neon-border">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-sm font-black uppercase text-slate-400 tracking-tighter">بنك الأسئلة المتاحة</h3>
            <span class="bg-slate-800 text-[10px] font-bold px-3 py-1 rounded-full text-amber-500 border border-white/5">
                إجمالي: <span id="total-count">0</span>
            </span>
        </div>
        <div id="list" class="flex-1 overflow-y-auto space-y-2 pr-1">
            <!-- سيتم تحميل الأسئلة هنا -->
        </div>
    </div>

    <footer class="mt-6 text-center pb-4">
        <div class="text-[9px] text-slate-700 font-black tracking-widest uppercase">
            Powered by Gemini 2.5 Ultra Engine
        </div>
    </footer>

</body>
</html>
