<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - العبقري الخارق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          projectId: "shaghel-mokh-ultra",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const apiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA";

        window.generateAIQuestions = async () => {
            const topic = document.getElementById('topic').value;
            const cat = document.getElementById('category').value;
            const status = document.getElementById('status');
            if(!topic) return alert("ادخل الموضوع");

            status.innerHTML = "⏳ جاري التوليد... (قد يستغرق 10 ثواني)";
            const prompt = `أعطني 5 أسئلة عن "${topic}" بتنسيق JSON: [{"t":"سؤال","a":["1","2","3","4"],"c":0,"x":"تلميح","category":"${cat}"}] - تأكد من الرد بـ JSON فقط وبدون علامات تنصيص زائدة.`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
                });
                
                const data = await res.json();
                if(data.error) throw new Error(data.error.message);

                let rawText = data.candidates[0].content.parts[0].text;
                let cleanJson = rawText.substring(rawText.indexOf('['), rawText.lastIndexOf(']') + 1);
                const qs = JSON.parse(cleanJson);

                for(let q of qs) {
                    await addDoc(collection(db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'questions'), q);
                }
                status.innerHTML = "✅ تم بنجاح! الأسئلة الآن في اللعبة.";
            } catch(e) { 
                console.error(e);
                status.innerHTML = `❌ خطأ: ${e.message}. تأكد من إعدادات Firebase.`;
            }
        };

        window.clearRankings = async () => {
            if(confirm("هل تريد تصفير لوحة المتصدرين وبدء أسبوع جديد؟")) {
                const snap = await getDocs(collection(db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'rankings'));
                snap.forEach(async (d) => await deleteDoc(doc(db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'rankings', d.id)));
                alert("تم التصفير!");
            }
        }
    </script>
    <style>body { font-family: 'Tajawal', sans-serif; background: #0a0a0a; color: white; }</style>
</head>
<body class="p-8">
    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-black text-amber-500 mb-8 text-center">الإدارة المركزية 🛸</h1>
        
        <div class="bg-zinc-900 p-8 rounded-[40px] border border-white/5 shadow-2xl">
            <h2 class="text-xl font-bold mb-6">توليد الأسئلة بـ Gemini</h2>
            <input type="text" id="topic" placeholder="الموضوع (مثلاً: تاريخ الأندلس)" class="w-full bg-black border border-white/10 p-5 rounded-2xl mb-4 outline-none focus:border-blue-500">
            <select id="category" class="w-full bg-black border border-white/10 p-5 rounded-2xl mb-6 outline-none">
                <option value="إسلاميات">إسلاميات</option>
                <option value="تاريخ مصر">تاريخ مصر</option>
                <option value="تقنية">تقنية</option>
                <option value="علوم وفضاء">علوم وفضاء</option>
            </select>
            <button onclick="generateAIQuestions()" class="w-full py-5 bg-blue-600 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition">بدء التوليد التلقائي ✨</button>
            <div id="status" class="mt-6 text-center text-sm font-bold text-amber-400"></div>
        </div>

        <div class="mt-8 bg-zinc-900 p-6 rounded-[30px] border border-white/5 flex justify-between items-center">
            <span class="font-bold">لوحة المتصدرين</span>
            <button onclick="clearRankings()" class="bg-red-500/10 text-red-500 px-6 py-3 rounded-2xl font-black text-xs">تصفير اللوحة 🏆</button>
        </div>
    </div>
</body>
</html>
