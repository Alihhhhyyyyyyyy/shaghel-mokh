<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرف - شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          messagingSenderId: "167435076773",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';
        const aiApiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA";

        // Global references for UI
        window.db = db;
        window.appId = appId;

        onAuthStateChanged(auth, (user) => {
            if (!user) signInAnonymously(auth);
            else {
                console.log("Admin connected:", user.uid);
                loadAllQuestions();
            }
        });

        // --- Functions ---

        async function loadAllQuestions() {
            const list = document.getElementById('questions-list');
            list.innerHTML = '<div class="p-10 text-center"><i class="fas fa-circle-notch fa-spin text-3xl text-amber-500"></i></div>';
            
            try {
                const qCol = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                const snap = await getDocs(qCol);
                list.innerHTML = '';
                
                if (snap.empty) {
                    list.innerHTML = '<p class="text-center p-10 opacity-50">لا توجد أسئلة حالياً.</p>';
                    return;
                }

                snap.forEach(d => {
                    const q = d.data();
                    const card = document.createElement('div');
                    card.className = "bg-white/5 border border-white/10 p-4 rounded-2xl mb-3 flex justify-between items-center";
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex gap-2 mb-1">
                                <span class="bg-amber-500 text-black text-[10px] px-2 py-0.5 rounded font-bold">${q.category}</span>
                                <span class="bg-blue-500 text-white text-[10px] px-2 py-0.5 rounded font-bold">${q.subCategory}</span>
                            </div>
                            <p class="font-bold text-sm text-slate-200">${q.t}</p>
                            <p class="text-[11px] text-green-400 mt-1">الإجابة الصحيحة: ${q.a[q.c]}</p>
                        </div>
                        <button onclick="window.deleteQuestion('${d.id}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg">
                            <i class="fas fa-trash"></i>
                        </button>
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                list.innerHTML = '<p class="text-red-500 text-center">خطأ في التحميل.</p>';
            }
        }

        window.deleteQuestion = async (id) => {
            if (!confirm("هل أنت متأكد من حذف هذا السؤال؟")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
            loadAllQuestions();
        };

        window.addManualQuestion = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "جاري الحفظ...";

            const qData = {
                category: document.getElementById('m-cat').value,
                subCategory: document.getElementById('m-sub').value,
                t: document.getElementById('m-q').value,
                a: [
                    document.getElementById('m-a1').value,
                    document.getElementById('m-a2').value,
                    document.getElementById('m-a3').value,
                    document.getElementById('m-a4').value
                ],
                c: parseInt(document.getElementById('m-correct').value),
                x: document.getElementById('m-fact').value,
                createdAt: Date.now()
            };

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), qData);
            alert("تمت الإضافة!");
            e.target.reset();
            btn.disabled = false;
            btn.innerText = "إضافة السؤال";
            loadAllQuestions();
        };

        window.generateAIQuestions = async () => {
            const cat = document.getElementById('ai-cat').value;
            const sub = document.getElementById('ai-sub').value;
            const status = document.getElementById('ai-status');
            
            if(!cat || !sub) return alert("يرجى إدخال القسم والفرع");

            status.innerHTML = '<i class="fas fa-robot animate-bounce mr-2"></i> جاري توليد 10 أسئلة وحفظها...';
            
            const prompt = `Generate 10 MCQ in Arabic about "${cat} - ${sub}". Output ONLY raw JSON array: [{"t":"q","a":["o1","o2","o3","o4"],"c":0,"x":"fact"}]. No markdown.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const cleanJson = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const newQs = JSON.parse(cleanJson);

                for (let q of newQs) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...q, category: cat, subCategory: sub, createdAt: Date.now()
                    });
                }

                status.innerHTML = '<span class="text-green-500">✅ تم توليد وحفظ 10 أسئلة بنجاح!</span>';
                loadAllQuestions();
            } catch (e) {
                status.innerHTML = '<span class="text-red-500">❌ فشل التوليد.</span>';
            }
        };

        window.loadAllQuestions = loadAllQuestions;
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; outline: none; transition: 0.3s; width: 100%; }
        input:focus, select:focus { border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black text-amber-500">لوحة التحكم <span class="text-white">Admin</span></h1>
                <p class="opacity-60 font-bold mt-2 text-sm text-blue-300">إدارة محتوى تطبيق شغل مخك</p>
            </div>
            <button onclick="location.reload()" class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-amber-500 hover:text-black transition">
                <i class="fas fa-sync-alt"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Column 1: Forms -->
            <div class="lg:col-span-1 space-y-6">
                <!-- AI Generator -->
                <div class="glass p-6 rounded-[32px]">
                    <h2 class="text-xl font-black mb-4 flex items-center gap-2">
                        <i class="fas fa-magic text-amber-500"></i> التوليد التلقائي
                    </h2>
                    <p class="text-xs opacity-50 mb-4">اكتب القسم والفرع وسيقوم الذكاء الاصطناعي بالباقي.</p>
                    <div class="space-y-3">
                        <input type="text" id="ai-cat" placeholder="مثال: إسلاميات">
                        <input type="text" id="ai-sub" placeholder="مثال: الغزوات">
                        <button onclick="window.generateAIQuestions()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-black font-black py-4 rounded-2xl shadow-lg active:scale-95 transition">
                            توليد 10 أسئلة 🤖
                        </button>
                        <div id="ai-status" class="text-center text-xs font-bold pt-2"></div>
                    </div>
                </div>

                <!-- Manual Entry -->
                <div class="glass p-6 rounded-[32px]">
                    <h2 class="text-xl font-black mb-4 flex items-center gap-2">
                        <i class="fas fa-pen text-blue-500"></i> إضافة سؤال يدوي
                    </h2>
                    <form onsubmit="window.addManualQuestion(event)" class="space-y-3">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="m-cat" placeholder="القسم" required>
                            <input type="text" id="m-sub" placeholder="الفرع" required>
                        </div>
                        <textarea id="m-q" placeholder="نص السؤال..." rows="2" required></textarea>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="m-a1" placeholder="خيار 1" required>
                            <input type="text" id="m-a2" placeholder="خيار 2" required>
                            <input type="text" id="m-a3" placeholder="خيار 3" required>
                            <input type="text" id="m-a4" placeholder="خيار 4" required>
                        </div>
                        <select id="m-correct">
                            <option value="0">الإجابة 1 صحيحة</option>
                            <option value="1">الإجابة 2 صحيحة</option>
                            <option value="2">الإجابة 3 صحيحة</option>
                            <option value="3">الإجابة 4 صحيحة</option>
                        </select>
                        <input type="text" id="m-fact" placeholder="معلومة إضافية (اختياري)">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition">
                            حفظ السؤال
                        </button>
                    </form>
                </div>
            </div>

            <!-- Column 2 & 3: List -->
            <div class="lg:col-span-2">
                <div class="glass p-6 rounded-[32px] h-full flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black">الأسئلة الحالية <i class="fas fa-database text-amber-500 ml-2"></i></h2>
                        <button onclick="window.loadAllQuestions()" class="text-xs font-bold text-amber-500 underline">تحديث القائمة</button>
                    </div>
                    <div id="questions-list" class="flex-1 overflow-y-auto pr-2 custom-scroll max-h-[700px]">
                        <!-- List populated by JS -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <style>
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</body>
</html>
