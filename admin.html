<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | المزامنة الفورية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaghel-mokh-ultra';

        window.syncNow = async () => {
            const btn = document.getElementById('btn-sync');
            const log = document.getElementById('log-status');
            const mainCat = document.getElementById('main-cat').value;
            const subCat = document.getElementById('sub-cat').value;

            if(!subCat) return alert("اكتب اسم الفرع أولاً (مثلاً: عصر الصحابة)");

            btn.disabled = true;
            btn.innerHTML = `<span>جاري الرفع...</span>`;
            log.innerText = "⏳ جاري قراءة الملف questions.json...";

            try {
                // قراءة الملف المحلي المرتبط
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error("الملف questions.json غير موجود في المجلد!");
                
                const questionsArray = await response.json();

                // الرفع لـ Firebase
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                    category: mainCat,
                    subCategory: subCat,
                    questions: questionsArray,
                    date: new Date().toISOString()
                });

                log.innerHTML = `<span class="text-green-400">✅ تم رفع ${questionsArray.length} سؤال بنجاح!</span>`;
            } catch (err) {
                log.innerHTML = `<span class="text-red-400">❌ خطأ: ${err.message}</span>`;
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = "تحديث ورفع الأسئلة الآن 🚀";
            }
        };
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; }
        select, input { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass p-8 shadow-2xl">
        <h1 class="text-2xl font-black text-center mb-6 text-indigo-400">مزامنة قاعدة البيانات ⚡</h1>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold mb-2 text-slate-400">القسم الرئيسي</label>
                <select id="main-cat">
                    <option value="إسلاميات">إسلاميات</option>
                    <option value="علوم وطبيعة">علوم وطبيعة</option>
                    <option value="جغرافيا">جغرافيا</option>
                    <option value="تاريخ">تاريخ</option>
                    <option value="رياضة">رياضة</option>
                    <option value="ثقافة عامة">ثقافة عامة</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold mb-2 text-slate-400">الفرع (Sub-Category)</label>
                <input type="text" id="sub-cat" placeholder="مثلاً: كيمياء العناصر">
            </div>

            <button id="btn-sync" onclick="syncNow()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                تحديث ورفع الأسئلة الآن 🚀
            </button>

            <p id="log-status" class="text-center text-xs text-slate-500 font-medium pt-2">
                تأكد من وضع ملف questions.json بجانب هذه الصفحة
            </p>
        </div>
    </div>

</body>
</html>
