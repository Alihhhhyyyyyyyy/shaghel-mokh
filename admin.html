<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - الرفع الفوري</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .admin-box { max-width: 500px; margin: auto; background: #16213e; padding: 30px; border-radius: 20px; border: 2px solid #533483; }
        .upload-area { border: 2px dashed #e94560; padding: 40px; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; background: #e94560; border: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h2>تحديث الأسئلة "علطول" 🚀</h2>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-upload fa-3x" style="color: #e94560;"></i>
            <p>اختر ملف questions.js</p>
            <input type="file" id="fileInput" accept=".js" style="display: none">
        </div>
        <button class="btn" id="uploadBtn" onclick="uploadToFirebase()">رفع وتحديث الموقع الآن</button>
        <div id="status"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            databaseURL: "https://shaghel-mokh-ultra-default-rtdb.firebaseio.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function uploadToFirebase() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            if (!fileInput.files.length) return alert("اختر الملف!");

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const startIndex = content.indexOf('{');
                    const endIndex = content.lastIndexOf('}') + 1;
                    const jsonString = content.substring(startIndex, endIndex);
                    // تنظيف النص وتحويله لكائن
                    const data = eval("(" + jsonString + ")"); 

                    status.innerText = "⏳ جاري الرفع...";
                    db.ref('questionsBank').set(data).then(() => {
                        status.innerText = "✅ تم التحديث بنجاح!";
                        status.style.color = "#27ae60";
                    }).catch(err => {
                        status.innerText = "❌ خطأ في الرفع: " + err.message;
                    });
                } catch (err) {
                    alert("خطأ في قراءة ملف الكود");
                }
            };
            reader.readAsText(fileInput.files[0]);
        }
    </script>
</body>
</html>
