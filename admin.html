<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Control Panel | تحديث قاعدة البيانات</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div class="max-w-2xl mx-auto glass p-8 rounded-3xl bg-slate-800">
        <h1 class="text-3xl font-black mb-6">تحديث هيكلة الفروع 🚀</h1>
        <p class="mb-8 text-slate-400">سيتم رفع الأسئلة بنظام (الأقسام الرئيسية > الفروع > الأسئلة).</p>
        <button id="upload-btn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold text-xl">بدء التحديث الشامل</button>
        <div id="status" class="mt-6 p-4 rounded-xl hidden"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { giantData } from "./questions.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWIYaVgqpc2g8stA", 
            authDomain: "shaghel-mokh-ultra.firebaseapp.com", 
            projectId: "shaghel-mokh-ultra" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('upload-btn').onclick = async () => {
            const status = document.getElementById('status');
            status.className = "mt-6 p-4 rounded-xl bg-blue-600 block";
            status.innerText = "جاري الرفع... يرجى الانتظار";

            try {
                for (let categoryKey in giantData) {
                    await setDoc(doc(db, "content", categoryKey), giantData[categoryKey]);
                }
                status.className = "mt-6 p-4 rounded-xl bg-green-600 block";
                status.innerText = "✅ تمت العملية بنجاح! الفروع والأسئلة جاهزة الآن.";
            } catch (e) {
                status.className = "mt-6 p-4 rounded-xl bg-red-600 block";
                status.innerText = "❌ خطأ: " + e.message;
            }
        };
    </script>
</body>
</html>
