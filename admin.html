<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - تحديث الأسئلة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #1a1a2e;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .admin-container {
            max-width: 800px;
            margin: auto;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #533483;
        }
        h2 { text-align: center; color: #e94560; }
        .file-upload {
            border: 2px dashed #533483;
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .file-upload:hover { background: #0f3460; }
        .btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .status-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }
        .info-note {
            background: #0f3460;
            padding: 10px;
            font-size: 0.9rem;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2><i class="fas fa-user-shield"></i> لوحة إدارة الأسئلة</h2>
        
        <div class="info-note">
            <i class="fas fa-info-circle"></i> استخدم هذه الصفحة لرفع ملف <b>questions.js</b> المحدث. سيتم تلقائياً التأكد من توافق الملف مع نظام الفروع الجديد واسم المصفوفة <b>questionsBank</b>.
        </div>

        <div class="file-upload" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt fa-3x"></i>
            <p>اضغط هنا لاختيار ملف questions.js الجديد</p>
            <input type="file" id="fileInput" accept=".js" style="display: none">
        </div>

        <div id="status" class="status-msg"></div>

        <button class="btn-action" onclick="processFile()">تحديث الأسئلة في النظام</button>
        <button class="btn-action" style="background: #34495e;" onclick="window.location.href='index.html'">العودة للموقع الرئيسي</button>
    </div>

    <script>
        function processFile() {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');

            if (!fileInput.files.length) {
                showStatus("الرجاء اختيار ملف أولاً!", "#e74c3c");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const content = e.target.result;

                // التأكد من أن الملف يحتوي على المصفوفة المطلوبة بالاسم الجديد
                if (content.includes('questionsBank') || content.includes('allQuestions')) {
                    
                    // تحويل المحتوى لنص برمجي للتأكد من سلامته
                    try {
                        // هنا نقوم بـ "تنظيف" الاسم ليكون دائماً questionsBank
                        let updatedContent = content.replace(/const allQuestions/g, 'const questionsBank');
                        
                        // محاكاة حفظ الملف (في GitHub Pages ستحتاج لرفعه يدوياً أو استخدام API)
                        // ولكن سنقوم هنا بتحميل الملف المحدث للمستخدم ليرفعه يدوياً لضمان الدقة
                        downloadUpdatedFile(updatedContent);
                        
                        showStatus("تم التحقق من الملف وتجهيز نسخة متوافقة! جاري التحميل... ارفع الملف المحمل الآن إلى GitHub.", "#27ae60");
                    } catch (err) {
                        showStatus("خطأ في بنية الملف البرمجية!", "#e74c3c");
                    }
                } else {
                    showStatus("الملف غير صحيح! تأكد أنه يحتوي على مصفوفة الأسئلة.", "#e74c3c");
                }
            };

            reader.readAsText(file);
        }

        function downloadUpdatedFile(content) {
            const element = document.createElement('a');
            const file = new Blob([content], {type: 'text/javascript'});
            element.href = URL.createObjectURL(file);
            element.download = "questions.js";
            document.body.appendChild(element);
            element.click();
        }

        function showStatus(msg, color) {
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.style.background = color;
            status.innerText = msg;
        }
    </script>
</body>
</html>
