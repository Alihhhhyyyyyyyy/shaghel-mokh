<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الإدارية | شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0a0a0c; color: white; }
        .user-card { background: #15151a; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .user-card:hover { border-color: #f59e0b; }
        input { background: #1f1f26 !important; border: 1px solid #333 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-amber-500">لوحة الإدارة ⚡</h1>
                <p class="text-slate-400 text-sm mt-1">إدارة اللاعبين والتحكم في البيانات</p>
            </div>
            <a href="index.html" class="bg-white/5 hover:bg-white/10 px-5 py-2 rounded-xl text-sm font-bold border border-white/10">
                <i class="fas fa-gamepad ml-2"></i> العودة للعبة
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="users-grid">
            <!-- سيتم تحميل المستخدمين هنا -->
            <div class="col-span-full text-center py-20 opacity-50">
                <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                <p>جاري الاتصال بقاعدة البيانات...</p>
            </div>
        </div>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-v2'; // تأكد أنه نفس الـ ID المستخدم في اللعبة

        async function loadUsers() {
            const grid = document.getElementById('users-grid');
            try {
                // ملاحظة: المسار هنا يجب أن يطابق تماماً المسار الذي يخزن فيه الكود الأساسي بيانات اللاعبين
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'rankings'));
                grid.innerHTML = '';

                if (querySnapshot.empty) {
                    grid.innerHTML = '<p class="col-span-full text-center py-10">لا يوجد لاعبين مسجلين حالياً.</p>';
                    return;
                }

                querySnapshot.forEach((userDoc) => {
                    const data = userDoc.data();
                    const userId = userDoc.id;

                    const card = document.createElement('div');
                    card.className = 'user-card p-6 rounded-[30px] relative';
                    card.innerHTML = `
                        <div class="flex items-center gap-4 mb-4">
                            <img src="${data.avatar || 'https://via.placeholder.com/100'}" class="w-16 h-16 rounded-2xl object-cover border-2 border-amber-500/20">
                            <div>
                                <h3 class="font-black text-lg">${data.username || 'لاعب مجهول'}</h3>
                                <p class="text-xs text-amber-500 font-bold">${data.xp || 0} XP</p>
                            </div>
                        </div>
                        
                        <div class="space-y-3">
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 block mb-1">الذهب (Coins)</label>
                                <input type="number" id="coins-${userId}" value="${data.coins || 0}" class="w-full p-2 rounded-lg text-sm outline-none focus:border-amber-500">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-500 block mb-1">القلوب (Hearts)</label>
                                <input type="number" id="hearts-${userId}" value="${data.hearts || 5}" class="w-full p-2 rounded-lg text-sm outline-none focus:border-amber-500">
                            </div>
                        </div>

                        <div class="flex gap-2 mt-6">
                            <button onclick="updateUser('${userId}')" class="flex-1 bg-green-600 hover:bg-green-700 py-2 rounded-xl text-xs font-black transition">
                                <i class="fas fa-save ml-1"></i> حفظ
                            </button>
                            <button onclick="deleteUser('${userId}')" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white px-4 py-2 rounded-xl text-xs font-black transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading users:", error);
                grid.innerHTML = `<p class="col-span-full text-center text-red-500">حدث خطأ أثناء تحميل البيانات: ${error.message}</p>`;
            }
        }

        window.updateUser = async (userId) => {
            const newCoins = parseInt(document.getElementById(`coins-${userId}`).value);
            const newHearts = parseInt(document.getElementById(`hearts-${userId}`).value);

            try {
                // تحديث ملف الرانك العام
                const rankDoc = doc(db, 'artifacts', appId, 'public', 'data', 'rankings', userId);
                await updateDoc(rankDoc, {
                    coins: newCoins,
                    hearts: newHearts
                });

                // ملاحظة: في نظام الفايربيز الحالي، البيانات الأساسية مخزنة في مسار المستخدم الخاص أيضاً
                // لذا يفضل تحديثها هناك أيضاً لضمان مزامنة اللاعب عند دخوله
                const profileDoc = doc(db, 'artifacts', appId, 'users', userId, 'profile', 'data');
                await updateDoc(profileDoc, {
                    coins: newCoins,
                    hearts: newHearts
                });

                alert("تم تحديث بيانات اللاعب بنجاح! ✅");
                loadUsers();
            } catch (e) {
                alert("فشل التحديث: " + e.message);
            }
        };

        window.deleteUser = async (userId) => {
            if (confirm("هل أنت متأكد من حذف هذا اللاعب تماماً؟ لا يمكن التراجع!")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', userId));
                    alert("تم الحذف بنجاح.");
                    loadUsers();
                } catch (e) {
                    alert("فشل الحذف.");
                }
            }
        };

        // تشغيل التحميل عند فتح الصفحة
        loadUsers();
    </script>
</body>
</html>
