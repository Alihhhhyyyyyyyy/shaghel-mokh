<div class="box">
    <h2>التحكم السريع ⚡</h2>
    <p>تحديث الأسئلة من GitHub مباشرة إلى التطبيق</p>
    <button class="btn" onclick="syncFromGitHub()">تحديث "علطول" من الملف 🚀</button>
    <div id="status"></div>
</div>

<script>
// ضع بياناتك هنا
const firebaseConfig = {
    apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
    authDomain: "shaghel-mokh-ultra.firebaseapp.com",
    databaseURL: "https://shaghel-mokh-ultra-default-rtdb.firebaseio.com",
    projectId: "shaghel-mokh-ultra"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

async function syncFromGitHub() {
    const status = document.getElementById('status');
    status.innerText = "⏳ جاري السحب من GitHub...";
    
    // رابط ملفك الـ Raw من GitHub (تأكد من كتابة اسم المستودع والملف صح)
    const githubRawUrl = "https://raw.githubusercontent.com/shaghel-mokh/shaghel-mokh/main/questions.js";

    try {
        const response = await fetch(githubRawUrl);
        const content = await response.text();
        
        // استخراج المصفوفة
        const startIndex = content.indexOf('{');
        const endIndex = content.lastIndexOf('}') + 1;
        const jsonStr = content.substring(startIndex, endIndex);
        const data = eval("(" + jsonStr + ")");

        // الرفع لفايرباس
        await db.ref('questionsBank').set(data);
        status.innerText = "✅ تم السحب والتحديث بنجاح!";
        status.style.color = "#27ae60";
    } catch (err) {
        status.innerText = "❌ فشل التحديث: تأكد من رابط الملف";
        status.style.color = "#ff4d4d";
    }
}
</script>
