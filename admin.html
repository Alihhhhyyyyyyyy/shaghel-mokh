<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة محتوى شغل مخك</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';

        onAuthStateChanged(auth, (user) => {
            if (user) loadAll();
            else signInAnonymously(auth);
        });

        async function loadAll() {
            const list = document.getElementById('q-list');
            const total = document.getElementById('total-val');
            const stats = document.getElementById('stats-row');
            
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'questions'));
                const categories = {};
                list.innerHTML = "";
                total.innerText = snap.size;

                snap.forEach(d => {
                    const q = d.data();
                    categories[q.category] = (categories[q.category] || 0) + 1;

                    const div = document.createElement('div');
                    div.className = "bg-slate-800/50 p-4 rounded-2xl border border-white/5 mb-3 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="ml-4">
                            <span class="text-[10px] bg-amber-500 text-black px-2 py-0.5 rounded font-bold">${q.category}</span>
                            <p class="text-sm mt-1 font-bold text-white/90">${q.t}</p>
                        </div>
                        <button onclick="del('${d.id}')" class="text-red-500 bg-red-500/10 p-3 rounded-xl hover:bg-red-500 hover:text-white transition-all">
                            <i class="fas fa-trash"></i>
                        </button>
                    `;
                    list.appendChild(div);
                });

                stats.innerHTML = "";
                Object.keys(categories).forEach(c => {
                    const s = document.createElement('div');
                    s.className = "bg-white/5 border border-white/10 p-3 rounded-2xl min-w-[100px] text-center";
                    s.innerHTML = `<div class="text-[10px] text-slate-400">${c}</div><div class="text-xl font-black text-amber-500">${categories[c]}</div>`;
                    stats.appendChild(s);
                });

            } catch(e) {}
        }

        window.saveData = async () => {
            const json = document.getElementById('json-box').value;
            const topic = document.getElementById('topic-box').value;
            const btn = document.getElementById('save-btn');
            
            if(!json || !topic) return alert("املا البيانات!");

            btn.disabled = true;
            btn.innerHTML = "جاري الرفع...";
            
            const [cat, sub] = topic.split('-').map(t => t.trim());

            try {
                const items = JSON.parse(json);
                for(const i of items) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'questions'), {
                        ...i, category: cat, subCategory: sub || cat, createdAt: Date.now()
                    });
                }
                alert("تم الحفظ بنجاح! اللعبة جاهزة الآن.");
                document.getElementById('json-box').value = "";
                loadAll();
            } catch(e) { alert("خطأ في الكود المنسوخ!"); }
            finally { 
                btn.disabled = false; 
                btn.innerHTML = "حفظ في قاعدة البيانات";
            }
        };

        window.del = async (id) => {
            if(confirm("حذف؟")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'questions', id));
                loadAll();
            }
        };

    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; }
        .panel { background: #0f172a; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input, textarea { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 12px; width: 100%; color: white; outline: none; margin-bottom: 15px; }
        input:focus, textarea:focus { border-color: #f59e0b; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto min-h-screen">

    <div class="text-center py-6">
        <h1 class="text-3xl font-black text-amber-500">Admin Panel</h1>
        <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">لوحة التحكم في المحتوى</p>
    </div>

    <!-- الإحصائيات -->
    <div class="panel p-6 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xs font-black text-slate-400 uppercase">الإحصائيات الحالية</h2>
            <div class="bg-amber-500 text-black text-[10px] font-black px-3 py-1 rounded-full">الكل: <span id="total-val">0</span></div>
        </div>
        <div id="stats-row" class="flex gap-3 overflow-x-auto pb-2">
            <!-- stats columns -->
        </div>
    </div>

    <!-- إضافة -->
    <div class="panel p-6 mb-6 border-amber-500/20">
        <h3 class="text-sm font-black mb-4">إضافة أسئلة جديدة</h3>
        <input type="text" id="topic-box" placeholder="القسم - الفرع (مثال: إسلاميات - أنبياء)">
        <textarea id="json-box" rows="4" placeholder="الصق الكود هنا..."></textarea>
        <button id="save-btn" onclick="saveData()" class="w-full bg-amber-500 text-black font-black py-4 rounded-2xl shadow-xl shadow-amber-500/20 active:scale-95 transition-all">
            حفظ في قاعدة البيانات
        </button>
    </div>

    <!-- القائمة -->
    <div class="panel p-6 flex-1 flex flex-col overflow-hidden min-h-[400px]">
        <h3 class="text-xs font-black mb-4 opacity-40 uppercase">بنك الأسئلة</h3>
        <div id="q-list" class="flex-1 overflow-y-auto">
            <!-- items -->
        </div>
    </div>

</body>
</html>
