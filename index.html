<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة شغل مخك - الإصدار الاحترافي</title>
    <style>
        :root {
            --primary-color: #4a148c;
            --secondary-color: #7b1fa2;
            --accent-color: #ffca28;
            --success-color: #4caf50;
            --error-color: #f44336;
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a148c 0%, #1a237e 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .question-box {
            font-size: 1.5rem;
            margin: 20px 0;
            min-height: 80px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: var(--accent-color);
            color: var(--primary-color);
            transform: translateY(-3px);
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            border-color: var(--error-color);
        }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }

        #progress {
            width: 100%;
            height: 100%;
            background: var(--accent-color);
            transition: width 1s linear;
        }

        .hidden { display: none; }

        #score-screen {
            font-size: 1.5rem;
        }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--accent-color);
            color: var(--primary-color);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="loader"></div>
    <p>جاري تحميل الأسئلة من السحابة...</p>
</div>

<div class="game-container hidden" id="game-ui">
    <div class="header">
        <div>النتيجة: <span id="score">0</span></div>
        <div>السؤال: <span id="q-count">1/10</span></div>
    </div>

    <div class="timer-bar">
        <div id="progress"></div>
    </div>

    <div class="question-box" id="question-text">
        جاري تحميل السؤال...
    </div>

    <div class="options-grid" id="options-container">
        </div>
</div>

<div class="game-container hidden" id="score-screen">
    <h1>انتهت اللعبة! 🏁</h1>
    <p>لقد أجبت على <span id="final-score">0</span> من أصل <span id="total-q">10</span> أسئلة.</p>
    <button class="btn-restart" onclick="location.reload()">العب مرة أخرى</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // بياناتك المربوطة بمشروعك
    const firebaseConfig = {
      apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
      authDomain: "shaghel-mokh-ultra.firebaseapp.com",
      projectId: "shaghel-mokh-ultra",
      storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
      messagingSenderId: "167435076773",
      appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
      measurementId: "G-EPJ1MGWBQW"
    };

    // تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // متغيرات اللعبة
    let questions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    const totalQuestionsToPlay = 10; // عدد الأسئلة في الجولة الواحدة

    // وظيفة جلب الأسئلة من Firebase
    async function fetchQuestions() {
        try {
            const snapshot = await get(ref(db, 'questions/'));
            if (snapshot.exists()) {
                questions = snapshot.val();
                startGame();
            } else {
                alert("لم يتم العثور على أسئلة في قاعدة البيانات! تأكد من استخدام لوحة التحكم أولاً.");
            }
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
            alert("حدث خطأ في الاتصال بالإنترنت.");
        }
    }

    function startGame() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        
        // خلط الأسئلة واختيار عدد معين منها
        questions = questions.sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        resetState();
        let currentQuestion = questions[currentQuestionIndex];
        
        document.getElementById('q-count').innerText = `${currentQuestionIndex + 1}/${totalQuestionsToPlay}`;
        document.getElementById('question-text').innerText = currentQuestion.question;

        currentQuestion.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.addEventListener('click', () => selectAnswer(index, currentQuestion.answer));
            document.getElementById('options-container').appendChild(button);
        });

        startTimer();
    }

    function resetState() {
        clearInterval(timer);
        timeLeft = 15;
        document.getElementById('progress').style.width = "100%";
        const container = document.getElementById('options-container');
        while (container.firstChild) {
            container.removeChild(container.firstChild);
        }
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            let percentage = (timeLeft / 15) * 100;
            document.getElementById('progress').style.width = percentage + "%";

            if (timeLeft <= 0) {
                clearInterval(timer);
                autoNext();
            }
        }, 1000);
    }

    function selectAnswer(selectedIndex, correctIndex) {
        clearInterval(timer);
        const buttons = document.querySelectorAll('.option-btn');
        
        if (selectedIndex === correctIndex) {
            buttons[selectedIndex].classList.add('correct');
            score++;
            document.getElementById('score').innerText = score;
        } else {
            buttons[selectedIndex].classList.add('wrong');
            buttons[correctIndex].classList.add('correct');
        }

        // تعطيل الأزرار بعد الاختيار
        buttons.forEach(btn => btn.style.pointerEvents = 'none');

        setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestionsToPlay) {
                showQuestion();
            } else {
                endGame();
            }
        }, 1500);
    }

    function autoNext() {
        currentQuestionIndex++;
        if (currentQuestionIndex < totalQuestionsToPlay) {
            showQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('score-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        document.getElementById('total-q').innerText = totalQuestionsToPlay;
    }

    // بدء العملية
    fetchQuestions();

</script>
</body>
</html>
