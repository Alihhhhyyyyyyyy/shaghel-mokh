<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شغل مخك - مبرمج آلي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // تأكد إن البيانات دي هي اللي في الـ Settings عندك
        const firebaseConfig = {
            apiKey: "AIzaSyBKQfpuzt92Uk_mJrSWuIYaVgqpc2g",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb184e5e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        async function start() {
            try {
                await signInAnonymously(auth);
                const snap = await getDocs(collection(db, 'questions'));
                
                if (snap.empty) {
                    // لو السيرفر فاضي.. الكود هيرفع الأسئلة أوتوماتيك
                    await setDoc(doc(db, 'questions', 'football'), { name: "كرة القدم", icon: "⚽" });
                    await setDoc(doc(db, 'questions/football/branches', 'world_cup'), {
                        name: "كأس العالم",
                        questions: [{ t: "بطل 2022؟", a: ["الأرجنتين", "فرنسا"], c: 0 }]
                    });
                    alert("✅ تم رفع الأسئلة للسيرفر! اعمل Refresh");
                    location.reload();
                } else {
                    render(snap);
                }
            } catch (e) {
                document.body.innerHTML = `<h1 style="color:red">عطل: ${e.message}</h1>`;
            }
        }

        function render(snap) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snap.forEach(d => {
                list.innerHTML += `<div class="p-4 bg-slate-800 rounded-xl mb-2">${d.data().icon} ${d.data().name}</div>`;
            });
        }

        onAuthStateChanged(auth, (user) => { if(user) start(); });
    </script>
</head>
<body class="bg-slate-900 text-white p-10">
    <div id="list" class="text-center italic text-slate-500 text-xl">جاري فحص السحاب... ☁️</div>
</body>
</html>
