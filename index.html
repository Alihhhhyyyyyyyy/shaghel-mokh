<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شغل مخك ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- إعدادات Firebase الخاصة بك ---
        const firebaseConfig = {
            apiKey: "AIzaSyBKQfpuzt92Uk_mJrSWuIYaVgqpc2g",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb184e5e",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { db, collection, getDocs, query };
        window.gameContent = {}; 

        // بيانات اللاعب
        window.gameData = { coins: 1000, level: 1, username: "لاعب عبقري" };

        // 1. ونش الرفع التلقائي
        async function seedData() {
            const data = {
                football: { name: "كرة القدم", icon: "⚽", branches: { world: { name: "كأس العالم", q: [{t: "بطل 2022؟", a: ["فرنسا", "الأرجنتين"], c: 1}] } } },
                science: { name: "العلوم", icon: "🧪", branches: { space: { name: "الفضاء", q: [{t: "كوكب أحمر؟", a: ["المريخ", "زحل"], c: 0}] } } }
            };
            for (let key in data) { await setDoc(doc(db, 'questions', key), data[key]); }
            window.gameContent = data;
            renderPaths();
        }

        // 2. تحميل البيانات
        async function loadData() {
            try {
                const snap = await getDocs(query(collection(db, 'questions')));
                if (snap.empty) { await seedData(); } 
                else {
                    snap.forEach(doc => { window.gameContent[doc.id] = doc.data(); });
                    renderPaths();
                }
            } catch (e) { alert("تأكد من تفعيل Rules في Firebase: " + e.message); }
        }

        // تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            if (user) { loadData(); } 
            else { signInAnonymously(auth).catch(e => alert("فعل الـ Anonymous Auth في Firebase أولاً!")); }
        });
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; touch-action: manipulation; }
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: flex; flex-direction: column; }
        .card { background: #1e293b; padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.95); background: #334155; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active justify-center items-center gap-8">
        <h1 class="text-5xl font-black text-indigo-500 italic">شغل مخك</h1>
        <div class="flex gap-4 text-xl bg-slate-900 p-4 rounded-2xl border border-indigo-500/30">
            <span>🪙 <span id="coins">1000</span></span>
            <span>⭐ LVL <span id="lvl">1</span></span>
        </div>
        <button onclick="navTo('paths')" class="bg-indigo-600 w-64 py-4 rounded-2xl text-2xl font-bold shadow-lg shadow-indigo-500/20">دخول اللعبة 🚀</button>
    </div>

    <div id="screen-paths" class="screen">
        <div class="flex justify-between items-center mb-8">
            <button onclick="navTo('home')" class="text-3xl">🔙</button>
            <h2 class="text-2xl font-bold">المسارات</h2>
            <div></div>
        </div>
        <div id="paths-list" class="space-y-4">
            <div class="text-center p-10 text-slate-500 animate-pulse">جاري جلب البيانات من السحاب...</div>
        </div>
    </div>

    <script>
        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
        }

        function renderPaths() {
            const list = document.getElementById('paths-list');
            list.innerHTML = '';
            for (let id in window.gameContent) {
                const p = window.gameContent[id];
                list.innerHTML += `
                    <div class="card flex justify-between items-center" onclick="alert('تم اختيار: ${p.name}')">
                        <div class="flex items-center gap-5">
                            <span class="text-4xl">${p.icon}</span>
                            <span class="text-2xl font-bold">${p.name}</span>
                        </div>
                        <span class="bg-indigo-500/20 text-indigo-400 p-2 rounded-full">➔</span>
                    </div>`;
            }
        }
    </script>
</body>
</html>
