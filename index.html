<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شغل مخك - النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // جعل Firebase متاحاً عالمياً للأزرار
        window.db = db;
        window.collection = collection;
        window.getDocs = getDocs;
        window.query = query;
        window.where = where;
        window.orderBy = orderBy;
        window.limit = limit;

        window.gameData = {
            coins: 1000, xp: 0, level: 1, username: "لاعب عبقري",
            inventory: { delete: 10, skip: 10, hint: 10 },
            stats: { gamesPlayed: 0, completedSections: 0 },
            rank: "مبتدئ ذكي"
        };

        signInAnonymously(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                const userDoc = doc(db, 'users', user.uid);
                onSnapshot(userDoc, (snap) => {
                    if (snap.exists()) {
                        window.gameData = { ...window.gameData, ...snap.data() };
                    } else {
                        setDoc(userDoc, window.gameData);
                    }
                    if (typeof window.updateUI === 'function') window.updateUI();
                });
            }
        });

        window.saveData = async () => {
            if (!window.currentUser) return;
            await setDoc(doc(db, 'users', window.currentUser.uid), window.gameData, { merge: true });
        };
    </script>

    <style>
        :root { --bg: #1a1614; --card: #2d2621; --accent: #f59e0b; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: #fff; overflow: hidden; margin: 0; padding: 0; }
        .screen { display: none; height: calc(100vh - 85px - 75px); padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar { position: fixed; top: 0; right: -100%; width: 320px; height: 100%; background: #1a1614; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #333; }
        .sidebar.open { right: 0; }
        .profile-section { padding: 40px 20px; text-align: center; border-bottom: 1px solid #333; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin: 0 auto 15px; object-fit: cover; }
        .side-item { background: #2d2621; padding: 12px 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3d342d; }

        .btn-option { background: #2d2621; padding: 18px; border-radius: 20px; text-align: right; font-weight: bold; border: 1px solid #3d342d; width: 100%; margin-bottom: 12px; transition: 0.2s; cursor: pointer; }
        .btn-option.correct { background: #065f46 !important; border-color: #10b981 !important; }
        .btn-option.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
        .btn-option.fade { opacity: 0.2; pointer-events: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-card { background: #2d2621; width: 100%; max-width: 350px; border-radius: 30px; padding: 30px; text-align: center; border: 1px solid #444; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: #1a1614; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { opacity: 0.4; text-align: center; font-size: 11px; color: #94a3b8; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div id="info-modal" class="modal-overlay">
    <div class="modal-card">
        <div id="modal-icon" class="text-6xl mb-4">⭐</div>
        <h3 id="modal-title" class="text-2xl font-black mb-2">ممتاز!</h3>
        <p id="modal-msg" class="text-slate-400 text-sm mb-6 leading-relaxed"></p>
        <button id="modal-btn" class="w-full py-4 bg-amber-600 rounded-2xl font-black">متابعة ➜</button>
    </div>
</div>

<div class="max-w-[480px] mx-auto h-screen relative flex flex-col shadow-2xl overflow-hidden">
    
    <div class="px-6 flex justify-between items-center h-[75px] bg-[#1a1614] z-50">
        <div class="flex items-center gap-3">
            <div id="top-lvl" class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-black">1</div>
            <div class="bg-[#2d2621] px-3 py-1.5 rounded-xl border border-white/5 flex items-center gap-2">
                <span id="coin-count" class="font-bold text-yellow-400">1000</span>
                <span>💰</span>
            </div>
        </div>
        <button onclick="window.toggleSidebar()" class="w-11 h-11 bg-[#2d2621] rounded-2xl flex items-center justify-center">☰</button>
    </div>

    <div class="flex-1 relative">
        <div id="screen-home" class="screen active justify-center items-center text-center">
            <img src="https://i.postimg.cc/qqTBP312/1000061201.png" class="w-32 h-32 rounded-3xl border-4 border-amber-600 mb-6 shadow-xl">
            <h1 class="text-3xl font-black mb-10">شغل <span class="text-amber-500">مخك</span></h1>
            <button onclick="window.navTo('paths')" class="w-64 bg-amber-600 py-4 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition">ابدأ التحدي 🚀</button>
        </div>

        <div id="screen-paths" class="screen">
            <h2 class="text-2xl font-black mb-6">اختر المسار 🧭</h2>
            <div id="paths-list" class="space-y-4"></div>
        </div>

        <div id="screen-quiz" class="screen !p-0">
            <div class="p-6 flex flex-col h-full bg-[#1a1614]">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="window.confirmExit()" class="w-10 h-10 bg-red-900/20 text-red-500 rounded-xl font-black">✕</button>
                    <span id="q-counter" class="text-xs font-bold bg-slate-800 px-4 py-1.5 rounded-full">السؤال 1 / 10</span>
                </div>
                
                <div class="bg-[#2d2621] p-8 rounded-[35px] border border-white/5 mb-8 text-center min-h-[160px] flex items-center justify-center shadow-lg">
                    <h3 id="q-text" class="text-lg font-bold leading-relaxed">...</h3>
                </div>

                <div id="options-box" class="flex-1"></div>

                <div class="grid grid-cols-3 gap-4 pt-6 border-t border-white/5">
                    <button onclick="window.useHelper('delete')" class="bg-[#2d2621] py-4 rounded-2xl flex flex-col items-center gap-1">
                        <span class="text-2xl">✂️</span>
                        <span id="h-del" class="text-[10px] font-black">0</span>
                    </button>
                    <button onclick="window.useHelper('hint')" class="bg-[#2d2621] py-4 rounded-2xl flex flex-col items-center gap-1">
                        <span class="text-2xl">💡</span>
                        <span id="h-hint" class="text-[10px] font-black">0</span>
                    </button>
                    <button onclick="window.useHelper('skip')" class="bg-[#2d2621] py-4 rounded-2xl flex flex-col items-center gap-1">
                        <span class="text-2xl">⏩</span>
                        <span id="h-skip" class="text-[10px] font-black">0</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="screen-leaderboard" class="screen">
            <h2 class="text-2xl font-black mb-6 text-center">أبطال اللعبة 🏆</h2>
            <div id="leader-list" class="space-y-3"></div>
        </div>

        <div id="screen-shop" class="screen">
            <h2 class="text-2xl font-black mb-6">المتجر 🛒</h2>
            <div id="shop-items" class="space-y-4"></div>
        </div>
    </div>

    <div id="main-nav" class="nav-bar">
        <div onclick="window.navTo('home')" id="n-home" class="nav-item active">🏠<br>الرئيسية</div>
        <div onclick="window.navTo('paths')" id="n-paths" class="nav-item">🧭<br>المسارات</div>
        <div onclick="window.navTo('leaderboard')" id="n-leaderboard" class="nav-item">🏆<br>الترتيب</div>
        <div onclick="window.navTo('shop')" id="n-shop" class="nav-item">🛒<br>المتجر</div>
    </div>
</div>

<div id="sidebar" class="sidebar shadow-2xl overflow-y-auto">
    <div class="profile-section">
        <img src="https://i.postimg.cc/qqTBP312/1000061201.png" class="profile-img">
        <h3 id="side-name" class="text-xl font-black">...</h3>
        <p id="side-rank" class="text-amber-500 text-xs font-bold mt-1">مبتدئ ذكي</p>
        <div class="mt-6 px-4">
            <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-500"><span>XP الخبرة</span> <span id="side-xp-text">0/1000</span></div>
            <div class="h-1.5 bg-black/40 rounded-full overflow-hidden">
                <div id="side-xp-fill" class="h-full bg-amber-500 w-0 transition-all duration-700"></div>
            </div>
        </div>
    </div>
    <div class="p-6">
        <div class="side-item"><span>💰 العملات</span> <span id="side-coins" class="text-amber-500 font-black">0</span></div>
        <div class="side-item"><span>🏆 المستوى</span> <span id="side-lvl" class="text-amber-500 font-black">1</span></div>
        <div class="side-item"><span>✅ أقسام مكتملة</span> <span id="side-comp" class="text-amber-500 font-black">0</span></div>
        <div class="side-item"><span>🎮 إجمالي الألعاب</span> <span id="side-total" class="text-amber-500 font-black">0</span></div>
        <button onclick="window.resetGame()" class="w-full py-4 text-red-500 text-xs font-bold mt-10">🗑️ إعادة ضبط الحساب</button>
    </div>
</div>

<script>
    const categoryConfig = {
        islamic: { name: "إسلاميات", icon: "🌙", subs: ["الأنبياء", "القرآن", "الغزوات"] },
        history: { name: "التاريخ", icon: "📜", subs: ["مصر القديمة", "العالم الإسلامي", "حروب عالمية"] },
        sports: { name: "الرياضة", icon: "⚽", subs: ["كرة القدم", "أولمبياد", "تنس"] },
        science: { name: "العلوم", icon: "🧪", subs: ["فضاء", "فيزياء", "كيمياء"] },
        geography: { name: "جغرافيا", icon: "🌍", subs: ["عواصم", "بحار", "أنهار"] },
        general: { name: "ثقافة عامة", icon: "💡", subs: ["معلومات", "اختراعات", "أدب"] }
    };

    let curQuestions = [], curIdx = 0;

    window.navTo = function(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const screen = document.getElementById(`screen-${id}`);
        if(screen) screen.classList.add('active');
        const navItem = document.getElementById(`n-${id}`);
        if(navItem) navItem.classList.add('active');
        document.getElementById('main-nav').style.display = (id === 'quiz') ? 'none' : 'flex';
        if(id === 'paths') renderPaths();
        if(id === 'shop') renderShop();
        if(id === 'leaderboard') renderLeaderboard();
        window.closeSidebar();
    };

    function renderPaths() {
        const list = document.getElementById('paths-list');
        list.innerHTML = '';
        for(let key in categoryConfig) {
            const cat = categoryConfig[key];
            list.innerHTML += `
                <div onclick="window.showSubs('${key}')" class="bg-[#2d2621] p-6 rounded-3xl flex justify-between items-center border border-white/5 active:scale-95 transition cursor-pointer">
                    <div class="flex items-center gap-5">
                        <div class="text-3xl w-12 h-12 flex items-center justify-center bg-black/20 rounded-xl">${cat.icon}</div>
                        <h4 class="font-black text-lg">${cat.name}</h4>
                    </div>
                    <span class="text-amber-500">➜</span>
                </div>`;
        }
    }

    window.showSubs = function(key) {
        const list = document.getElementById('paths-list');
        list.innerHTML = `<button onclick="renderPaths()" class="text-amber-500 font-bold mb-4">🔙 رجوع</button>`;
        categoryConfig[key].subs.forEach(sub => {
            list.innerHTML += `
                <div onclick="window.startQuiz('${categoryConfig[key].name}', '${sub}')" class="bg-[#2d2621] p-5 rounded-2xl border border-white/5 mb-3 flex justify-between items-center cursor-pointer">
                    <span class="font-bold text-slate-300">${sub}</span>
                    <span class="text-xs bg-amber-600/10 text-amber-500 px-3 py-1 rounded-full font-bold">ابدأ</span>
                </div>`;
        });
    };

    window.startQuiz = async function(cat, sub) {
        window.navTo('quiz');
        document.getElementById('q-text').innerText = "جاري تحميل الأسئلة...";
        try {
            const q = window.query(window.collection(window.db, "questions"), window.where("category", "==", cat), window.where("subCategory", "==", sub));
            const querySnapshot = await window.getDocs(q);
            curQuestions = [];
            querySnapshot.forEach((doc) => curQuestions.push(doc.data()));
            if(curQuestions.length === 0) {
                curQuestions = [{t: "لا توجد أسئلة في هذا القسم بعد.", a: ["رجوع"], c: 0, x: "يرجى الرفع من Admin"}];
            }
            curQuestions = curQuestions.sort(() => 0.5 - Math.random()).slice(0, 10);
            curIdx = 0;
            renderQuestion();
        } catch (e) { alert("خطأ في الاتصال"); }
    };

    function renderQuestion() {
        const q = curQuestions[curIdx];
        document.getElementById('q-counter').innerText = `السؤال ${curIdx+1} / ${curQuestions.length}`;
        document.getElementById('q-text').innerText = q.t;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            box.appendChild(btn);
        });
        window.updateUI();
    }

    function checkAnswer(idx, btn) {
        const q = curQuestions[curIdx];
        const btns = document.querySelectorAll('.btn-option');
        btns.forEach(b => b.disabled = true);
        if(idx === q.c) {
            btn.classList.add('correct');
            window.gameData.coins += 50;
            window.gameData.xp += 100;
            setTimeout(() => window.openModal('⭐', 'ممتاز!', q.x), 500);
        } else {
            btn.classList.add('wrong');
            btns[q.c].classList.add('correct');
            setTimeout(() => window.openModal('❌', 'حاول مرة أخرى', q.x), 500);
        }
        window.saveData();
    }

    window.openModal = function(icon, title, msg) {
        const m = document.getElementById('info-modal');
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-msg').innerText = msg;
        m.style.display = 'flex';
        document.getElementById('modal-btn').onclick = () => {
            m.style.display = 'none';
            curIdx++;
            if(curIdx < curQuestions.length) renderQuestion();
            else { window.gameData.stats.gamesPlayed++; window.navTo('home'); }
        };
    };

    window.useHelper = function(type) {
        if(window.gameData.inventory[type] <= 0) return alert("الرصيد غير كافٍ!");
        const q = curQuestions[curIdx];
        const btns = document.querySelectorAll('.btn-option');
        if(type === 'delete') {
            let del = 0;
            btns.forEach((b, i) => { if(i !== q.c && del < 2) { b.classList.add('fade'); del++; } });
        } else if(type === 'hint') {
            alert("تلميح: " + q.x);
        } else if(type === 'skip') {
            curIdx++;
            if(curIdx < curQuestions.length) renderQuestion(); else window.navTo('home');
        }
        window.gameData.inventory[type]--;
        window.updateUI(); window.saveData();
    };

    async function renderLeaderboard() {
        const list = document.getElementById('leader-list');
        list.innerHTML = 'جاري التحميل...';
        const q = window.query(window.collection(window.db, 'users'), window.orderBy('xp', 'desc'), window.limit(10));
        const snap = await window.getDocs(q);
        list.innerHTML = '';
        let i = 1;
        snap.forEach(doc => {
            const u = doc.data();
            list.innerHTML += `<div class="bg-[#2d2621] p-4 rounded-2xl flex justify-between"><span>${i++}. ${u.username}</span><span>${u.xp} XP</span></div>`;
        });
    }

    function renderShop() {
        const list = document.getElementById('shop-items');
        const items = [{id:'delete', n:'مقص حذف', p:200}, {id:'hint', n:'مصباح تلميح', p:100}, {id:'skip', n:'تخطي', p:300}];
        list.innerHTML = '';
        items.forEach(i => {
            list.innerHTML += `<div class="bg-[#2d2621] p-5 rounded-3xl flex justify-between"><span>${i.n}</span><button onclick="window.buy('${i.id}', ${i.p})" class="bg-amber-600 px-4 py-2 rounded-xl">${i.p} 💰</button></div>`;
        });
    }

    window.buy = function(id, price) {
        if(window.gameData.coins >= price) {
            window.gameData.coins -= price;
            window.gameData.inventory[id]++;
            window.saveData(); window.updateUI(); renderShop();
        } else alert("الذهب لا يكفي");
    };

    window.updateUI = function() {
        const d = window.gameData;
        document.getElementById('coin-count').innerText = d.coins;
        document.getElementById('top-lvl').innerText = d.level;
        document.getElementById('side-coins').innerText = d.coins;
        document.getElementById('side-lvl').innerText = d.level;
        document.getElementById('side-name').innerText = d.username;
        document.getElementById('h-del').innerText = d.inventory.delete;
        document.getElementById('h-hint').innerText = d.inventory.hint;
        document.getElementById('h-skip').innerText = d.inventory.skip;
        const req = d.level * 1000;
        document.getElementById('side-xp-text').innerText = `${d.xp}/${req}`;
        document.getElementById('side-xp-fill').style.width = (d.xp / req * 100) + "%";
    };

    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    window.closeSidebar = () => document.getElementById('sidebar').classList.remove('open');
    window.confirmExit = () => { if(confirm("خروج؟")) window.navTo('paths'); };
    window.resetGame = () => { if(confirm("إعادة ضبط؟")) { localStorage.clear(); location.reload(); } };
</script>
</body>
</html>
