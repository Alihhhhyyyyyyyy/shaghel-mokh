<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شغل مخك | تحدي الـ 2000 سؤال</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.gameData = {
            coins: 1000, xp: 0, level: 1, username: "عبقري جديد",
            lives: 5,
            inventory: { delete: 10, skip: 10, hint: 10 },
            stats: { correct: 0, total: 0, gamesPlayed: 0 },
            achievements: [],
            dailyTasks: { lastUpdate: null, task1: 0, task2: 0, task3: 0 },
            rank: "مبتدئ"
        };

        signInAnonymously(auth).catch(e => console.error("Auth Error:", e));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                const userDocRef = doc(db, 'users', user.uid);
                onSnapshot(userDocRef, (snap) => {
                    if (snap.exists()) {
                        window.gameData = { ...window.gameData, ...snap.data() };
                    } else {
                        setDoc(userDocRef, window.gameData);
                    }
                    if (typeof window.updateUI === 'function') window.updateUI();
                });
            }
        });

        window.saveData = async () => {
            if (!window.currentUser) return;
            const userDocRef = doc(db, 'users', window.currentUser.uid);
            await setDoc(userDocRef, window.gameData, { merge: true });
        };

        window.fetchQuestionsFromCloud = async (category, subCategory = null) => {
            try {
                const qRef = collection(db, 'questions');
                let qQuery = subCategory ? query(qRef, where('category', '==', category), where('subCategory', '==', subCategory)) : query(qRef, where('category', '==', category));
                const qSnap = await getDocs(qQuery);
                let list = [];
                qSnap.forEach(d => { 
                    const data = d.data();
                    if(data.questions) list = list.concat(data.questions);
                    else list.push(data);
                });
                return list;
            } catch (e) { return []; }
        };

        window.db = db;
    </script>

    <style>
        :root { --bg: #020617; --primary: #6366f1; --accent: #10b981; --wrong: #ef4444; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: #f8fafc; overflow: hidden; touch-action: manipulation; }
        .screen { display: none; height: calc(100vh - 85px - 75px); padding: 20px; overflow-y: auto; }
        .screen.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .btn-option { background: #1e293b; padding: 16px; border-radius: 20px; text-align: right; font-weight: 700; border: 2px solid transparent; width: 100%; transition: 0.2s; position: relative; }
        .btn-option:active { transform: scale(0.97); background: #334155; }
        .btn-option.correct { background: #065f46 !important; border-color: #10b981 !important; }
        .btn-option.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { opacity: 0.4; transition: 0.3s; text-align: center; cursor: pointer; color: #94a3b8; font-size: 11px; }
        .nav-item.active { opacity: 1; color: var(--primary); transform: translateY(-2px); }
        
        .sidebar { position: fixed; top: 0; right: -100%; width: 300px; height: 100%; background: #0f172a; z-index: 500; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid rgba(255,255,255,0.1); }
        .sidebar.open { right: 0; }
        .profile-img { width: 100px; height: 100px; border-radius: 30px; border: 3px solid var(--primary); object-fit: cover; margin: 0 auto 15px; box-shadow: 0 10px 20px rgba(99,102,241,0.3); }
        
        .timer-bar { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 10px; width: 100%; }
        .timer-fill { height: 100%; background: var(--primary); width: 100%; transition: 0.1s linear; }

        /* تحسين شكل الرسائل التفاعلية (Feedback) */
        .feedback-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            max-width: 90%;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .feedback-correct { border-top: 8px solid var(--accent); }
        .feedback-wrong { border-top: 8px solid var(--wrong); }
    </style>
</head>
<body>

    <div class="flex-1 relative overflow-hidden">
        
        <div id="screen-home" class="screen active justify-center items-center text-center">
            <img src="https://i.postimg.cc/qqTBP312/1000061201.png" class="w-36 h-36 rounded-[40px] border-4 border-indigo-500 mb-8 shadow-2xl shadow-indigo-500/20" alt="Logo">

    <div id="main-nav" class="nav-bar">
        <div onclick="navTo('home')" id="n-home" class="nav-item active">🏠<br>الرئيسية</div>

<script>
    const fallbackDB = {
        islamic: { name: "إسلاميات", icon: "🌙", subs: {
            "الأنبياء": [{t: "من هو أول من أسلم من الرجال؟", a: ["عمر بن الخطاب", "علي بن أبي طالب", "أبو بكر الصديق", "عثمان بن عفان"], c: 2, x: "أبو بكر الصديق رضي الله عنه هو أول من صدّق النبي وآمن به من الرجال."}]
        }},
        science: { name: "علوم وطبيعة", icon: "🧪", subs: {
            "فضاء": [{t: "ما هو الكوكب الأحمر؟", a: ["المشتري", "زحل", "المريخ", "الزهرة"], c: 2, x: "المريخ يعرف بالكوكب الأحمر بسبب وفرة أكسيد الحديد على سطحه."}]
        }},
        geography: { name: "جغرافيا", icon: "🌍", subs: {
            "قارات": [{t: "ما هي أكبر قارة في العالم؟", a: ["أفريقيا", "أوروبا", "آسيا", "أمريكا الشمالية"], c: 2, x: "آسيا هي أكبر قارة من حيث المساحة وعدد السكان."}]
        }},
        history: { name: "تاريخ", icon: "📜", subs: {
            "قديم": [{t: "من هو باني الهرم الأكبر؟", a: ["خفرع", "منقرع", "خوفو", "رمسيس"], c: 2, x: "الملك خوفو من الأسرة الرابعة هو صاحب الهرم الأكبر بالجيزة."}]
        }},
        sports: { name: "رياضة", icon: "⚽", subs: {
            "كرة قدم": [{t: "كم عدد لاعبي فريق كرة القدم؟", a: ["9", "10", "11", "12"], c: 2, x: "تتكون المباراة من فريقين، كل فريق يضم 11 لاعباً أساسياً."}]
        }},
        general: { name: "ثقافة عامة", icon: "💡", subs: {
            "طبيعة": [{t: "ما هو أسرع حيوان بري؟", a: ["الأسد", "النمر", "الفهد", "الحصان"], c: 2, x: "الفهد الصياد (Cheetah) هو أسرع الثدييات البرية وتصل سرعته لـ 120 كم/س."}]
        }}
    };

    const achievementsDB = [
        {id: 'first_win', name: 'البداية', icon: '🐣', target: 1, type: 'correct', reward: 100},
        {id: 'smart_10', name: 'عبقري صغير', icon: '🧠', target: 10, type: 'correct', reward: 500},
        {id: 'lvl_5', name: 'المستوى 5', icon: '🛡️', target: 5, type: 'level', reward: 2000}
    ];

    let curQuestions = [], curIdx = 0, timer = 15, timerInt = null;

    function playSfx(id) {
        const a = document.getElementById(`sfx-${id}`);
        if(a) { a.currentTime = 0; a.play().catch(() => {}); }
    }

    function navTo(id) {
        playSfx('click');
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const target = document.getElementById(`screen-${id}`);
        if(target) target.classList.add('active');
        const nav = document.getElementById(`n-${id}`);
        if(nav) nav.classList.add('active');
        document.getElementById('main-nav').style.display = (id === 'quiz') ? 'none' : 'flex';
        if(id === 'paths') renderPaths();
        if(id === 'shop') renderShop();
        if(id === 'home') checkDailyTasks();
        clearInterval(timerInt);
        closeSidebar();
    }

    function renderPaths() {
        const list = document.getElementById('paths-list');
        document.getElementById('paths-title').innerText = "اختر تخصصك 🧭";
        list.innerHTML = '';
        for(let key in fallbackDB) {
            const p = fallbackDB[key];
            list.innerHTML += `
                <div onclick="showSubCategories('${key}')" class="bg-slate-800/50 p-6 rounded-[30px] border border-white/5 flex justify-between items-center active:scale-95 transition cursor-pointer">
                    <div class="flex items-center gap-5">
                        <div class="text-3xl w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center border border-white/5">${p.icon}</div>
                        <div class="text-right">
                            <h4 class="text-md font-black">${p.name}</h4>
                            <p class="text-[9px] text-slate-500 font-bold">استكشف التحديات</p>
                        </div>
                    </div>
                    <span class="text-indigo-500 text-xl font-black">➜</span>
                </div>`;
        }
    }

    window.showSubCategories = function(mainCatKey) {
        const list = document.getElementById('paths-list');
        const p = fallbackDB[mainCatKey];
        document.getElementById('paths-title').innerText = `فروع ${p.name}`;
        list.innerHTML = `<button onclick="renderPaths()" class="text-indigo-400 text-xs font-bold mb-4 flex items-center gap-2">🔙 العودة</button>`;
        for(let subKey in p.subs) {
            list.innerHTML += `
                <div onclick="startQuizFlow('${mainCatKey}', '${subKey}')" class="bg-slate-900 p-5 rounded-2xl border border-white/5 flex justify-between items-center active:scale-95 transition cursor-pointer">
                    <div class="flex items-center gap-4">
                        <div class="text-xl">📍</div>
                        <h4 class="text-sm font-bold text-slate-300">${subKey}</h4>
                    </div>
                    <div class="bg-indigo-600/10 text-indigo-400 text-[10px] px-4 py-1.5 rounded-full border border-indigo-500/20">دخول</div>
                </div>`;
        }
    }

    window.startQuizFlow = async function(catKey, subKey) {
        if(window.gameData.lives <= 0) { alert("عذراً، قلوبك انتهت!"); return; }
        navTo('quiz');
        const mainCatName = fallbackDB[catKey].name;
        let cloudQ = await window.fetchQuestionsFromCloud(mainCatName, subKey);
        if(!cloudQ || cloudQ.length === 0) cloudQ = fallbackDB[catKey].subs[subKey];
        curQuestions = cloudQ.sort(() => 0.5 - Math.random()).slice(0, 10);
        curIdx = 0;
        renderQuestion();
    }

    function renderQuestion() {
        const q = curQuestions[curIdx];
        document.getElementById('q-counter').innerText = `السؤال ${curIdx+1} / ${curQuestions.length}`;
        document.getElementById('q-text').innerText = q.question || q.t;
        document.getElementById('feedback-modal').classList.add('hidden');
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        const options = q.options || q.a;
        const correct = q.answer !== undefined ? q.answer : q.c;
        options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn, correct, q.info || q.x);
            box.appendChild(btn);
        });
        updateHelpersUI();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInt);
        timer = 15;
        const fill = document.getElementById('timer-fill');
        timerInt = setInterval(() => {
            timer--;
            document.getElementById('timer-val').innerText = timer;
            fill.style.width = (timer / 15 * 100) + "%";
            if(timer <= 0) { clearInterval(timerInt); checkAnswer(-1, null, -1, "تأخرت جداً! الوقت انتهى."); }
        }, 1000);
    }

    function checkAnswer(idx, btn, correctIdx, info) {
        clearInterval(timerInt);
        document.querySelectorAll('.btn-option').forEach(b => b.disabled = true);
        const card = document.getElementById('feedback-card');
        
        if(idx === correctIdx) {
            playSfx('correct');
            if(btn) btn.classList.add('correct');
            window.gameData.stats.correct++;
            window.gameData.coins += 50;
            window.gameData.xp += 100;
            card.className = "feedback-card feedback-correct";
            showFeedback(true, info);
        } else {
            playSfx('wrong');
            if(btn) btn.classList.add('wrong');
            const btns = document.querySelectorAll('.btn-option');
            if(btns[correctIdx]) btns[correctIdx].classList.add('correct');
            window.gameData.lives--;
            card.className = "feedback-card feedback-wrong";
            showFeedback(false, info);
        }
        checkLevel();
        window.saveData(); window.updateUI();
    }

    function showFeedback(correct, info) {
        const m = document.getElementById('feedback-modal');
        m.classList.remove('hidden');
        document.getElementById('feedback-icon').innerText = correct ? "⭐" : "💔";
        document.getElementById('feedback-title').innerText = correct ? "إجابة ذكية!" : "للأسف، إجابة خاطئة";
        document.getElementById('feedback-analysis').innerText = info;
    }

    function nextQuestion() {
        curIdx++;
        if(curIdx < curQuestions.length && window.gameData.lives > 0) renderQuestion();
        else navTo('home');
    }

    function checkLevel() {
        const req = window.gameData.level * 800;
        if(window.gameData.xp >= req) {
            window.gameData.level++;
            window.gameData.xp -= req;
            alert(`🎉 مبروك! وصلت للمستوى ${window.gameData.level}`);
        }
    }

    window.updateUI = function() {
        const d = window.gameData;
        document.getElementById('coin-count').innerText = d.coins;
        document.getElementById('live-count').innerText = d.lives;
        document.getElementById('top-lvl').innerText = d.level;
        document.getElementById('side-name').innerText = d.username;
        document.getElementById('side-lvl').innerText = d.level;
        document.getElementById('side-rank').innerText = d.rank;
        const req = d.level * 800;
        document.getElementById('side-xp-fill').style.width = (d.xp / req * 100) + "%";
        updateHelpersUI();
    };

    function updateHelpersUI() {
        document.getElementById('h-del').innerText = window.gameData.inventory.delete;
        document.getElementById('h-hint').innerText = window.gameData.inventory.hint;
        document.getElementById('h-skip').innerText = window.gameData.inventory.skip;
    }

    function useHelper(type) {
        if(window.gameData.inventory[type] > 0) {
            window.gameData.inventory[type]--;
            if(type === 'skip') nextQuestion();
            window.saveData(); window.updateUI();
        }
    }

    function renderShop() {
        const list = document.getElementById('shop-items');
        const items = [
            {id:'lives', name:'شحن 5 قلوب', p:300, icon:'❤️'},
            {id:'delete', name:'حذف إجابتين', p:200, icon:'✂️'},
            {id:'hint', name:'كشف التلميح', p:150, icon:'💡'}
        ];
        list.innerHTML = '';
        items.forEach(i => {
            list.innerHTML += `
                <div class="p-5 bg-slate-800 rounded-3xl border border-white/5 flex justify-between items-center">
                    <div class="flex items-center gap-4 text-right">
                        <div class="text-2xl">${i.icon}</div>
                        <div><h5 class="font-bold text-sm">${i.name}</h5><p class="text-[9px] text-slate-500">متوفر الآن</p></div>
                    </div>
                    <button onclick="buy('${i.id}', ${i.p})" class="bg-indigo-600 px-6 py-2 rounded-xl text-xs font-black">${i.p} 🟡</button>
                </div>`;
        });
    }

    function buy(id, price) {
        if(window.gameData.coins >= price) {
            window.gameData.coins -= price;
            if(id === 'lives') window.gameData.lives += 5; else window.gameData.inventory[id]++;
            window.saveData(); window.updateUI(); renderShop();
        } else { alert("رصيدك غير كافٍ!"); }
    }

    function checkDailyTasks() {
        const mini = document.getElementById('daily-tasks-mini');
        mini.innerHTML = `<div class="bg-slate-900/50 p-3 rounded-xl border border-white/5 text-xs">مرحباً بك في تحدي اليوم!</div>`;
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.add('hidden'); }
    function editName() { const n = prompt("اللقب:", window.gameData.username); if(n) { window.gameData.username = n; window.saveData(); window.updateUI(); } }
    function resetProfile() { if(confirm("هل تريد مسح كافة البيانات؟")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
