<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شغل مخك - النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        const appId = 'shaghel-mokh-ultra';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let userData = { xp: 0, level: 1, username: "لاعب جديد", coins: 100 };
        let questions = [];
        let currentIdx = 0;

        window.onload = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, async (u) => {
                if (u) {
                    user = u;
                    await loadUserProfile();
                    showScreen('main-menu');
                }
            });
        };

        async function loadUserProfile() {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'rankings', user.uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                userData = snap.data();
            } else {
                userData.username = "لاعب_" + Math.floor(Math.random() * 9000 + 1000);
                await setDoc(userRef, userData);
            }
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.val-xp').forEach(el => el.innerText = userData.xp);
            document.querySelectorAll('.val-lvl').forEach(el => el.innerText = userData.level);
            document.querySelectorAll('.val-name').forEach(el => el.innerText = userData.username);
            document.querySelectorAll('.val-coins').forEach(el => el.innerText = userData.coins || 0);
        }

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.startBranch = async (topic, branch) => {
            document.getElementById('loader').style.display = 'flex';
            const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
            const snap = await getDocs(qRef);
            
            questions = [];
            snap.forEach(d => {
                const data = d.data();
                if(data.topic === topic && data.branch === branch) {
                    questions.push(data);
                }
            });

            if(questions.length === 0) {
                alert("عذراً، هذا القسم لا يحتوي على أسئلة حالياً. اطلب من الإدارة إضافتها!");
                document.getElementById('loader').style.display = 'none';
                return;
            }

            questions = questions.sort(() => Math.random() - 0.5);
            currentIdx = 0;
            document.getElementById('loader').style.display = 'none';
            showScreen('game-area');
            renderQuestion();
        };

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('display-topic').innerText = q.branch;
            document.getElementById('q-text').innerText = q.text;
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-right font-bold hover:bg-amber-500 hover:text-black transition-all active:scale-95 text-lg mb-2";
                btn.innerHTML = `<span class="inline-block w-8 h-8 bg-white/10 rounded-lg text-center leading-8 ml-3 text-sm">${i+1}</span> ${opt}`;
                btn.onclick = () => handleAnswer(i + 1);
                optionsDiv.appendChild(btn);
            });

            const progress = ((currentIdx + 1) / questions.length) * 100;
            document.getElementById('progress-inner').style.width = `${progress}%`;
        }

        async function handleAnswer(choice) {
            const q = questions[currentIdx];
            if(choice === q.correct) {
                userData.xp += 10;
                if(userData.xp % 100 === 0) userData.level++;
            }

            if(currentIdx < questions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                await saveUserData();
                showScreen('victory-screen');
            }
        }

        async function saveUserData() {
            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'rankings', user.uid);
            await setDoc(userRef, userData);
            updateUI();
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #050507; color: white; user-select: none; }
        .glass { background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.06); }
        .gold-glow { text-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }
        .btn-gold { background: linear-gradient(135deg, #f59e0b, #b45309); color: black; font-weight: 900; }
        .card-topic { transition: 0.3s; cursor: pointer; }
        .card-topic:hover { transform: translateY(-5px); border-color: rgba(245, 158, 11, 0.3); background: rgba(245, 158, 11, 0.03); }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 z-[100] bg-black flex items-center justify-center hidden">
        <div class="w-16 h-16 border-4 border-amber-500/20 border-t-amber-500 rounded-full animate-spin"></div>
    </div>

    <!-- Top Navigation -->
    <nav class="fixed top-0 inset-x-0 p-4 z-50 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-3 glass px-4 py-2 rounded-2xl">
            <div class="w-10 h-10 btn-gold rounded-xl flex items-center justify-center text-xl val-lvl">1</div>
            <div>
                <p class="text-[9px] text-slate-500 font-black uppercase">المستوى</p>
                <p class="text-xs font-black val-name">جاري التحميل...</p>
            </div>
        </div>
        <div class="flex gap-2">
            <div class="glass px-4 py-2 rounded-2xl text-center">
                <p class="text-[9px] text-amber-500 font-black">النقاط</p>
                <p class="text-lg font-black val-xp">0</p>
            </div>
        </div>
    </nav>

    <!-- Main Menu -->
    <div id="main-menu" class="screen pt-28 px-4 pb-20 max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black gold-glow mb-4 tracking-tighter">شغل مخك <span class="text-amber-500 uppercase">Pro</span></h1>
            <p class="text-slate-400 font-bold">تحدى ذكاءك واجمع النقاط لتتصدر القائمة</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Category: العلوم -->
            <div class="glass p-6 rounded-[35px] card-topic border-b-4 border-blue-500">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-14 h-14 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-2xl"><i class="fas fa-flask"></i></div>
                    <h3 class="text-2xl font-black">العلوم الطبيعية</h3>
                </div>
                <div class="grid gap-2">
                    <button onclick="startBranch('العلوم الطبيعية', 'فيزياء')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-blue-500/20 text-right flex justify-between items-center"><span>فيزياء</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                    <button onclick="startBranch('العلوم الطبيعية', 'كيمياء')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-blue-500/20 text-right flex justify-between items-center"><span>كيمياء</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                    <button onclick="startBranch('العلوم الطبيعية', 'أحياء')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-blue-500/20 text-right flex justify-between items-center"><span>أحياء</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                </div>
            </div>

            <!-- Category: التكنولوجيا -->
            <div class="glass p-6 rounded-[35px] card-topic border-b-4 border-amber-500">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-14 h-14 bg-amber-500/10 rounded-2xl flex items-center justify-center text-amber-500 text-2xl"><i class="fas fa-microchip"></i></div>
                    <h3 class="text-2xl font-black">التكنولوجيا</h3>
                </div>
                <div class="grid gap-2">
                    <button onclick="startBranch('تكنولوجيا المعلومات', 'برمجة')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-amber-500/20 text-right flex justify-between items-center"><span>برمجة</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                    <button onclick="startBranch('تكنولوجيا المعلومات', 'ذكاء اصطناعي')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-amber-500/20 text-right flex justify-between items-center"><span>ذكاء اصطناعي</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                </div>
            </div>

            <!-- Category: اللغة العربية -->
            <div class="glass p-6 rounded-[35px] card-topic border-b-4 border-emerald-500">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-14 h-14 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-emerald-500 text-2xl"><i class="fas fa-book"></i></div>
                    <h3 class="text-2xl font-black">اللغة العربية</h3>
                </div>
                <div class="grid gap-2">
                    <button onclick="startBranch('اللغة العربية', 'نحو')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-emerald-500/20 text-right flex justify-between items-center"><span>نحو</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                    <button onclick="startBranch('اللغة العربية', 'بلاغة')" class="w-full p-4 bg-white/5 rounded-2xl font-bold hover:bg-emerald-500/20 text-right flex justify-between items-center"><span>بلاغة</span> <i class="fas fa-arrow-left opacity-20"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-area" class="screen hidden fixed inset-0 z-[60] bg-[#050507] p-6 flex flex-col items-center justify-center">
        <div class="w-full max-w-2xl">
            <header class="flex justify-between items-center mb-10">
                <button onclick="showScreen('main-menu')" class="w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-red-500/20"><i class="fas fa-times text-red-500"></i></button>
                <div class="text-center">
                    <p id="display-topic" class="text-amber-500 font-black text-xs uppercase tracking-widest">تخصص</p>
                    <div class="w-32 h-1 bg-white/10 mt-2 rounded-full overflow-hidden">
                        <div id="progress-inner" class="h-full bg-amber-500 transition-all duration-700 w-0"></div>
                    </div>
                </div>
                <div class="w-12 h-12"></div>
            </header>

            <div class="glass p-10 rounded-[45px] mb-8 shadow-2xl">
                <h2 id="q-text" class="text-2xl md:text-3xl font-black leading-relaxed">جاري التجهيز...</h2>
            </div>

            <div id="options-container" class="space-y-3"></div>
        </div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="screen hidden fixed inset-0 z-[70] bg-black/90 flex items-center justify-center p-6">
        <div class="glass p-12 rounded-[50px] text-center max-w-sm w-full relative">
            <div class="absolute -top-16 left-1/2 -translate-x-1/2 w-32 h-32 btn-gold rounded-full flex items-center justify-center text-5xl shadow-2xl shadow-amber-500/30">
                <i class="fas fa-star animate-pulse"></i>
            </div>
            <h2 class="text-4xl font-black mt-12 mb-4">أحسنت!</h2>
            <p class="text-slate-400 font-bold mb-8">لقد أنهيت التحدي بنجاح وحصلت على نقاط جديدة.</p>
            <button onclick="showScreen('main-menu')" class="w-full py-5 btn-gold rounded-2xl shadow-xl hover:scale-105 active:scale-95 transition-all text-xl">استمرار</button>
        </div>
    </div>

</body>
</html>
