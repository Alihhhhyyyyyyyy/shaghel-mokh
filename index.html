<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شغل مخك - عالم الفروع</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة اختيار الأقسام */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
        }

        .category-box {
            background: var(--card);
            padding: 30px 20px;
            border-radius: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .category-box:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            background: #24334a;
        }

        /* شاشة اللعبة */
        .game-container {
            width: 90%;
            max-width: 600px;
            background: var(--card);
            padding: 25px;
            border-radius: 25px;
            margin-top: 40px;
            text-align: center;
            border: 1px solid #334155;
        }

        .hidden { display: none; }

        .option-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .option-btn:hover { background: #475569; }
        
        .correct { background: var(--success) !important; }
        .wrong { background: var(--error) !important; }

        .info-icon {
            background: #00bcd4;
            color: white;
            width: 35px; height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* المودال (التحليل) */
        .modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            max-width: 80%;
            border: 2px solid var(--accent);
            text-align: center;
        }
    </style>
</head>
<body>

<h1 id="main-title">اختر قسم الأسئلة 🚀</h1>

<div id="category-screen" class="menu-container">
    </div>

<div id="game-screen" class="game-container hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <button class="info-icon" onclick="openInfo()">i</button>
        <span id="score-val">النقاط: 0</span>
    </div>
    <h2 id="cat-label" style="color: var(--accent);"></h2>
    <div id="q-text" style="font-size: 1.5rem; margin: 20px 0;"></div>
    <div id="options-box"></div>
</div>

<div id="info-modal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--accent);">💡 تحليل السؤال</h2>
        <p id="info-body" style="font-size: 1.1rem; line-height: 1.6;"></p>
        <button class="option-btn" onclick="closeInfo()">فهمت</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
      authDomain: "shaghel-mokh-ultra.firebaseapp.com",
      projectId: "shaghel-mokh-ultra",
      databaseURL: "https://shaghel-mokh-ultra-default-rtdb.firebaseio.com",
      storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
      messagingSenderId: "167435076773",
      appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let masterData = [];
    let currentSet = [];
    let qIdx = 0;
    let score = 0;

    // تحميل البيانات ومعرفة الفروع المتاحة
    async function loadEngine() {
        const snap = await get(ref(db, 'questions/'));
        if(snap.exists()){
            masterData = snap.val();
            // استخراج الأقسام بدون تكرار
            const categories = [...new Set(masterData.map(q => q.category))];
            renderMenu(categories);
        }
    }

    function renderMenu(cats) {
        const screen = document.getElementById('category-screen');
        cats.forEach(c => {
            const div = document.createElement('div');
            div.className = 'category-box';
            div.innerText = c;
            div.onclick = () => startBranch(c);
            screen.appendChild(div);
        });
    }

    function startBranch(catName) {
        currentSet = masterData.filter(q => q.category === catName).sort(() => Math.random() - 0.5);
        qIdx = 0; score = 0;
        document.getElementById('category-screen').classList.add('hidden');
        document.getElementById('main-title').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('cat-label').innerText = "قسم: " + catName;
        showQ();
    }

    function showQ() {
        const q = currentSet[qIdx];
        document.getElementById('q-text').innerText = q.question;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => check(i, q.answer, b);
            box.appendChild(b);
        });
    }

    function check(sel, cor, btn) {
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if(sel === cor) {
            btn.classList.add('correct');
            score += 10;
            document.getElementById('score-val').innerText = "النقاط: " + score;
        } else {
            btn.classList.add('wrong');
            allBtns[cor].classList.add('correct');
        }

        setTimeout(() => {
            qIdx++;
            if(qIdx < currentSet.length) showQ();
            else { 
                alert("انتهى القسم! نقاطك: " + score);
                location.reload();
            }
        }, 1500);
    }

    window.openInfo = () => {
        document.getElementById('info-body').innerText = currentSet[qIdx].info;
        document.getElementById('info-modal').style.display = 'flex';
    }
    window.closeInfo = () => {
        document.getElementById('info-modal').style.display = 'none';
    }

    loadEngine();
</script>
</body>
</html>
