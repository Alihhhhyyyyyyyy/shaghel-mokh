<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة شغل مخك - الإصدار السحابي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        /* تنسيقات واجهة المستخدم */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary-color: #3b82f6;
            --accent-color: #f43f5e;
            --success-color: #10b981;
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 95%;
            max-width: 700px;
            text-align: center;
        }

        /* شاشة التحميل */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* البطاقات */
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--primary-color); text-shadow: 0 0 15px rgba(59,130,246,0.5); }

        /* تصميم الأقسام */
        .grid-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .cat-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #334155;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .cat-card:hover {
            background: var(--primary-color);
            border-color: white;
            transform: translateY(-5px);
        }

        /* منطقة الأسئلة */
        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 50px;
        }

        .timer-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        .question-box { font-size: 24px; margin: 30px 0; min-height: 80px; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option-item {
            background: #334155;
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            font-size: 18px;
            text-align: right;
        }

        .option-item:hover { background: #475569; }
        .correct { background: var(--success-color) !important; border-color: white !important; }
        .wrong { background: var(--accent-color) !important; border-color: white !important; }

        /* شاشة النتائج */
        .result-box { display: none; }
        .score-big { font-size: 80px; color: var(--success-color); margin: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:20px">جاري استدعاء البيانات من السحابة...</p>
    </div>

    <div class="container">
        
        <div id="start-screen">
            <h1>🧠 شغل مخك</h1>
            <p>اختر التصنيف المفضل لديك وابدأ اللعب</p>
            <div id="categories-container" class="grid-categories"></div>
        </div>

        <div id="game-screen" class="hidden">
            <div class="header-info">
                <div>النقاط: <span id="score-display">0</span></div>
                <div class="timer-circle" id="timer-display">20</div>
                <div>السؤال: <span id="q-counter">1/10</span></div>
            </div>
            
            <div class="card">
                <div id="question-text" class="question-box"></div>
                <div id="options-container" class="options-grid"></div>
            </div>
        </div>

        <div id="result-screen" class="result-box">
            <div class="card">
                <h2>انتهت الأسئلة!</h2>
                <p>لقد حصلت على</p>
                <h1 class="score-big" id="final-score">0</h1>
                <p>نقطة</p>
                <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; background: var(--primary-color); color: white; border: none; cursor: pointer; font-size: 20px; margin-top: 20px;">العب مرة ثانية 🔄</button>
            </div>
        </div>

    </div>

    <script>
        // تكوين Firebase (الخاص بك)
        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          messagingSenderId: "167435076773",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        // تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // متغيرات الحالة العامة
        let quizData = {};
        let activeQuestions = [];
        let currentQIndex = 0;
        let userScore = 0;
        let timerInterval;
        let secondsLeft = 20;

        // 1. جلب البيانات من Firestore
        async function fetchAllData() {
            try {
                const snapshot = await db.collection("quiz").get();
                if (snapshot.empty) {
                    alert("قاعدة البيانات فارغة! ارفع الأسئلة أولاً.");
                    return;
                }
                
                snapshot.forEach(doc => {
                    quizData[doc.id] = doc.data();
                });

                displayCategories();
                document.getElementById('loader').classList.add('hidden');
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("حدث خطأ في الاتصال بالسحابة.");
            }
        }

        // 2. عرض الأقسام في الصفحة الرئيسية
        function displayCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = "";

            Object.keys(quizData).forEach(key => {
                const div = document.createElement('div');
                div.className = 'cat-card';
                div.innerText = quizData[key].name || key;
                div.onclick = () => startLevel(key);
                container.appendChild(div);
            });
        }

        // 3. تحضير الأسئلة وبدء المستوى
        function startLevel(catId) {
            const data = quizData[catId];
            activeQuestions = [];

            // إذا كان القسم يحتوي على أسئلة مباشرة
            if (data.qs) {
                activeQuestions = [...data.qs];
            } 
            // إذا كان القسم يحتوي على أقسام فرعية
            else if (data.subs) {
                data.subs.forEach(s => activeQuestions.push(...s.qs));
            }

            // خلط الأسئلة عشوائياً
            activeQuestions.sort(() => Math.random() - 0.5);

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            showNextQuestion();
        }

        // 4. عرض السؤال الحالي
        function showNextQuestion() {
            if (currentQIndex >= activeQuestions.length) {
                showResults();
                return;
            }

            // تحديث الواجهة
            const q = activeQuestions[currentQIndex];
            document.getElementById('q-counter').innerText = `${currentQIndex + 1}/${activeQuestions.length}`;
            document.getElementById('question-text').innerText = q.t;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = "";

            q.a.forEach((option, idx) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerText = option;
                div.onclick = () => handleAnswer(idx, q.c, div);
                optionsContainer.appendChild(div);
            });

            startTimer();
        }

        // 5. التعامل مع الإجابة
        function handleAnswer(selectedIndex, correctIndex, element) {
            clearInterval(timerInterval);
            const options = document.querySelectorAll('.option-item');
            
            // قفل الضغط على باقي الأزرار
            options.forEach(opt => opt.style.pointerEvents = "none");

            if (selectedIndex === correctIndex) {
                element.classList.add('correct');
                userScore += 10;
                document.getElementById('score-display').innerText = userScore;
            } else {
                element.classList.add('wrong');
                options[correctIndex].classList.add('correct');
            }

            setTimeout(() => {
                currentQIndex++;
                showNextQuestion();
            }, 1500);
        }

        // 6. نظام المؤقت
        function startTimer() {
            clearInterval(timerInterval);
            secondsLeft = 20;
            document.getElementById('timer-display').innerText = secondsLeft;
            document.getElementById('timer-display').style.borderColor = "#f43f5e";

            timerInterval = setInterval(() => {
                secondsLeft--;
                document.getElementById('timer-display').innerText = secondsLeft;
                
                if (secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    autoMoveToNext();
                }
            }, 1000);
        }

        function autoMoveToNext() {
            const options = document.querySelectorAll('.option-item');
            const correctIdx = activeQuestions[currentQIndex].c;
            options[correctIdx].classList.add('correct');
            
            setTimeout(() => {
                currentQIndex++;
                showNextQuestion();
            }, 1000);
        }

        // 7. عرض النتائج النهائية
        function showResults() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = userScore;
        }

        // بدء تحميل البيانات فور فتح الصفحة
        window.onload = fetchAllData;
    </script>
</body>
</html>
