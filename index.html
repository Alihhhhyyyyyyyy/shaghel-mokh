<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شغل مخك | تحدي الـ 300 سؤال</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(99, 102, 241, 0.1);
        }

        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }

        .correct {
            background: #10b981 !important;
            border-color: #059669 !important;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .wrong {
            background: #ef4444 !important;
            border-color: #dc2626 !important;
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* انيميشن دخول الأسئلة */
        .slide-in {
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="loader" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center">
        <div class="loading-spinner mb-4"></div>
        <p class="text-indigo-400 font-bold animate-pulse">جاري الاتصال بقاعدة البيانات...</p>
    </div>

    <div id="home-screen" class="hidden w-full max-w-6xl slide-in">
        <div class="text-center mb-12">
            <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-500 mb-6">
                شغل مخك
            </h1>
            <p class="text-slate-400 text-xl md:text-2xl">تحدى نفسك في 300 سؤال من أقوى الأسئلة الثقافية</p>
        </div>

        <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full">
            </div>
    </div>

    <div id="quiz-screen" class="hidden w-full max-w-3xl slide-in">
        <div class="flex justify-between items-center mb-6">
            <button onclick="backToHome()" class="px-6 py-2 rounded-full bg-slate-800 hover:bg-slate-700 transition-colors font-bold text-sm">
                ✕ إنهاء التحدي
            </button>
            <div class="flex items-center gap-4">
                <div class="bg-indigo-600/20 px-4 py-2 rounded-xl border border-indigo-500/30">
                    <span class="text-xs text-indigo-300 block">النقاط</span>
                    <span id="score-display" class="text-xl font-black text-white">0</span>
                </div>
            </div>
        </div>

        <div class="w-full h-3 bg-slate-800 rounded-full mb-8 p-1">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-indigo-600 to-purple-600 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="glass-card p-8 md:p-12 shadow-2xl relative overflow-hidden">
            <div id="category-label" class="absolute top-0 right-0 bg-indigo-600 text-white px-6 py-1 rounded-bl-2xl text-xs font-bold uppercase tracking-widest"></div>
            
            <div class="mb-10">
                <span id="question-number" class="text-indigo-500 font-black text-lg mb-2 block">السؤال 1</span>
                <h2 id="question-text" class="text-2xl md:text-4xl font-bold leading-tight text-white"></h2>
            </div>

            <div id="options-container" class="grid gap-4">
                </div>

            <div id="explanation-box" class="hidden mt-8 p-6 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl">
                <h4 class="text-indigo-400 font-bold mb-2 text-sm">💡 هل تعلم؟</h4>
                <p id="explanation-text" class="text-slate-300 leading-relaxed"></p>
            </div>

            <button id="next-btn" onclick="handleNext()" class="hidden w-full mt-8 bg-indigo-600 hover:bg-indigo-700 py-5 rounded-2xl font-black text-xl shadow-lg shadow-indigo-600/30 transition-all active:scale-95">
                السؤال التالي ⮕
            </button>
        </div>
    </div>

    <div id="result-screen" class="hidden w-full max-w-md text-center slide-in">
        <div class="glass-card p-12 border-2 border-indigo-500/20">
            <div class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-600/40">
                <span class="text-4xl">🏆</span>
            </div>
            <h2 class="text-3xl font-black mb-2">أحسنت يا بطل!</h2>
            <p class="text-slate-400 mb-8">لقد أنهيت هذا القسم بنجاح</p>
            
            <div class="text-6xl font-black text-white mb-2" id="final-score">0</div>
            <p class="text-indigo-400 font-bold mb-10">نقطة إجمالية</p>

            <button onclick="backToHome()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-lg hover:bg-indigo-50 transition-all shadow-lg">
                العودة للرئيسية
            </button>
        </div>
    </div>

    <script>
        // تكوين Firebase - (انسخ بياناتك من Firebase Console وحطها هنا)
        // هذا الجزء هو اللي بيحل مشكلة "فشل الاتصال بقاعدة البيانات"
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "your-app.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-app.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // تهيئة التطبيق
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            console.log("Firebase Connected Successfully");
        } catch (e) {
            console.error("Firebase Config Error: ", e);
            alert("خطأ في إعدادات قاعدة البيانات! تأكد من ملف Config");
        }

        // متغيرات اللعبة
        let allData = {};
        let currentCategoryKey = "";
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let canAnswer = true;

        // دالة تحميل البيانات
        async function loadGameData() {
            try {
                // أولاً: نحاول نجيب البيانات من Firestore
                const snapshot = await db.collection('questions').doc('main').get();
                
                if (snapshot.exists) {
                    allData = snapshot.data();
                    renderCategories();
                } else {
                    // إذا مفيش بيانات في Firestore، نسحبها من ملف questions.js المحلي كخطة بديلة
                    if (typeof allQuestions !== 'undefined') {
                        allData = allQuestions;
                        renderCategories();
                    } else {
                        throw new Error("No data found anywhere");
                    }
                }
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('home-screen').classList.remove('hidden');
            } catch (error) {
                console.error("Load Error:", error);
                alert("فشل تحميل البيانات. تأكد من اتصال الإنترنت أو إعدادات السيرفر.");
            }
        }

        function renderCategories() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = '';
            
            Object.keys(allData).forEach(key => {
                const category = allData[key];
                const card = `
                    <div onclick="startQuiz('${key}')" class="glass-card p-8 cursor-pointer hover:border-indigo-500/50 group transition-all duration-300">
                        <div class="flex justify-between items-start mb-6">
                            <div class="text-4xl group-hover:scale-110 transition-transform">${category.icon || '📚'}</div>
                            <span class="bg-slate-800 text-indigo-400 text-[10px] font-bold px-3 py-1 rounded-full border border-indigo-500/20">
                                ${category.qs.length} سؤال
                            </span>
                        </div>
                        <h3 class="text-2xl font-black text-white mb-2">${category.name}</h3>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6">اضغط هنا لبدء التحدي واختبار معلوماتك في هذا القسم.</p>
                        <div class="text-indigo-500 font-bold text-sm flex items-center gap-2">
                            ابدأ الآن 
                            <span class="group-hover:translate-x-[-5px] transition-transform">←</span>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function startQuiz(key) {
            currentCategoryKey = key;
            currentQuestions = allData[key].qs;
            currentIndex = 0;
            score = 0;
            
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('score-display').innerText = '0';
            
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const q = currentQuestions[currentIndex];
            
            document.getElementById('category-label').innerText = allData[currentCategoryKey].name;
            document.getElementById('question-number').innerText = `السؤال ${currentIndex + 1} من ${currentQuestions.length}`;
            document.getElementById('question-text').innerText = q.t;
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            // تحديث شريط التقدم
            const progress = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.a.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-right p-5 rounded-2xl glass-card font-bold text-lg flex items-center justify-between group';
                btn.innerHTML = `
                    <span>${option}</span>
                    <div class="w-6 h-6 border-2 border-indigo-500/30 rounded-full group-hover:border-indigo-500"></div>
                `;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIdx, btnElement) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = currentQuestions[currentIndex];
            const correctIdx = q.c;
            const buttons = document.querySelectorAll('.option-btn');

            if (selectedIdx === correctIdx) {
                btnElement.classList.add('correct');
                score += 10;
                document.getElementById('score-display').innerText = score;
            } else {
                btnElement.classList.add('wrong');
                buttons[correctIdx].classList.add('correct');
            }

            // إظهار المعلومة الإضافية
            if (q.info) {
                document.getElementById('explanation-text').innerText = q.info;
                document.getElementById('explanation-box').classList.remove('hidden');
            }

            document.getElementById('next-btn').classList.remove('hidden');
        }

        function handleNext() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            // تحديث شريط التقدم للنهاية
            document.getElementById('progress-bar').style.width = `100%`;
        }

        function backToHome() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
        }

        // تشغيل التحميل عند فتح الصفحة
        window.onload = loadGameData;
    </script>

    <script src="questions.js"></script>
</body>
</html>
