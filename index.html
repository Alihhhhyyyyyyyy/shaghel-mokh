<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخك ذهب | النسخة الملكية 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #fde047; --indigo: #6366f1; }
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gold-gradient { background: linear-gradient(135deg, #fde047 0%, #ca8a04 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* كروت الأقسام - تعديل الحجم لتناسب 2 في الصف */
        .category-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .category-card:hover { transform: translateY(-10px); border-color: var(--indigo); box-shadow: 0 0 25px rgba(99, 102, 241, 0.3); }
        
        /* القائمة الجانبية */
        #sidebar { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); z-index: 1000; }
        #sidebar.open { transform: translateX(0); }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; backdrop-filter: blur(4px); }
        .sidebar-overlay.active { display: block; }

        .timer-bar { transition: width 1s linear; background: linear-gradient(to left, #ef4444, #f59e0b, #10b981); }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
    </style>
</head>
<body class="min-h-screen">

    <div id="particles-js"></div>

    <nav class="fixed top-0 w-full z-[100] p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-3">
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center glass rounded-xl hover:bg-indigo-500/20 transition">
                <span class="text-2xl">☰</span>
            </button>
            <div class="text-2xl font-black gold-gradient">مُخك ذهب</div>
            <div class="flex items-center gap-3 glass px-4 py-1 rounded-full border border-yellow-500/30">
                <span class="text-yellow-400">💰</span>
                <span id="total-gold-display" class="font-black">0</span>
            </div>
        </div>
    </nav>

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside id="sidebar" class="fixed top-0 right-0 h-full w-80 glass border-l border-white/10 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h3 class="text-xl font-black text-indigo-400">القائمة الملكية</h3>
            <button onclick="toggleSidebar()" class="text-2xl">✕</button>
        </div>

        <div class="bg-indigo-500/10 p-6 rounded-3xl mb-8 text-center border border-indigo-500/20">
            <div class="text-5xl mb-3">👤</div>
            <div id="user-name-display" class="font-bold text-xl mb-2 tracking-wide">لاعب ذهبي</div>
            <button onclick="changeName()" class="text-xs text-indigo-400 underline hover:text-indigo-300">تغيير الاسم</button>
        </div>

        <div class="space-y-4">
            <button onclick="openModal('shop')" class="w-full p-4 glass rounded-2xl flex items-center gap-4 hover:bg-indigo-500/20 transition">
                <span class="text-xl">🛒</span> <span class="font-bold">المتجر الذهبى</span>
            </button>
            <button onclick="openModal('rank')" class="w-full p-4 glass rounded-2xl flex items-center gap-4 hover:bg-indigo-500/20 transition">
                <span class="text-xl">🏆</span> <span class="font-bold">المتصدرين</span>
            </button>
            <button onclick="openModal('mastery')" class="w-full p-4 glass rounded-2xl flex items-center gap-4 hover:bg-indigo-500/20 transition">
                <span class="text-xl">🎓</span> <span class="font-bold">الإتقان</span>
            </button>
        </div>
    </aside>

    <main id="home-screen" class="container mx-auto px-4 pt-32 pb-10 max-w-4xl">
        <div class="text-center mb-12 animate__animated animate__fadeIn">
            <h2 class="text-4xl md:text-5xl font-black mb-4 gold-gradient">اختر تصنيفك</h2>
            <p class="text-slate-400 text-sm">تحدى نفسك في 200 سؤال متنوع</p>
        </div>

        <div id="categories-grid" class="grid grid-cols-2 gap-4 md:gap-6 animate__animated animate__fadeInUp">
            </div>
    </main>

    <section id="sub-screen" class="hidden container mx-auto px-4 pt-32 text-center max-w-4xl">
        <button onclick="backToHome()" class="mb-8 text-indigo-400 font-bold flex items-center justify-center gap-2 mx-auto">
            <span>⬅</span> العودة للأقسام
        </button>
        <h2 id="main-cat-title" class="text-4xl font-black mb-10 gold-gradient tracking-widest"></h2>
        <div id="subs-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto"></div>
    </section>

    <section id="quiz-screen" class="hidden fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl glass border border-indigo-500 flex items-center justify-center font-black text-indigo-400" id="q-counter">1</div>
                    <div class="text-sm font-bold opacity-70" id="category-name-display"></div>
                </div>
                <div class="text-2xl font-black text-yellow-400">💰 <span id="session-gold">0</span></div>
                <button onclick="location.reload()" class="w-10 h-10 glass rounded-full flex items-center justify-center">✕</button>
            </div>
            <div class="w-full h-1.5 bg-slate-800 rounded-full mb-8 overflow-hidden">
                <div id="timer-bar" class="timer-bar h-full w-full"></div>
            </div>
            <div class="glass p-8 md:p-12 rounded-[40px] shadow-2xl">
                <div id="question-text" class="text-xl md:text-2xl font-black text-center mb-10 leading-relaxed italic"></div>
                <div id="options-container" class="grid grid-cols-1 gap-4"></div>
                <div id="info-box" class="hidden mt-8 bg-indigo-500/10 p-6 rounded-3xl border border-indigo-500/20 animate__animated animate__bounceIn">
                    <p id="info-text" class="text-indigo-100 text-center text-sm md:text-base font-medium"></p>
                    <button onclick="nextQuestion()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-black shadow-lg shadow-indigo-600/30 transition-all">التالي ⮕</button>
                </div>
            </div>
        </div>
    </section>

    <div id="modal-container" class="hidden fixed inset-0 z-[1100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6">
        <div class="glass p-10 rounded-[40px] max-w-lg w-full relative border border-white/10">
            <button onclick="closeModal()" class="absolute top-6 left-6 text-2xl opacity-50 hover:opacity-100">✕</button>
            <div id="modal-content" class="text-center"></div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWIYaVgqpc2g8stA", 
        authDomain: "shaghel-mokh-ultra.firebaseapp.com", 
        projectId: "shaghel-mokh-ultra" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const categories = [
        { id: 'sports_football', name: 'كرة قدم', icon: '⚽' },
        { id: 'riddles_logic', name: 'ذكاء', icon: '🧠' },
        { id: 'science_space', name: 'علوم', icon: '🚀' },
        { id: 'geo_world', name: 'جغرافيا', icon: '🌍' },
        { id: 'islamic_quran', name: 'إسلاميات', icon: '🕌' },
        { id: 'history_general', name: 'تاريخ', icon: '📜' },
        { id: 'art_literature', name: 'فنون', icon: '🎨' },
        { id: 'tech_general', name: 'تقنية', icon: '💻' }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let sessionGold = 0;
    let timerInterval;
    let totalGold = parseInt(localStorage.getItem('totalGold')) || 0;
    let userName = localStorage.getItem('userName') || "لاعب ذهبي";

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('active');
    };

    window.changeName = () => {
        const n = prompt("الاسم الجديد:", userName);
        if(n) { userName = n; localStorage.setItem('userName', n); document.getElementById('user-name-display').innerText = n; }
    };

    window.openModal = (type) => {
        document.getElementById('modal-container').classList.remove('hidden');
        const c = document.getElementById('modal-content');
        if(type === 'shop') c.innerHTML = "<h2 class='text-3xl font-black mb-4'>🛒 المتجر</h2><p class='text-slate-400'>قريباً: شراء وسائل مساعدة وألوان جديدة!</p>";
        if(type === 'rank') c.innerHTML = `<h2 class='text-3xl font-black mb-4'>🏆 ترتيبك</h2><div class='text-5xl font-black gold-gradient mb-2'>#1</div><p class='text-xl'>رصيدك الحالي: ${totalGold} 💰</p>`;
        if(type === 'mastery') {
            const lvl = Math.floor(totalGold/100);
            c.innerHTML = `<h2 class='text-3xl font-black mb-4'>🎓 الإتقان</h2><div class='text-6xl font-black text-indigo-400 mb-4'>LVL ${lvl}</div><div class='w-full bg-slate-800 h-4 rounded-full'><div class='bg-indigo-500 h-full rounded-full transition-all' style='width: ${totalGold%100}%'></div></div>`;
        }
    };
    window.closeModal = () => document.getElementById('modal-container').classList.add('hidden');

    window.startQuiz = async (id, name) => {
        document.getElementById('home-screen').classList.add('hidden');
        const subScreen = document.getElementById('sub-screen');
        subScreen.classList.remove('hidden');
        document.getElementById('main-cat-title').innerText = name;

        const snap = await getDoc(doc(db, "content", id));
        if(snap.exists()){
            const data = snap.data();
            const grid = document.getElementById('subs-grid');
            grid.innerHTML = '';
            data.subs.forEach(sub => {
                const b = document.createElement('button');
                b.className = "glass p-8 rounded-3xl font-black text-xl hover:bg-indigo-500/20 border-2 border-transparent hover:border-indigo-500 transition-all";
                b.innerText = sub.name;
                b.onclick = () => launchGame(sub.qs, sub.name);
                grid.appendChild(b);
            });
        }
    };

    function launchGame(qs, name) {
        document.getElementById('sub-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('category-name-display').innerText = name;
        currentQuestions = qs.sort(() => 0.5 - Math.random()).slice(0, 10);
        currentIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        clearInterval(timerInterval);
        const q = currentQuestions[currentIndex];
        document.getElementById('q-counter').innerText = currentIndex + 1;
        document.getElementById('question-text').innerText = q.t;
        document.getElementById('info-box').classList.add('hidden');
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        q.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "option-btn w-full p-5 glass rounded-2xl text-right font-bold hover:bg-white/10 transition border border-white/5";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, q.c, q.info, btn);
            container.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        let w = 100;
        timerInterval = setInterval(() => {
            w -= 1;
            document.getElementById('timer-bar').style.width = w + "%";
            if(w <= 0) checkAnswer(-1, currentQuestions[currentIndex].c, currentQuestions[currentIndex].info, null);
        }, 150);
    }

    function checkAnswer(s, c, info, btn) {
        clearInterval(timerInterval);
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        if(s === c) {
            btn.classList.add('bg-green-600', 'border-green-400');
            sessionGold += 10;
            document.getElementById('session-gold').innerText = sessionGold;
        } else {
            if(btn) btn.classList.add('bg-red-600', 'border-red-400');
            btns[c].classList.add('bg-green-600', 'border-green-400', 'animate__animated', 'animate__pulse');
        }
        document.getElementById('info-text').innerText = info;
        document.getElementById('info-box').classList.remove('hidden');
    }

    window.nextQuestion = () => {
        currentIndex++;
        if(currentIndex < 10) showQuestion();
        else {
            totalGold += sessionGold;
            localStorage.setItem('totalGold', totalGold);
            alert(`تهانينا! جمعت ${sessionGold} ذهبة.`);
            location.reload();
        }
    };

    window.backToHome = () => location.reload();

    function init() {
        document.getElementById('total-gold-display').innerText = totalGold.toLocaleString();
        document.getElementById('user-name-display').innerText = userName;
        const grid = document.getElementById('categories-grid');
        categories.forEach(cat => {
            const d = document.createElement('div');
            d.className = "category-card glass p-6 rounded-[35px] cursor-pointer text-center border-2 border-transparent animate__animated animate__zoomIn";
            d.onclick = () => startQuiz(cat.id, cat.name);
            d.innerHTML = `<div class='text-4xl mb-3'>${cat.icon}</div><div class='text-lg font-black'>${cat.name}</div>`;
            grid.appendChild(d);
        });
    }
    init();
</script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>particlesJS('particles-js', { particles: { number: { value: 30 }, color: { value: '#6366f1' }, move: { speed: 1 } } });</script>
</body>
</html>
