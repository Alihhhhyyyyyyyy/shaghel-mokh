<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخك ذهب | النسخة الاحترافية 🏆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #fde047; --indigo: #6366f1; }
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .gold-gradient { background: linear-gradient(135deg, #fde047 0%, #ca8a04 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
        .category-card:hover { transform: translateY(-12px); border-color: var(--indigo); box-shadow: 0 0 30px rgba(99, 102, 241, 0.3); }
        .option-btn { transition: all 0.2s; position: relative; z-index: 10; border: 1px solid rgba(255,255,255,0.05); }
        .option-btn:active { transform: scale(0.98); }
        .timer-bar { transition: width 1s linear; background: linear-gradient(to left, #ef4444, #f59e0b, #10b981); }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed !important; }
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--indigo); position: absolute; top: 15px; left: 15px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="particles-js"></div>

    <nav class="fixed top-0 w-full z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center glass rounded-2xl px-6 py-3">
            <div class="flex items-center gap-4">
                <div class="text-2xl font-black gold-gradient">مُخك ذهب</div>
                <div class="hidden md:block h-6 w-[1px] bg-slate-700"></div>
                <div class="text-xs text-slate-400 hidden md:block">الإصدار 4.0 Pro</div>
            </div>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2">
                    <span class="text-yellow-400 font-bold">💰</span>
                    <span id="total-gold-display" class="font-black text-xl text-white">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main id="home-screen" class="flex-grow container mx-auto px-4 pt-32 pb-10">
        <div class="text-center mb-16 animate__animated animate__zoomIn">
            <h2 class="text-5xl md:text-7xl font-black mb-6 leading-tight">استثمر في <span class="gold-gradient">عقلك</span></h2>
            <p class="text-slate-400 max-w-xl mx-auto text-lg">أكبر منصة أسئلة تفاعلية بـ 200 سؤال في 10 تخصصات مختلفة. ابدأ التحدي الآن!</p>
        </div>

        <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate__animated animate__fadeInUp">
            </div>
    </main>

    <section id="quiz-screen" class="hidden fixed inset-0 z-[100] bg-[#020617] flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-3xl">
            <div class="flex justify-between items-center mb-6 px-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full border-2 border-indigo-500 flex items-center justify-center font-black" id="q-counter">1</div>
                    <div>
                        <div class="text-xs text-slate-400 uppercase tracking-widest">السؤال الحالي</div>
                        <div class="font-bold text-indigo-400" id="category-name-display">تصنيف</div>
                    </div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-black text-yellow-400" id="session-gold">0</div>
                    <div class="text-[10px] uppercase text-slate-500">ذهب الجولة</div>
                </div>
                <button onclick="exitQuiz()" class="w-10 h-10 rounded-full glass flex items-center justify-center hover:bg-red-500/20 transition">✕</button>
            </div>

            <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-8">
                <div id="timer-bar" class="timer-bar h-full w-full"></div>
            </div>

            <div class="glass p-8 md:p-12 rounded-[50px] relative overflow-hidden border-t-2 border-indigo-500/30">
                <div id="question-text" class="text-2xl md:text-3xl font-black text-center leading-relaxed mb-12">...</div>
                
                <div id="options-container" class="grid grid-cols-1 gap-4">
                    </div>

                <div id="info-box" class="hidden mt-10 animate__animated animate__fadeInUp pt-6 border-t border-slate-700">
                    <div class="flex items-start gap-4 bg-indigo-500/10 p-6 rounded-3xl">
                        <div class="text-2xl">💡</div>
                        <p id="info-text" class="text-sm md:text-base leading-relaxed text-indigo-100"></p>
                    </div>
                    <button onclick="nextQuestion()" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-indigo-600/30 transition-all">متابعة التحدي</button>
                </div>
            </div>
        </div>
    </section>

    <section id="result-screen" class="hidden fixed inset-0 z-[200] bg-[#020617]/95 backdrop-blur-xl flex items-center justify-center p-6">
        <div class="glass p-12 rounded-[60px] max-w-md w-full text-center border-2 border-yellow-500/20">
            <div class="w-24 h-24 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl animate__animated animate__bounceIn">🏆</div>
            <h2 class="text-4xl font-black mb-2">عاش يا بطل!</h2>
            <p class="text-slate-400 mb-8 font-medium">أنهيت التحدي بنجاح وجمعت:</p>
            
            <div class="text-6xl font-black gold-gradient mb-10 tracking-tighter" id="final-gold">0</div>
            
            <div class="flex flex-col gap-4">
                <button onclick="location.reload()" class="w-full bg-indigo-600 py-5 rounded-2xl font-black text-lg">العودة للرئيسية</button>
                <button onclick="shareResult()" class="text-slate-500 text-sm font-bold">مشاركة النتيجة ✨</button>
            </div>
        </div>
    </section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWIYaVgqpc2g8stA", 
        authDomain: "shaghel-mokh-ultra.firebaseapp.com", 
        projectId: "shaghel-mokh-ultra" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const categories = [
        { id: 'sports_football', name: 'كرة قدم', icon: '⚽', desc: 'عالم المستطيل الأخضر' },
        { id: 'riddles_logic', name: 'ذكاء ومنطق', icon: '🧠', desc: 'اختبر سرعة بديهتك' },
        { id: 'science_space', name: 'علوم وفضاء', icon: '🚀', desc: 'أسرار الكون والجسم' },
        { id: 'geo_world', name: 'جغرافيا ودول', icon: '🌍', desc: 'سافر حول العالم' },
        { id: 'islamic_quran', name: 'إسلاميات', icon: '🕌', desc: 'ثقافة دينية واسعة' },
        { id: 'history_general', name: 'تاريخ عام', icon: '📜', desc: 'قصص الأولين والحروب' },
        { id: 'art_literature', name: 'فنون وأدب', icon: '🎨', desc: 'إبداع الشعراء والرسامين' },
        { id: 'tech_general', name: 'تكنولوجيا', icon: '💻', desc: 'المستقبل والبرمجيات' },
        { id: 'food_culture', name: 'طعام وثقافات', icon: '🍕', desc: 'مذاقات من كل بلد' },
        { id: 'nature_animals', name: 'عالم الطبيعة', icon: '🐯', desc: 'عجائب الحيوانات والنباتات' }
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let sessionGold = 0;
    let timerInterval;
    let totalGold = parseInt(localStorage.getItem('totalGold')) || 0;

    // تهيئة الصفحة
    function init() {
        const grid = document.getElementById('categories-grid');
        document.getElementById('total-gold-display').innerText = totalGold.toLocaleString();
        
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = `category-card glass p-8 rounded-[40px] cursor-pointer border-2 border-transparent`;
            card.onclick = () => startQuiz(cat.id, cat.name);
            card.innerHTML = `
                <div class="text-5xl mb-6">${cat.icon}</div>
                <h3 class="text-2xl font-black mb-2">${cat.name}</h3>
                <p class="text-slate-400 text-sm leading-relaxed">${cat.desc}</p>
                <div class="mt-6 flex items-center text-xs font-bold text-indigo-400 uppercase tracking-widest">
                    <span>ابدأ الآن</span>
                    <span class="mr-2">⮕</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.startQuiz = async (id, name) => {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('category-name-display').innerText = name;
        
        try {
            const snap = await getDoc(doc(db, "content", id));
            if (snap.exists()) {
                currentQuestions = snap.data().qs.sort(() => 0.5 - Math.random()).slice(0, 10);
                showQuestion();
            }
        } catch (e) { alert("خطأ في الاتصال بالسحابة!"); }
    };

    function showQuestion() {
        clearInterval(timerInterval);
        const q = currentQuestions[currentIndex];
        document.getElementById('q-counter').innerText = currentIndex + 1;
        document.getElementById('question-text').innerText = q.t;
        document.getElementById('info-box').classList.add('hidden');
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        q.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "option-btn w-full p-6 rounded-3xl text-right font-bold bg-white/5 hover:bg-white/10 text-lg border border-white/5";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, q.c, q.info, btn);
            container.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        let width = 100;
        const bar = document.getElementById('timer-bar');
        timerInterval = setInterval(() => {
            width -= 1;
            bar.style.width = width + "%";
            if (width <= 0) {
                clearInterval(timerInterval);
                checkAnswer(-1, currentQuestions[currentIndex].c, currentQuestions[currentIndex].info, null);
            }
        }, 150); // 15 ثانية للسؤال
    }

    function checkAnswer(selected, correct, info, btn) {
        clearInterval(timerInterval);
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add('bg-green-500', 'text-white', 'border-green-400');
            sessionGold += 10;
            document.getElementById('session-gold').innerText = sessionGold;
        } else {
            if(btn) btn.classList.add('bg-red-500', 'text-white', 'border-red-400');
            btns[correct].classList.add('bg-green-500', 'text-white', 'animate__animated', 'animate__pulse');
        }

        document.getElementById('info-text').innerText = info;
        document.getElementById('info-box').classList.remove('hidden');
    }

    window.nextQuestion = () => {
        currentIndex++;
        if (currentIndex < 10) showQuestion();
        else finishGame();
    };

    function finishGame() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-gold').innerText = sessionGold;
        
        totalGold += sessionGold;
        localStorage.setItem('totalGold', totalGold);
    }

    window.exitQuiz = () => { if(confirm("سيضيع الذهب الذي جمعته، هل أنت متأكد؟")) location.reload(); };

    init();
</script>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS('particles-js', {
        particles: {
            number: { value: 50 },
            color: { value: '#6366f1' },
            shape: { type: 'circle' },
            opacity: { value: 0.2 },
            size: { value: 3 },
            line_linked: { enable: true, distance: 150, color: '#6366f1', opacity: 0.1, width: 1 },
            move: { enable: true, speed: 1 }
        }
    });
</script>

</body>
</html>
