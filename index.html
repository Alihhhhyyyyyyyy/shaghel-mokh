<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة شغّل مخك - مشروع التخرج</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة التحميل */
        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* الهيدر */
        .stats-bar {
            width: 100%; max-width: 800px; display: flex; justify-content: space-around;
            padding: 20px; background: var(--card); border-radius: 0 0 20px 20px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--primary); display: block; }

        /* الحاوية */
        .container { width: 95%; max-width: 600px; text-align: center; padding: 20px; }

        /* الأقسام */
        #categories { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .cat-btn {
            background: var(--card); border: 2px solid rgba(255,255,255,0.1);
            padding: 25px 10px; border-radius: 20px; color: white; cursor: pointer;
            font-size: 18px; font-weight: bold;
        }
        .cat-btn:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* السؤال */
        #quiz-area { display: none; }
        .question-card {
            background: var(--card); padding: 30px; border-radius: 25px;
            box-shadow: 0 20px 25px rgba(0,0,0,0.4); margin-bottom: 20px;
        }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; color: white; cursor: pointer; text-align: right;
        }
        .correct { background: var(--success) !important; }
        .wrong { background: var(--error) !important; }

        #info-box {
            display: none; background: #fef3c7; color: #92400e; padding: 15px;
            border-radius: 12px; margin-top: 15px; font-size: 14px; text-align: right;
        }

        #next-btn {
            margin-top: 20px; background: var(--primary); color: white;
            border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p>جاري تحميل الأسئلة...</p></div>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-label">النقاط</span><span id="score" class="stat-value">0</span></div>
        <div class="stat-item"><span class="stat-label">السؤال</span><span id="q-count" class="stat-value">0/0</span></div>
    </div>

    <div class="container">
        <div id="main-menu">
            <h2>اختر قسم التحدي 🚀</h2>
            <div id="categories"></div>
        </div>

        <div id="quiz-area">
            <div class="question-card">
                <h3 id="q-text"></h3>
                <div id="options" class="options-grid"></div>
                <div id="info-box"></div>
            </div>
            <button id="next-btn" onclick="nextQuestion()">السؤال التالي ⬅️</button>
        </div>

        <div id="result-screen" style="display:none;">
            <h2>انتهى التحدي! 🎉</h2>
            <p style="font-size:30px">نقاطك: <span id="final-score">0</span></p>
            <button onclick="location.reload()" class="cat-btn" style="width:100%">العب مجدداً 🔄</button>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allData = {};
        let currentQs = [];
        let currentIdx = 0;
        let score = 0;

        // جلب البيانات
        async function loadData() {
            const snap = await db.collection("quiz").get();
            snap.forEach(doc => { allData[doc.id] = doc.data(); });
            renderCats();
            document.getElementById('loader').style.display = 'none';
        }

        function renderCats() {
            const container = document.getElementById('categories');
            Object.keys(allData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = allData[key].name;
                btn.onclick = () => startQuiz(key);
                container.appendChild(btn);
            });
        }

        function startQuiz(key) {
            currentQs = allData[key].qs;
            currentIdx = 0; score = 0;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            showQ();
        }

        function showQ() {
            const q = currentQs[currentIdx];
            document.getElementById('q-count').innerText = `${currentIdx + 1}/${currentQs.length}`;
            document.getElementById('q-text').innerText = q.t;
            document.getElementById('info-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';

            const opts = document.getElementById('options');
            opts.innerHTML = '';
            q.a.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = txt;
                btn.onclick = () => check(i, q.c, btn, q.info);
                opts.appendChild(btn);
            });
        }

        function check(selected, correct, btn, info) {
            const all = document.querySelectorAll('.opt-btn');
            all.forEach(b => b.disabled = true);
            
            if(selected === correct) {
                btn.classList.add('correct');
                score += 10;
                document.getElementById('score').innerText = score;
            } else {
                btn.classList.add('wrong');
                all[correct].classList.add('correct');
            }

            if(info) {
                const ib = document.getElementById('info-box');
                ib.innerText = "💡 معلومة: " + info;
                ib.style.display = 'block';
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentIdx++;
            if(currentIdx < currentQs.length) showQ();
            else {
                document.getElementById('quiz-area').style.display = 'none';
                document.getElementById('result-screen').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
