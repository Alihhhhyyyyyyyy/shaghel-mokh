<head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query, where, orderBy, limit, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
          authDomain: "shaghel-mokh-ultra.firebaseapp.com",
          projectId: "shaghel-mokh-ultra",
          storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
          messagingSenderId: "167435076773",
          appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
          measurementId: "G-EPJ1MGWBQW"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shaghel-mokh-ultra-full';

        window.db = db;
        window.gameData = {
            coins: 500, 
            xp: 0, 
            level: 1, 
            username: "العبقري المجهول",
            avatar: "https://i.postimg.cc/qqTBP312/1000061201.png",
            inventory: { delete: 5, skip: 5, hint: 5 },
            stats: { gamesPlayed: 0, completedSections: 0, correctAnswers: 0 },
            rank: "باحث عن المعرفة",
            theme: 'dark',
            notifications: [{text: "مرحباً بك في عالم المعرفة!", time: "الآن"}],
            dailyTasks: [
                { id: 'win_5', text: 'أجب على 5 أسئلة صحيحة', goal: 5, current: 0, reward: 100, claimed: false },
                { id: 'use_helper', text: 'استخدم وسيلة مساعدة', goal: 1, current: 0, reward: 50, claimed: false },
                { id: 'earn_500', text: 'اجمع 500 عملة إضافية', goal: 500, current: 0, reward: 200, claimed: false }
            ],
            achievements: [
                { id: 'lvl_5', text: 'الوصول للمستوى 5', earned: false, icon: '🏆' },
                { id: 'streak_10', text: 'إجابة 10 أسئلة متتالية', earned: false, icon: '🔥' },
                { id: 'rich', text: 'جمع 2000 عملة', earned: false, icon: '💰' }
            ]
        };

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                const userDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                onSnapshot(userDoc, (snap) => {
                    if (snap.exists()) {
                        window.gameData = { ...window.gameData, ...snap.data() };
                    } else {
                        setDoc(userDoc, window.gameData);
                    }
                    if (typeof window.updateUI === 'function') window.updateUI();
                });
            }
        });

        window.saveData = async () => {
            if (!window.currentUser) return;
            const uid = window.currentUser.uid;
            await setDoc(doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data'), window.gameData, { merge: true });
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', uid), {
                username: window.gameData.username,
                xp: window.gameData.xp,
                level: window.gameData.level,
                avatar: window.gameData.avatar,
                rank: window.gameData.rank,
                uid: uid
            }, { merge: true });
        };
    </script>

<script type="module">
    // استيراد الدوال اللازمة للإضافة لفايربيز
    import { collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const categoryConfig = {
        islamic: { name: "إسلاميات", icon: "🕌", subs: ["قصص الأنبياء", "القرآن الكريم"] },
        egypt: { name: "تاريخ مصر", icon: "🏺", subs: ["الفراعنة", "مصر الحديثة"] },
        tech: { name: "تقنية", icon: "💻", subs: ["برمجة", "ذكاء اصطناعي"] },
        science: { name: "علوم وفضاء", icon: "🚀", subs: ["الفضاء", "جسم الإنسان"] },
        geo: { name: "جغرافيا", icon: "🌍", subs: ["عواصم", "أعلام"] },
        sports: { name: "رياضة", icon: "⚽", subs: ["كرة قدم", "أساطير"] },
        puzzles: { name: "ألغاز", icon: "🧩", subs: ["منطق", "أحجيات"] },
        food: { name: "طعام", icon: "🍱", subs: ["أطباق عالمية"] }
    };

    let questions = [], qIdx = 0;
    const aiApiKey = "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA";
    const appId = 'shaghel-mokh-ultra-full';

    window.toggleSidebar = () => {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('sidebar-overlay');
        const isOpen = s.classList.toggle('open');
        o.style.display = isOpen ? 'block' : 'none';
    };

    window.navTo = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        const targetScreen = document.getElementById(`screen-${id}`);
        if(targetScreen) targetScreen.classList.add('active');
        const nav = document.getElementById(`n-${id}`);
        if(nav) nav.classList.add('active');
        document.getElementById('main-nav').style.display = id === 'quiz' ? 'none' : 'flex';
        
        if(id === 'paths') renderPaths();
        if(id === 'leaderboard') renderLeaderboard();
        if(id === 'tasks') renderTasks();
    };

    function renderPaths() {
        const list = document.getElementById('paths-list'); list.innerHTML = '';
        for(let key in categoryConfig) {
            const cat = categoryConfig[key];
            list.innerHTML += `<div onclick="window.showSubs('${key}')" class="bg-[var(--card)] p-6 rounded-[35px] flex justify-between items-center border border-white/5 active:scale-95 transition cursor-pointer">
                    <div class="flex items-center gap-6">
                        <div class="text-4xl w-16 h-16 flex items-center justify-center bg-black/40 rounded-3xl">${cat.icon}</div>
                        <div><h4 class="font-black text-xl mb-1">${cat.name}</h4></div>
                    </div><span class="text-amber-500 font-black text-2xl">➜</span></div>`;
        }
    }

    window.showSubs = (key) => {
        const list = document.getElementById('paths-list');
        list.innerHTML = `<button onclick="renderPaths()" class="text-amber-500 font-black mb-6">🔙 العودة</button>`;
        categoryConfig[key].subs.forEach(sub => {
            list.innerHTML += `<div onclick="window.startQuiz('${categoryConfig[key].name}', '${sub}')" class="bg-[var(--card)] p-5 rounded-[28px] border border-white/5 mb-4 flex justify-between items-center cursor-pointer active:bg-amber-500/10 transition">
                    <span class="font-bold text-lg">${sub}</span><span class="bg-amber-500 text-black px-5 py-2 rounded-2xl font-black text-xs shadow-lg">ابدأ</span></div>`;
        });
    };

    // --- وظيفة توليد الأسئلة من الذكاء الاصطناعي وحفظها في Firestore ---
    async function generateAndSaveQuestions(cat, sub) {
        const prompt = `Generate 10 multiple-choice questions in Arabic about "${cat} - ${sub}". 
        Response MUST be a valid JSON array of objects. 
        Each object: {"t": "the question", "a": ["opt1", "opt2", "opt3", "opt4"], "c": index_of_correct_answer_0_to_3, "x": "short_fun_fact"}.
        No markdown, just raw JSON.`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiApiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const rawText = data.candidates[0].content.parts[0].text;
            const cleanJson = rawText.replace(/```json|```/g, "").trim();
            const newQuestions = JSON.parse(cleanJson);

            const qCol = collection(window.db, 'artifacts', appId, 'public', 'data', 'questions');
            
            // حفظ كل سؤال جديد في Firestore
            const savePromises = newQuestions.map(q => {
                const fullQ = { ...q, category: cat, subCategory: sub, createdAt: Date.now() };
                return addDoc(qCol, fullQ);
            });
            
            await Promise.all(savePromises);
            return newQuestions;
        } catch (e) {
            console.error("AI Generation Error:", e);
            return [];
        }
    }

    window.startQuiz = async (cat, sub) => {
        window.navTo('quiz');
        document.getElementById('q-text').innerText = "جاري البحث عن أسئلة في الذاكرة...";
        document.getElementById('options-box').innerHTML = '';
        
        // البحث عن الأسئلة الموجودة في Firestore لهذا القسم
        const qCol = collection(window.db, 'artifacts', appId, 'public', 'data', 'questions');
        const qQuery = query(qCol, where("category", "==", cat), where("subCategory", "==", sub));
        const qSnap = await getDocs(qQuery);
        
        questions = [];
        qSnap.forEach(d => questions.push(d.data()));

        // إذا لم توجد أسئلة كافية (أقل من 5)، اطلب من الذكاء الاصطناعي توليدها وحفظها
        if (questions.length < 5) {
            document.getElementById('q-text').innerText = "جاري استخدام الذكاء الاصطناعي لتوليد أسئلة جديدة وحفظها في قاعدة البيانات...";
            const generated = await generateAndSaveQuestions(cat, sub);
            if (generated.length > 0) {
                questions = generated;
            }
        }

        if(questions.length === 0) {
            questions = [{t: "حدث خطأ في جلب الأسئلة، حاول مرة أخرى.", a: ["رجوع"], c: 0, x: "تأكد من اتصالك بالإنترنت."}];
        }
        
        questions = questions.sort(() => 0.5 - Math.random()).slice(0, 10);
        qIdx = 0; showQuestion();
    };

    function showQuestion() {
        const q = questions[qIdx];
        document.getElementById('q-counter').innerText = `السؤال ${qIdx+1} / ${questions.length}`;
        document.getElementById('q-progress').style.width = ((qIdx+1)/questions.length)*100 + "%";
        document.getElementById('q-percent').innerText = Math.round(((qIdx+1)/questions.length)*100) + "%";
        document.getElementById('q-text').innerText = q.t;
        document.getElementById('analysis-container').style.display = 'none';
        document.getElementById('btn-analyze').classList.add('hidden');

        const box = document.getElementById('options-box'); box.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button'); btn.className = 'btn-option';
            btn.innerText = opt; btn.onclick = () => selectAnswer(i, btn); box.appendChild(btn);
        });
    }

    function selectAnswer(i, btn) {
        const q = questions[qIdx];
        const btns = document.querySelectorAll('.btn-option');
        btns.forEach(b => b.disabled = true);

        if(i === q.c) {
            btn.classList.add('correct'); document.getElementById('snd-correct').play();
            window.gameData.coins += 20; window.gameData.xp += 100;
            window.gameData.stats.correctAnswers++;
            updateDailyTask('win_5', 1);
            confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
        } else {
            btn.classList.add('wrong'); btns[q.c].classList.add('correct');
            document.getElementById('snd-wrong').play();
            document.getElementById('btn-analyze').classList.remove('hidden');
        }
        document.getElementById('analysis-text').innerText = q.x || "معلومة قيمة!";
        document.getElementById('analysis-container').style.display = 'block';
        checkLevel(); 
        window.saveData(); 
        window.updateUI();
    }

    window.askAIAnalysis = async () => {
        const q = questions[qIdx];
        document.getElementById('analysis-text').innerText = "⏳ جاري التحليل بالذكاء الاصطناعي...";
        const prompt = `اشرح باختصار لماذا الإجابة "${q.a[q.c]}" هي الصحيحة للسؤال: "${q.t}"`;
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${aiApiKey}`, {
                method: 'POST', body: JSON.stringify({contents: [{parts: [{text: prompt}]}]})
            });
            const data = await res.json();
            document.getElementById('analysis-text').innerText = data.candidates[0].content.parts[0].text;
        } catch(e) { document.getElementById('analysis-text').innerText = "عذراً، فشل الاتصال بالذكاء الاصطناعي."; }
    };

    window.nextQuestion = () => {
        qIdx++;
        if(qIdx < questions.length) showQuestion();
        else { window.gameData.stats.gamesPlayed++; window.navTo('home'); window.saveData(); }
    };

    function updateDailyTask(id, amount) {
        const task = window.gameData.dailyTasks.find(t => t.id === id);
        if(task && !task.claimed) {
            task.current = Math.min(task.current + amount, task.goal);
            if(task.current === task.goal) {
                window.gameData.coins += task.reward;
                task.claimed = true;
                console.log(`Task Complete: ${task.text}`);
            }
        }
    }

    async function renderLeaderboard() {
        const list = document.getElementById('leader-list');
        list.innerHTML = '<div class="text-center py-20 opacity-50"><i class="fas fa-spinner fa-spin text-3xl mb-4"></i><p>جاري تحميل الأبطال...</p></div>';
        const q = collection(window.db, 'artifacts', 'shaghel-mokh-ultra-full', 'public', 'data', 'rankings');
        const snap = await getDocs(q);
        let leaders = [];
        snap.forEach(d => leaders.push(d.data()));
        leaders.sort((a, b) => b.xp - a.xp);
        leaders = leaders.slice(0, 10);
        list.innerHTML = '';
        leaders.forEach((user, i) => {
            const rank = i + 1;
            const colors = ['#fbbf24', '#cbd5e1', '#d97706'];
            list.innerHTML += `<div class="leader-item mb-3">
                <div class="rank-badge" style="background:${rank<=3 ? colors[rank-1] : '#222'}; color:${rank<=3 ? '#000' : '#666'}">${rank}</div>
                <img src="${user.avatar || 'https://i.postimg.cc/qqTBP312/1000061201.png'}" class="w-12 h-12 rounded-2xl object-cover border border-white/10">
                <div class="flex-1">
                    <div class="font-black text-sm">${user.username}</div>
                    <div class="text-[10px] opacity-50 uppercase font-bold">${user.rank || 'باحث'}</div>
                </div>
                <div class="text-right">
                    <div class="text-amber-500 font-black text-sm">${user.xp} XP</div>
                    <div class="text-[9px] font-bold">LVL ${user.level}</div>
                </div>
            </div>`;
        });
    }

    function renderTasks() {
        const dtl = document.getElementById('daily-tasks-list'); dtl.innerHTML = '';
        window.gameData.dailyTasks.forEach(t => {
            const perc = (t.current/t.goal)*100;
            dtl.innerHTML += `<div class="task-box">
                <div class="flex justify-between font-bold text-sm mb-2"><span>${t.text}</span><span>${t.reward} 💰</span></div>
                <div class="xp-bar"><div class="task-fill" style="width:${perc}%"></div></div>
                <p class="text-[10px] opacity-50 mt-2">${t.claimed ? '✅ مكتمل' : t.current+' / '+t.goal}</p>
            </div>`;
        });
        const al = document.getElementById('achievements-list'); al.innerHTML = '';
        window.gameData.achievements.forEach(a => {
            al.innerHTML += `<div class="bg-zinc-900 p-4 rounded-2xl flex flex-col items-center opacity-${a.earned ? '100' : '20'}">
                <span class="text-3xl mb-2">${a.icon}</span>
                <span class="text-[8px] font-black text-center">${a.text}</span>
            </div>`;
        });
    }

    function checkLevel() {
        const nextXp = window.gameData.level * 1000;
        if(window.gameData.xp >= nextXp) {
            window.gameData.level++; window.gameData.coins += 500;
        }
    }

    window.updateUI = () => {
        const d = window.gameData;
        document.getElementById('coin-count').innerText = d.coins;
        document.getElementById('top-lvl').innerText = d.level;
        document.getElementById('side-coins').innerText = d.coins;
        document.getElementById('side-lvl').innerText = d.level;
        document.getElementById('side-name').innerText = d.username;
        document.getElementById('side-rank').innerText = d.rank;
        document.getElementById('home-avatar').src = d.avatar;
        document.getElementById('side-avatar').src = d.avatar;
        document.getElementById('h-del').innerText = d.inventory.delete;
        document.getElementById('h-hint').innerText = d.inventory.hint;
        document.getElementById('h-skip').innerText = d.inventory.skip;
        if(d.theme === 'light') document.body.classList.add('light-mode');
        else document.body.classList.remove('light-mode');
    };

    window.changeUsername = async () => {
        const newName = document.getElementById('username-input').value.trim();
        if(newName.length > 2) {
            window.gameData.username = newName;
            await window.saveData();
            window.updateUI();
            alert("تم تغيير الاسم بنجاح!");
        } else {
            alert("الاسم قصير جداً");
        }
    };

    window.setTheme = (t) => {
        window.gameData.theme = t;
        window.updateUI();
        window.saveData();
    };

    window.useHelper = (type) => {
        if(window.gameData.inventory[type] <= 0) return alert("نفدت المساعدات!");
        window.gameData.inventory[type]--;
        if(type === 'skip') window.nextQuestion();
        if(type === 'delete') {
            const correct = questions[qIdx].c;
            document.querySelectorAll('.btn-option').forEach((b,i) => { if(i!==correct) b.style.opacity='0.2'; });
        }
        if(type === 'hint') {
            alert("تلميح: " + (questions[qIdx].x || "حاول التركيز أكثر!"));
        }
        window.updateUI(); window.saveData();
    };

    window.buyHelper = (price) => {
        if(window.gameData.coins >= price) {
            window.gameData.coins -= price;
            window.gameData.inventory.delete += 3;
            window.gameData.inventory.hint += 3;
            window.gameData.inventory.skip += 3;
            window.updateUI();
            window.saveData();
            alert("تم الشراء بنجاح!");
        } else {
            alert("ليس لديك عملات كافية!");
        }
    };

    window.resetGame = () => { if(confirm("سيتم حذف كل تقدمك! هل أنت متأكد؟")) { 
        window.gameData.xp = 0; window.gameData.coins = 500; window.gameData.level = 1;
        window.saveData();
        location.reload(); 
    }};
    
    window.navTo('home');
</script>
</body>
</html>
