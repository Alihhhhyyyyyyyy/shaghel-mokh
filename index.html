<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شغل مخك - النسخة السحابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, getDocs, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- إعدادات Firebase الخاصة بك من الصورة ---
        const firebaseConfig = {
            apiKey: "AIzaSyBKQfpuzt92Uk_mJrSWuIYaVgqpc2g",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb184e5e",
            measurementId: "G-EPJ1MGWBQW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { db, collection, getDocs, query };
        window.gameContent = {}; 

        // بيانات اللاعب الافتراضية
        window.gameData = {
            coins: 1000, xp: 0, level: 1, username: "المفكر العبقري",
            inventory: { delete: 5, skip: 5, hint: 5 },
            rank: "مبتدئ"
        };

        // 1. دالة رفع الأسئلة (الونش)
        async function uploadInitialData() {
            console.log("🚀 جاري رفع الأسئلة للسحاب...");
            const initialData = {
                football: { name: "كرة القدم", icon: "⚽", branches: {
                    world: { name: "كأس العالم", q: [{t: "من فاز بكأس العالم 2022؟", a: ["فرنسا", "الأرجنتين", "البرازيل", "ألمانيا"], c: 1, x: "الأرجنتين فازت بركلات الترجيح."}]}
                }},
                science: { name: "العلوم", icon: "🧪", branches: {
                    space: { name: "الفضاء", q: [{t: "ما هو أقرب كوكب للشمس؟", a: ["الأرض", "عطارد", "المريخ", "الزهرة"], c: 1, x: "عطارد هو الأقرب."}]}
                }}
            };
            for (let key in initialData) {
                await setDoc(doc(db, 'questions', key), initialData[key]);
            }
            window.gameContent = initialData;
            renderPaths();
        }

        // 2. دالة تحميل الأسئلة من السحاب
        async function loadData() {
            try {
                const q = query(collection(db, 'questions'));
                const snap = await getDocs(q);
                if (snap.empty) {
                    await uploadInitialData();
                } else {
                    let data = {};
                    snap.forEach(doc => { data[doc.id] = doc.data(); });
                    window.gameContent = data;
                    renderPaths();
                }
            } catch (e) { console.error("خطأ:", e); }
        }

        // مراقبة تسجيل الدخول
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                loadData();
                // حفظ/تحميل بيانات المستخدم
                const userRef = doc(db, 'users', user.uid);
                onSnapshot(userRef, (snap) => {
                    if (snap.exists()) { window.gameData = snap.data(); }
                    else { setDoc(userRef, window.gameData); }
                    updateUI();
                });
            } else { signInAnonymously(auth); }
        });

        window.saveData = async () => {
            if (window.currentUser) await setDoc(doc(db, 'users', window.currentUser.uid), window.gameData);
        };
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 20px; }
        .screen.active { display: flex; }
        .btn-main { background: #4f46e5; padding: 15px; border-radius: 15px; font-weight: bold; text-align: center; cursor: pointer; }
        .path-card { background: #1e293b; padding: 20px; border-radius: 20px; margin-bottom: 10px; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active justify-center items-center gap-6">
        <h1 class="text-4xl font-black text-indigo-500">شغل مخك 🧠</h1>
        <div class="flex gap-4">
            <span class="bg-slate-800 p-2 rounded-lg">🪙 <span id="coin-count">0</span></span>
            <span class="bg-slate-800 p-2 rounded-lg">⭐ LVL <span id="lvl-count">1</span></span>
        </div>
        <div onclick="navTo('paths')" class="btn-main w-64 text-xl">ابدأ اللعب 🚀</div>
    </div>

    <div id="screen-paths" class="screen">
        <div class="flex items-center gap-4 mb-6">
            <button onclick="navTo('home')" class="text-2xl">➔</button>
            <h2 class="text-2xl font-bold">المسارات السحابية</h2>
        </div>
        <div id="paths-list">
            <p class="text-center text-slate-500">جاري تحميل البيانات من Firebase...</p>
        </div>
    </div>

    <script>
        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + id).classList.add('active');
            if(id === 'paths') renderPaths();
        }

        function renderPaths() {
            const list = document.getElementById('paths-list');
            if (Object.keys(window.gameContent).length === 0) return;
            list.innerHTML = '';
            for (let key in window.gameContent) {
                const p = window.gameContent[key];
                list.innerHTML += `
                    <div class="path-card flex justify-between items-center" onclick="alert('جاري تجهيز الأسئلة...')">
                        <div class="flex items-center gap-4">
                            <span class="text-3xl">${p.icon}</span>
                            <span class="text-xl font-bold">${p.name}</span>
                        </div>
                        <span class="text-indigo-400">➔</span>
                    </div>
                `;
            }
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = window.gameData.coins;
            document.getElementById('lvl-count').innerText = window.gameData.level;
        }
    </script>
</body>
</html>
