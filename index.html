<script type="module">
    // استيراد المكتبات بشكل صحيح للـ CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // إعداداتك الخاصة (زي ما هي)
    const firebaseConfig = {
        apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
        authDomain: "shaghel-mokh-ultra.firebaseapp.com",
        projectId: "shaghel-mokh-ultra",
        storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
        messagingSenderId: "167435076773",
        appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
        measurementId: "G-EPJ1MGWBQW"
    };

    // تشغيل Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const grid = document.getElementById('categories-grid');
    const status = document.getElementById('status');

    // قراءة البيانات من المجلد اللي اسمه questions
    onSnapshot(collection(db, "questions"), (snapshot) => {
        grid.innerHTML = '';
        if (snapshot.empty) {
            status.innerText = "متصل، لكن مفيش بيانات في مجلد questions ⚠️";
        } else {
            status.innerText = "متصل والبيانات وصلت ✅";
        }
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            grid.innerHTML += `
                <div class="category-card p-8 rounded-3xl shadow-xl bg-slate-800 border border-slate-700">
                    <div class="text-5xl mb-4 text-center">⚽</div>
                    <h2 class="text-2xl font-bold text-center">${data.name || "بدون اسم"}</h2>
                    <p class="text-slate-400 text-center mt-3">اضغط للعب</p>
                </div>
            `;
        });
    }, (error) => {
        console.error(error);
        status.innerText = "خطأ: " + error.message;
    });
</script>
