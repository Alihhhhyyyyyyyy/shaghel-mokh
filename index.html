    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, getDocs, query, where, orderBy, limit, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config المحدثة
        const firebaseConfig = {
            apiKey: "AIzaSyBKQFpuzt92Uk_mJrSWuIYaVgqpc2g8stA",
            authDomain: "shaghel-mokh-ultra.firebaseapp.com",
            projectId: "shaghel-mokh-ultra",
            storageBucket: "shaghel-mokh-ultra.firebasestorage.app",
            messagingSenderId: "167435076773",
            appId: "1:167435076773:web:ce058e3d064707bb7cf94c",
            measurementId: "G-EPJ1MGWBQW"
        };

        const appId = 'shaghel-mokh-ultra'; // تم توحيده مع الـ Admin
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db;

        // Initial Game State
        window.gameData = {
            coins: 1000, 
            xp: 0, 
            level: 1, 
            hearts: 5,
            username: "العبقري الصغير",
            avatar: "https://i.postimg.cc/qqTBP312/1000061201.png",
            inventory: { delete: 3, skip: 3, hint: 3, extra_heart: 0 },
            stats: { gamesPlayed: 0, totalCorrect: 0 },
            completedQuests: [],
            unlockedAchievements: [],
            theme: 'dark'
        };

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                // استخدام نفس مسار الـ Admin لضمان التزامن
                const userDoc = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                onSnapshot(userDoc, (snap) => {
                    if (snap.exists()) {
                        window.gameData = { ...window.gameData, ...snap.data() };
                    } else {
                        setDoc(userDoc, window.gameData);
                    }
                    if (typeof window.updateUI === 'function') window.updateUI();
                }, (err) => console.error("Firestore error:", err));
            }
        });

        window.saveData = async () => {
            if (!window.currentUser) return;
            const uid = window.currentUser.uid;
            const userDoc = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'data');
            await setDoc(userDoc, window.gameData, { merge: true });
            
            // Public Leaderboard sync
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', uid), {
                username: window.gameData.username,
                xp: window.gameData.xp,
                level: window.gameData.level,
                avatar: window.gameData.avatar,
                coins: window.gameData.coins,
                hearts: window.gameData.hearts,
                lastActive: new Date().toISOString()
            }, { merge: true });
        };

        // دالة جلب الأسئلة المربوطة بـ Admin Panel
        window.fetchQuestionsFromDB = async (topic, branch) => {
            try {
                const qRef = collection(db, 'artifacts', appId, 'public', 'data', 'questions');
                // الفلترة بناءً على الموضوع والفرع كما في الـ Admin
                const qDocs = await getDocs(qRef);
                let questions = [];
                qDocs.forEach(doc => {
                    const data = doc.data();
                    if(data.topic === topic && data.branch === branch) {
                        questions.push({
                            t: data.text,
                            a: data.options,
                            c: (data.correct - 1), // الـ Admin يرسل 1-4، اللعبة تريد 0-3
                            x: "إجابة ذكية وموفقة! استمر في التقدم."
                        });
                    }
                });
                // خلط الأسئلة واختيار 10
                return questions.sort(() => Math.random() - 0.5).slice(0, 10);
            } catch (error) {
                console.error("Error fetching questions:", error);
                return [];
            }
        };
    </script>

        "تطوير الذات": { icon: "🚀", subs: ["منطق", "علم نفس", "إدارة وقت"] }
    };

    const achievements = [
        { id: 'first_win', name: 'البداية القوية', desc: 'أكمل أول جولة لك بنجاح', icon: '🔥', target: 1, key: 'gamesPlayed' },
        { id: 'smart_guy', name: 'العبقري المتميز', desc: 'أجب على 10 أسئلة بشكل صحيح', icon: '🧠', target: 10, key: 'totalCorrect' },

    ];

    let currentQuestions = [], currentQIdx = 0;
    let playingTopic = ""; 
    let playingBranch = "";

    window.navTo = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        const target = document.getElementById(`screen-${id}`);
        if(target) target.classList.add('active');
        const nav = document.getElementById(`n-${id}`);
        if(nav) nav.classList.add('active');
        
        document.getElementById('main-nav').style.display = (id === 'quiz') ? 'none' : 'flex';
        
        if(id === 'paths') renderPaths();
        if(id === 'leaderboard') renderLeaderboard();
        if(id === 'quests') renderQuests();
        if(id === 'shop') renderShop();
        if(id === 'achievements') renderAchievements();
    };

    window.sideNav = (id) => { window.toggleSidebar(); window.navTo(id); };
    window.toggleSidebar = () => {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('sidebar-overlay');
        const isOpen = s.classList.toggle('open');
        o.style.display = isOpen ? 'block' : 'none';
    };

    function renderPaths() {
        const list = document.getElementById('paths-list');
        list.innerHTML = '';
        for(let topic in categoryConfig) {
            const cat = categoryConfig[topic];
            list.innerHTML += `
                <div onclick="window.showSubs('${topic}')" class="bg-[var(--card)] p-6 rounded-[32px] flex justify-between items-center border border-white/5 cursor-pointer shadow-lg hover:border-amber-500/30 transition-all transform active:scale-[0.97]">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 bg-amber-500/10 rounded-2xl flex items-center justify-center text-3xl shadow-inner">${cat.icon}</div>
                        <span class="font-black text-xl">${topic}</span>
                    </div>
                    <i class="fas fa-chevron-left text-amber-500/30"></i>
                </div>`;
        }
    }

    window.showSubs = (topic) => {
        const list = document.getElementById('paths-list');
        list.innerHTML = `<button onclick="renderPaths()" class="bg-amber-500/10 text-amber-500 font-bold mb-4 py-3 px-6 rounded-2xl border border-amber-500/20 active:scale-95 transition">🔙 العودة للمسارات</button>`;
        categoryConfig[topic].subs.forEach(branch => {
            list.innerHTML += `
                <div onclick="window.startQuiz('${topic}', '${branch}')" class="bg-[var(--card)] p-5 rounded-[28px] border border-white/5 mb-3 flex justify-between items-center cursor-pointer group active:scale-[0.98] transition">
                    <span class="font-bold text-slate-300 group-hover:text-amber-500 transition">${branch}</span>
                    <div class="w-8 h-8 rounded-full bg-amber-500/10 flex items-center justify-center">
                        <i class="fas fa-play text-amber-500 text-[10px]"></i>
                    </div>
                </div>`;
        });
    };

    window.startQuiz = async (topic, branch) => {
        if(window.gameData.hearts <= 0) return alert("❌ نفذت القلوب! اشترِ قلوباً من المتجر لتستمر.");
        
        document.getElementById('loading-screen').classList.remove('hidden');
        currentQuestions = await window.fetchQuestionsFromDB(topic, branch);
        document.getElementById('loading-screen').classList.add('hidden');
        
        if (currentQuestions.length === 0) {
            alert(`⚠️ لا توجد أسئلة في قسم (${branch}) حالياً. يرجى توليدها من لوحة التحكم.`);
            return;
        }
        
        playingTopic = topic;
        playingBranch = branch;
        window.navTo('quiz');
        currentQIdx = 0;
        showQuestion();
    };

    function showQuestion() {
        const q = currentQuestions[currentQIdx];
        const prog = ((currentQIdx + 1) / currentQuestions.length) * 100;
        
        document.getElementById('q-counter').innerText = `${currentQIdx+1}/${currentQuestions.length}`;
        document.getElementById('q-progress').style.width = prog + "%";
        document.getElementById('q-text').innerText = q.t;
        document.getElementById('analysis-container').style.display = 'none';
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        q.a.forEach((txt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = txt;
            btn.onclick = () => selectAnswer(idx, btn, q.c);
            box.appendChild(btn);
        });
    }

    function selectAnswer(userChoiceIdx, btn, correctIdx) {
        const btns = document.querySelectorAll('.btn-option');
        btns.forEach(b => b.disabled = true);
        
        if(userChoiceIdx === correctIdx) {
            btn.classList.add('correct');
            document.getElementById('snd-correct').play();
            window.gameData.coins += 50;
            window.gameData.xp += 100;
            window.gameData.stats.totalCorrect++;
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#f59e0b', '#ffffff'] });
        } else {
            btn.classList.add('wrong');
            btns[correctIdx].classList.add('correct');
            document.getElementById('snd-wrong').play();
            window.gameData.hearts--;
        }
        
        document.getElementById('analysis-text').innerText = currentQuestions[currentQIdx].x;
        document.getElementById('analysis-container').style.display = 'block';
        
        window.saveData(); 
        window.updateUI();
    }

    window.nextQuestion = () => {
        currentQIdx++;
        if(currentQIdx < currentQuestions.length && window.gameData.hearts > 0) {
            showQuestion();
        } else {
            if (window.gameData.hearts <= 0) alert("💔 انتهت القلوب! حظاً موفقاً في المرة القادمة.");
            window.gameData.stats.gamesPlayed++;
            window.saveData();
            window.navTo('home');
        }
    };

    function renderShop() {
        const list = document.getElementById('shop-list');
        const items = [
            {id:'delete', name:'حذف إجابتين', price: 300, icon:'✂️'}, 
            {id:'hint', name:'تلميح ذكي', price: 200, icon:'💡'}, 
            {id:'skip', name:'تخطي السؤال', price: 500, icon:'⏩'}, 
            {id:'extra_heart', name:'قلب (محاولة)', price: 1000, icon:'❤️'}
        ];
        list.innerHTML = '';
        items.forEach(it => {
            list.innerHTML += `
                <div class="bg-[var(--card)] p-5 rounded-[28px] flex justify-between items-center border border-white/5">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-xl">${it.icon}</div>
                        <span class="font-bold text-sm">${it.name}</span>
                    </div>
                    <button onclick="window.buy('${it.id}', ${it.price})" class="bg-amber-500 text-black px-6 py-3 rounded-2xl font-black text-xs hover:bg-amber-400 active:scale-95 transition shadow-lg shadow-amber-500/10">${it.price} 💰</button>
                </div>`;
        });
    }

    window.buy = (id, p) => {
        if(window.gameData.coins >= p) {
            window.gameData.coins -= p;
            if(id === 'extra_heart') window.gameData.hearts++;
            else window.gameData.inventory[id]++;
            window.saveData(); renderShop(); window.updateUI();
            alert("🎉 تم الشراء بنجاح!");
        } else alert("⚠️ الذهب لا يكفي!");
    };

    function renderQuests() {
        const list = document.getElementById('quests-list');
        list.innerHTML = '';
        const quests = [
            {text: 'لعب جولة كاملة', target: 1, type: 'gamesPlayed', reward: 150}, 
            {text: 'إجابة 10 أسئلة صحيحة', target: 10, type: 'totalCorrect', reward: 500}
        ];
        quests.forEach(q => {
            const current = window.gameData.stats[q.type] || 0;
            const prog = Math.min((current/q.target)*100, 100);
            list.innerHTML += `
                <div class="bg-[var(--card)] p-6 rounded-[30px] border border-white/5">
                    <p class="font-bold mb-3">${q.text}</p>
                    <div class="xp-bar mb-3"><div class="xp-fill" style="width:${prog}%"></div></div>
                    <div class="flex justify-between items-center text-xs font-black">
                        <span class="text-slate-500">${current} / ${q.target}</span>
                        <span class="text-amber-500">+${q.reward} 💰</span>
                    </div>
                </div>`;
        });
    }

    function renderAchievements() {
        const list = document.getElementById('ach-list');
        list.innerHTML = '';
        achievements.forEach(ach => {
            const current = ach.key === 'coins' ? window.gameData.coins : (window.gameData.stats[ach.key] || 0);
            const isDone = current >= ach.target;
            list.innerHTML += `
                <div class="achievement-card ${isDone ? '' : 'locked'}">
                    <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-3xl">${ach.icon}</div>
                    <div>
                        <h4 class="font-black text-sm">${ach.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold mt-1">${ach.desc}</p>
                    </div>
                    ${isDone ? '<i class="fas fa-check-circle mr-auto text-amber-500"></i>' : ''}
                </div>`;
        });
    }

    async function renderLeaderboard() {
        const list = document.getElementById('leader-list');
        list.innerHTML = '<div class="text-center py-10 opacity-30"><i class="fas fa-spinner animate-spin text-2xl"></i></div>';
        try {
            const q = query(collection(window.db, 'artifacts', appId, 'public', 'data', 'rankings'), orderBy('xp', 'desc'), limit(15));
            const snap = await getDocs(q);
            list.innerHTML = ''; let rank = 1;
            snap.forEach(d => {
                const u = d.data();
                const isMe = window.currentUser && d.id === window.currentUser.uid;
                list.innerHTML += `
                    <div class="bg-[var(--card)] p-5 rounded-[25px] flex justify-between items-center border ${isMe ? 'border-amber-500 bg-amber-500/5' : 'border-white/5'} shadow-lg">
                        <div class="flex items-center gap-4">
                            <span class="w-6 text-center font-black ${rank <= 3 ? 'text-amber-500' : 'text-slate-500'}">${rank++}</span>
                            <img src="${u.avatar}" class="w-11 h-11 rounded-2xl object-cover border border-white/10">
                            <span class="font-bold text-sm">${u.username}</span>
                        </div>
                        <div class="text-left">
                            <span class="text-xs font-black text-amber-500 block">${u.xp} XP</span>
                            <span class="text-[9px] text-slate-500 block uppercase">Level ${u.level}</span>
                        </div>
                    </div>`;
            });
        } catch(e) { 
            list.innerHTML = '<p class="text-center opacity-50 py-10">الترتيب غير متاح حالياً.</p>'; 
        }
    }

    window.updateProfile = () => {
        const newName = document.getElementById('user-name-input').value.trim();
        if(newName.length < 3) return alert("❌ الاسم قصير جداً!");
        window.gameData.username = newName;
        window.saveData(); window.updateUI();
        alert("✅ تم التحديث!");
    };

    window.uploadImg = (input) => {
        if(input.files && input.files[0]) {
            const r = new FileReader();
            r.onload = e => { 
                window.gameData.avatar = e.target.result; 
                window.saveData(); 
                window.updateUI(); 
            };
            r.readAsDataURL(input.files[0]);
        }
    };

    window.setTheme = (t) => { window.gameData.theme = t; window.saveData(); window.updateUI(); };
    window.confirmExit = () => { if(confirm("إنهاء الجولة؟")) window.navTo('paths'); };
    window.resetData = () => { if(confirm("تصفير الحساب؟")) { localStorage.clear(); location.reload(); } };

    window.useHelper = (type) => {
        if(window.gameData.inventory[type] <= 0) return alert("😔 لا تملك رصيداً!");
        const q = currentQuestions[currentQIdx];
        const btns = document.querySelectorAll('.btn-option');
        
        if(type === 'delete') {
            let deleted = 0;
            btns.forEach((b, idx) => { 
                if(idx !== q.c && deleted < 2) { 
                    b.style.opacity = '0.1'; 
                    b.disabled = true; 
                    deleted++; 
                } 
            });
        } else if(type === 'hint') { 
            alert("💡 الجواب الصحيح هو: " + q.a[q.c].substring(0, 3) + "..."); 
        } else if(type === 'skip') { 
            window.nextQuestion(); 
            return; 
        }
        
        window.gameData.inventory[type]--;
        window.saveData(); 
        window.updateUI();
    };

    window.updateUI = () => {
        const d = window.gameData;
        const xp = d.xp || 0;
        let rank = RANKS[0];
        for (let r of RANKS) { if (xp >= r.min) rank = r; }
        
        d.level = Math.floor(xp / 1000) + 1;
        
        document.getElementById('coin-count').innerText = d.coins;
        document.getElementById('heart-count').innerText = d.hearts;
        document.getElementById('top-lvl').innerText = d.level;
        document.getElementById('side-name').innerText = d.username;
        document.getElementById('side-xp-sub').innerText = `${xp} XP`;
        document.getElementById('home-avatar').src = d.avatar;
        document.getElementById('side-avatar').src = d.avatar;
        document.getElementById('rank-badge').innerText = rank.name;
        document.getElementById('rank-desc').innerText = rank.desc;
        document.getElementById('h-del').innerText = d.inventory.delete;
        document.getElementById('h-hint').innerText = d.inventory.hint;
        document.getElementById('h-skip').innerText = d.inventory.skip;
        document.getElementById('user-name-input').value = d.username;
        document.getElementById('main-body').className = d.theme === 'light' ? 'light-mode' : '';
    };

    window.onload = () => { window.updateUI(); setInterval(() => { if(window.currentUser) window.saveData(); }, 30000); };
</script>
</body>
</html>
